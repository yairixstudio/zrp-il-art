<html lang="he" dir="ltr">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Art Works — Zielinski &amp; Rozen</title>
<meta name="description" content="The Art Works — featured artists at Zielinski & Rozen Galleries">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../components/artwork-lightbox.css">
<link rel="stylesheet" href="../components/triptych-gallery.css">
<style>
/* ===== LOCAL FONTS ===== */
@font-face{font-family:"Copperplate";src:url("../פונטים/Copperplate-Light.ttf") format("truetype");font-weight:300;font-style:normal;font-display:swap}
@font-face{font-family:"Copperplate";src:url("../פונטים/Copperplate.otf") format("opentype");font-weight:400;font-style:normal;font-display:swap}
@font-face{font-family:"Copperplate";src:url("../פונטים/CopperplateCC-Bold.otf") format("opentype");font-weight:700;font-style:normal;font-display:swap}
@font-face{font-family:"Copperplate";src:url("../פונטים/CopperplateCC-Heavy.otf") format("opentype");font-weight:900;font-style:normal;font-display:swap}
@font-face{font-family:"FbEzmel";src:url("../פונטים/FbEzmel-Light.otf") format("opentype");font-weight:300;font-style:normal;font-display:swap}
@font-face{font-family:"FbEzmel";src:url("../פונטים/FbEzmel-Regular.otf") format("opentype");font-weight:400;font-style:normal;font-display:swap}

:root{
  --white:#FFFFFF;
  --bg-grey:#EEF0EF;
  --ink:#1B1B1B;
  --grey-mid:#808080;
  --copy-grey:#6B7280;
  --sep:#EFEFEF;
  --artist:#828282;
  --max:1440px;
  --cop:"Copperplate","Times New Roman",serif;
  --heb:"FbEzmel","Arial Hebrew","David Libre",serif;
  --pad-x:96px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--white);color:var(--ink);font-family:var(--cop);-webkit-font-smoothing:antialiased;overflow-x:hidden}
img{display:block;max-width:100%;height:auto}
a{color:inherit;text-decoration:none}
button{font:inherit;cursor:pointer;background:none;border:0;color:inherit}

/* GLOBAL CASING RULE — all English text renders UPPERCASE (project-wide).
   Hebrew is exempt. See CLAUDE.md §9. */
body{text-transform:uppercase}
.heb,.heb *,[dir="rtl"],[dir="rtl"] *{text-transform:none;font-family:var(--heb)}

/* ===== NAV/FOOTER moved to ../components/site-chrome.css ===== */

/* ===== HERO (THE ART works) ===== */
.hero{background:var(--bg-grey);padding:48px var(--pad-x) 40px;display:flex;justify-content:center}
.hero-inner{width:100%;max-width:var(--max);display:flex;align-items:flex-end;gap:48px}
.hero h1,.hero h2{font-family:var(--cop);font-size:80px;line-height:1;color:var(--ink);letter-spacing:.02em;text-align:left}
.hero h1{font-weight:700}
.hero h2{font-weight:300}
.hero-side{margin-left:auto;font-family:var(--heb);font-weight:300;font-size:18px;color:var(--ink);direction:rtl;text-align:right;max-width:360px;line-height:1.55;align-self:flex-end;padding-bottom:8px}

/* ===== ARTWORK GRID ===== */
.grid{padding:48px var(--pad-x);display:flex;flex-direction:column;gap:48px;background:var(--white)}
.grid-row{display:flex;gap:32px;align-items:stretch}
.grid-row.row-end{justify-content:flex-end}
.card{flex:1;display:flex;flex-direction:column;gap:16px;min-width:0}
.grid-row.row-end .card{flex:0 0 394.67px}
.card .img{position:relative;width:100%;height:478.38px;overflow:hidden;background:#f3f1ee}
.card .img img{width:100%;height:100%;object-fit:cover;transition:transform .8s ease}
.card:hover .img img{transform:scale(1.04)}
.card .img::after{content:"";position:absolute;inset:0;background:rgba(27,27,27,0);transition:background .3s}
.card:hover .img::after{background:rgba(27,27,27,.06)}
.card .name{font-family:var(--heb);font-weight:400;font-size:16px;color:var(--ink);direction:rtl;text-align:right;line-height:1.3;padding:0 4px;display:block;transition:opacity .2s,text-decoration-color .2s;text-decoration:underline transparent;text-underline-offset:3px}
.card a.name:hover{opacity:.65;text-decoration-color:currentColor}

/* fit-vs-cover variants per Figma scaleMode */
.card.fit .img img{object-fit:contain;background:#f3f1ee}

/* lightbox styles imported from components/artwork-lightbox.css (see <link> in head) */

/* WORKS CAROUSEL — mobile-only; hidden on desktop */
.works-carousel{display:none}

/* ============================================================
   RESPONSIVE — TABLET (≤1100px)
   ============================================================ */
@media (max-width:1100px){
  :root{--pad-x:48px}
  .hero h1,.hero h2{font-size:60px}
  .card .img{height:380px}
  .grid-row.row-end .card{flex:0 0 calc((100% - 64px)/3)}
}

/* ============================================================
   RESPONSIVE — MOBILE (≤768px)
   ============================================================ */
@media (max-width:768px){
  :root{--pad-x:16px}

  /* HERO */
  .hero{padding:32px 16px 24px}
  .hero-inner{flex-direction:column;align-items:flex-start;gap:8px}
  .hero h1,.hero h2{font-size:48px}
  .hero-side{margin-left:0;max-width:100%;font-size:14px;align-self:stretch;padding-bottom:0;margin-top:8px}

  /* GRID → hide; carousel takes over */
  .grid{display:none}
  .works-carousel{display:block;padding:24px 0 32px}
  .works-carousel .tri{
    --tri-aspect: 3/4;
    --tri-center-w: 58%;
    --tri-peek-w: 28%;
    --tri-peek-h: 75%;
    --tri-peek-left: 4%;
    --tri-peek-right: 96%;
  }
  /* LIGHTBOX */
}

/* ============================================================
   RESPONSIVE — SMALL MOBILE (≤400px)
   ============================================================ */
@media (max-width:400px){
  .hero h1,.hero h2{font-size:36px}
  .card .name{font-size:12px}
}
</style>
</head>
