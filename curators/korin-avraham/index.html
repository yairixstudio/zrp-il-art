:root{

  --bg-grey:#EEF0EF;

  --grey-mid:#808080;

  --max:1440px;
  --cop:"Copperplate","Noto Sans Arabic","Times New Roman",serif;

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}

/* ===== HERO (grey band — Figma 314:30–314:42: left = badge + 24 + info; portrait 492×492; top-aligned) ===== */
.cur-hero{background:var(--bg-grey);padding:48px var(--pad-x) 32px;display:flex;justify-content:center;align-items:flex-start}
/* Desktop: copy stack (badge → 24px → names → ig) in one column; portrait beside — avoids row-1 stretch from spanning portrait. DOM: copy → pic for mobile column flow. */
.cur-hero .cur-hero__row{
  display:grid;
  grid-template-columns:minmax(0,1fr) 492px;
  grid-template-rows:auto;
  column-gap:48px;
  align-items:start;
  width:100%;
  max-width:var(--max);
}
.cur-hero .cur-hero__copy{
  grid-column:1;
  grid-row:1;
  justify-self:end;
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:24px;
  width:100%;
  padding:0 16px;
  box-sizing:border-box;
}
.cur-hero .cur-hero__badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:8px 16px;
  border:1px solid var(--ink);
  font-family:var(--cop);
  font-weight:300;
  font-size:20px;
  letter-spacing:.04em;
  color:var(--ink);
  box-sizing:border-box;
  margin:0;
}
.cur-hero .cur-hero__pic-wrap{
  grid-column:2;
  grid-row:1;
  justify-self:end;
  display:flex;
  justify-content:flex-end;
  align-self:start;
}
.cur-hero .cur-hero__info{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:16px;
  width:100%;
  box-sizing:border-box;
}
.cur-hero .cur-hero__names{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:20px;
  text-align:center;
  width:100%;
  box-sizing:border-box;
}
.cur-hero .cur-hero__names .fn{font-family:var(--cop);font-weight:700;font-size:80px;line-height:1;color:var(--ink)}
.cur-hero .cur-hero__names .ln{font-family:var(--cop);font-weight:300;font-size:80px;line-height:1;color:var(--ink)}
.cur-hero .cur-hero__ig{
  padding:0 8px;
  font-family:var(--cop);
  font-weight:300;
  font-size:28px;
  letter-spacing:.04em;
  box-sizing:border-box;
}
.cur-hero .cur-hero__ig a{color:inherit;transition:opacity .2s}
.cur-hero .cur-hero__ig a:hover{opacity:.6}
.cur-hero .cur-hero__portrait{position:relative;width:492px;height:492px;overflow:hidden;background:var(--bg-grey)}
.cur-hero .cur-hero__portrait img{width:100%;height:100%;object-fit:cover;object-position:50% 32%}

/* Bio (Figma desktop 706:2 — left column under name block, beside portrait; Frame7 gap 32 → margin-top 8 over copy gap 24). Hairline divider on RTL leading (right) edge per 706:5 (#D8D8D8). */
.cur-hero .cur-hero__bio{
  display:flex;
  justify-content:flex-end;
  align-items:stretch;
  gap:16px;
  width:100%;
  margin-top:8px;
  box-sizing:border-box;
}
.cur-hero .cur-hero__bio-text{
  flex:1 1 auto;
  min-width:0;
  font-family:var(--heb);
  font-weight:300;
  font-size:17px;
  line-height:1.05;
  color:var(--ink);
  direction:rtl;
  text-align:right;
}
.cur-hero .cur-hero__bio-text p{margin:0}
.cur-hero .cur-hero__bio-text p + p{margin-top:1.1em}
.cur-hero .cur-hero__bio-text .ltr-en{
  font-family:var(--cop);
  font-weight:300;
  direction:ltr;
  unicode-bidi:isolate;
}
.cur-hero .cur-hero__bio-rule{flex:0 0 1px;width:1px;background:#D8D8D8;align-self:stretch}

/* ===== EXHIBITIONS GRID (card visuals align with exhibition.html hero overlays) ===== */
.cur-ex{padding:32px var(--pad-x);background:var(--white);display:flex;justify-content:center}
.cur-ex .cur-ex__inner{width:100%;max-width:var(--max)}
.cur-ex .cur-ex__head{font-family:var(--cop);font-weight:300;font-size:19px;letter-spacing:.04em;color:var(--ink);margin-bottom:24px}
.cur-ex .cur-ex__grid{display:flex;flex-direction:row;gap:32px;align-items:flex-start}
.cur-ex .cur-card{flex:1 1 0;min-width:0;display:flex;flex-direction:column;align-items:center;gap:16px;color:inherit}
.cur-ex .cur-card:focus-visible{outline:2px solid var(--ink);outline-offset:4px}
.cur-ex .cur-card__frame{position:relative;width:100%;height:736.97px;overflow:hidden;background:var(--bg-grey);isolation:isolate}
/* picture-upgrade wraps <img> in <picture> — keep media under overlays for hit-testing + DevTools picker */
.cur-ex .cur-card__frame > picture{position:relative;z-index:0;display:block;width:100%;height:100%}
.cur-ex .cur-card__frame > picture img{width:100%;height:100%;object-fit:cover;transition:transform .6s ease}
.cur-ex .cur-card:hover .cur-card__frame > picture img{transform:scale(1.04)}
/* before picture-upgrade runs, or if <img> stays direct child */
.cur-ex .cur-card__frame > img{position:relative;z-index:0;display:block;width:100%;height:100%;object-fit:cover;transition:transform .6s ease}
.cur-ex .cur-card:hover .cur-card__frame > img{transform:scale(1.04)}
.cur-ex .cur-card__frame::after{content:"";position:absolute;inset:0;background:linear-gradient(0deg,rgba(0,0,0,.7) 0%,rgba(0,0,0,0) 100%);pointer-events:none;z-index:1}
/* pointer-events:auto — inspector picks overlay; <a> still receives clicks */
.cur-ex .cur-card__overlay{
  position:absolute;left:50%;transform:translate(-50%,-50%);top:50%;z-index:2;
  display:flex;flex-direction:column;pointer-events:auto;color:#fff;
}
/* loneliness card: one column — stretch = same width for titlebar / Hebrew / English (Figma 400) */
.cur-ex .cur-card__overlay:not(.cur-card__overlay--enonly){
  align-items:stretch;
  width:min(400px,calc(100% - 32px));
  max-width:100%;
  gap:6px;
  text-align:center;
  box-sizing:border-box;
}
.cur-ex .cur-card__overlay--enonly{
  align-items:center;
  gap:0;
  width:calc(100% - 32px);
  max-width:calc(100% - 32px);
  min-width:0;
  box-sizing:border-box;
  text-align:center;
}
.cur-ex .cur-card__overlay--enonly .cur-card__enstack{
  font-family:var(--exo-title-en);font-weight:300;font-size:26px;line-height:1.15;
  text-align:center;width:100%;max-width:100%;box-sizing:border-box;
  overflow-wrap:break-word;word-break:normal;text-wrap:balance;
}
.cur-ex .cur-card__overlay--enonly .cur-card__enstack span{display:block;max-width:100%}
.cur-ex .cur-card__titlebar{
  display:flex;align-items:center;justify-content:center;gap:13px;
  flex-wrap:wrap;width:100%;box-sizing:border-box;
}
.cur-ex .cur-card__titlebar .lbl{font-family:var(--exo-title-en);font-weight:300;font-size:26px;letter-spacing:.04em;line-height:1.15;white-space:nowrap}
.cur-ex .cur-card__titlebar .dot{width:6px;height:6px;border-radius:300px;background:#fff;flex-shrink:0}
.cur-ex .cur-card__overlay:not(.cur-card__overlay--enonly) .cur-card__title-he,
.cur-ex .cur-card__overlay:not(.cur-card__overlay--enonly) .cur-card__title-en{
  margin:0;
  width:100%;
  max-width:100%;
  box-sizing:border-box;
  text-align:center;
}
.cur-ex .cur-card__title-he{font-family:var(--heb);font-weight:400;font-size:29px;line-height:1.2;direction:rtl;text-wrap:balance}
.cur-ex .cur-card__title-en{
  font-family:var(--exo-title-en);font-weight:300;font-size:17px;line-height:1.25;letter-spacing:.04em;
  overflow-wrap:break-word;word-break:normal;text-wrap:balance;
}
.cur-ex .cur-card__meta{display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;max-width:100%}
.cur-ex .cur-card__meta .t{font-family:var(--cop);font-weight:400;font-size:16px;line-height:1.6;letter-spacing:.04em;color:var(--ink);max-width:100%}
.cur-ex .cur-card__meta .g{font-family:var(--cop);font-weight:300;font-size:16px;line-height:1.4;letter-spacing:.04em;color:var(--ink);max-width:100%}

.loading{padding:120px 24px;text-align:center;font-family:var(--cop);font-weight:300;color:var(--grey-mid);letter-spacing:.08em}

@media (max-width:1100px){

  }
  .cur-hero .cur-hero__info{
    align-items:center;

    max-width:358px;

    gap:16px;
  }
  .cur-hero .cur-hero__names{
    align-items:center;
    gap:8px;

    padding:0;
    text-align:center;
  }
  .cur-hero .cur-hero__names .fn,.cur-hero .cur-hero__names .ln{font-size:36px;width:auto;text-align:center}
  .cur-hero .cur-hero__ig{padding:0;font-size:16px;width:100%;text-align:center}
  .cur-hero .cur-hero__pic-wrap{justify-self:center;width:100%;justify-content:center}

  }
  .cur-hero .cur-hero__bio-text{font-size:15px;flex:0 1 auto;max-width:358px}
  .cur-hero .cur-hero__portrait::after{content:"";position:absolute;inset:0;background:linear-gradient(0deg,rgba(0,0,0,.6) 0%,rgba(0,0,0,0) 100%);pointer-events:none;z-index:1}
  .cur-hero .cur-hero__portrait img{position:relative;z-index:0}

  .cur-ex{padding:32px var(--pad-x)}
  .cur-ex .cur-ex__inner{display:flex;flex-direction:column;align-items:center;text-align:center;width:100%}
  .cur-ex .cur-ex__head{font-size:20px;margin-bottom:24px;width:100%;text-align:center}
  .cur-ex .cur-ex__grid{flex-direction:column;gap:24px;align-items:center;width:100%}
  .cur-ex .cur-card{width:100%;max-width:358px}
  .cur-ex .cur-card--how-many{order:-1}
  .cur-ex .cur-card__frame{height:433.939px}
  .cur-ex .cur-card__overlay--enonly .cur-card__enstack{font-size:22px;line-height:1.2}
  .cur-ex .cur-card__titlebar .lbl{font-size:22px}
  .cur-ex .cur-card__title-he{font-size:25px}
  .cur-ex .cur-card__title-en{font-size:15px}
}

<script>
(function(){
  const CUR_SLUG = 'korin-avraham';

  async function loadJson(path, embeddedId){
    try{
      var res = await fetch(path, {cache:'no-store'});
      if(res.ok) return await res.json();
    }catch(_){}
    var el = document.getElementById(embeddedId);
    if(el) return JSON.parse(el.textContent);
    throw new Error('cannot load ' + path);
  }

  function esc(s){
    return String(s == null ? '' : s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderBio(paras){
    if(!paras || !paras.length) return '';
    var body = paras.map(function(lines){
      var html = (lines || []).map(function(line){
        return esc(line)
          .replace(/\{en\}/g, '<span class="ltr-en">')
          .replace(/\{\/en\}/g, '</span>');
      }).join('<br>');
      return '<p>' + html + '</p>';
    }).join('');
    return (
      '<div class="cur-hero__bio">' +
        '<div class="cur-hero__bio-text heb">' + body + '</div>' +
        '<span class="cur-hero__bio-rule" aria-hidden="true"></span>' +
      '</div>'
    );
  }

  function galleryNameEn(galleries, gid){
    var g = (galleries || []).find(function(x){ return x.id === gid; });
    return g && g.name_en ? g.name_en : '';
  }

  function headingEnLines(ex){
    var paras = ex.description_he || [];
    for(var i = 0; i < paras.length; i++){
      if(paras[i].weight === 'heading-en' && paras[i].lines && paras[i].lines.length)
        return paras[i].lines;
    }
    return [ex.title_en || ''];
  }

  function buildCard(ex, galleries){
    var gid = ex.gallery_id;
    var gname = galleryNameEn(galleries, gid);
    var href = '../../exhibitions/' + encodeURIComponent(ex.slug) + '/';
    var imgSrc = '../../' + ex.hero_image;
    var enOnly = !!ex.hero_overlay_en_only;
    var w = ex.slug === 'loneliness' ? 690 : 1068;
    var h = ex.slug === 'loneliness' ? 1044 : 1600;

    var overlay;
    if(enOnly){
      var lines = headingEnLines(ex);
      overlay =
        '<div class="cur-card__overlay cur-card__overlay--enonly" aria-hidden="true">' +
          '<div class="cur-card__enstack">' +
            lines.map(function(line, idx){
              return '<span>' + esc(line) + '</span>';
            }).join('') +
          '</div>' +
        '</div>';
    }else{
      overlay =
        '<div class="cur-card__overlay" aria-hidden="true">' +
          '<div class="cur-card__titlebar">' +
            '<span class="lbl">' + esc(ex.label_en || 'EXHIBITION') + '</span>' +
            '<span class="dot"></span>' +
            '<span class="lbl">' + esc(ex.volume_en || '') + '</span>' +
          '</div>' +
          '<p class="cur-card__title-he heb">' + esc(ex.title_he || '') + '</p>' +
          '<p class="cur-card__title-en">' + esc(ex.title_en || '') + '</p>' +
        '</div>';
    }

    return (
      '<a class="cur-card cur-card--' + esc(ex.slug) + '" href="' + href + '">' +
        '<div class="cur-card__frame">' +
          '<img src="' + esc(imgSrc) + '" alt="' + esc(ex.title_he || ex.title_en || '') + '" width="' + w + '" height="' + h + '" loading="lazy" decoding="async">' +
          overlay +
        '</div>' +
        '<div class="cur-card__meta">' +
          '<p class="t">' + esc(ex.title_en || '') + '</p>' +
          '<p class="g">' + esc(gname) + '</p>' +
        '</div>' +
      '</a>'
    );
  }

  (async function(){
    var page = document.getElementById('page');
    try{
      var curDoc = await loadJson('../../data/curators.json', 'fallback-curators');
      var exDoc = await loadJson('../../data/exhibitions.json', 'fallback-exhibitions-min');
      var galDoc = await loadJson('../../data/galleries.json', 'fallback-galleries');

      var curators = curDoc.curators || [];
      var cur = curators.find(function(c){ return c.slug === CUR_SLUG; }) || curators[0];
      if(!cur){
        page.innerHTML = '<div class="loading">curator not found</div>';
        document.body.classList.remove('is-loading-data');
        return;
      }

      var exhibitions = exDoc.exhibitions || [];
      var galleries = galDoc.galleries || [];
      var bySlug = {};
      exhibitions.forEach(function(e){ bySlug[e.slug] = e; });

      var cardsHtml = (cur.exhibition_slugs || []).map(function(slug){
        var ex = bySlug[slug];
        if(!ex) return '';
        return buildCard(ex, galleries);
      }).join('');

      var ig = cur.instagram_handle || '';
      var igHref = 'https://www.instagram.com/' + String(ig).replace(/^@/, '').replace(/[^A-Za-z0-9._]/g, '') + '/';

      var portrait = cur.portrait || {};
      var psrc = '../../' + (portrait.src || '');
      var palt = portrait.alt_he || '';

      document.title = (cur.name_en_first + ' ' + cur.name_en_last + ' — curator — Zielinski & Rozen art galleries').toUpperCase();

      page.innerHTML =
        '<section class="cur-hero">' +
          '<div class="cur-hero__row">' +
            '<div class="cur-hero__copy">' +
              '<span class="cur-hero__badge">' + esc(cur.badge_en || 'the curator') + '</span>' +
              '<div class="cur-hero__info">' +
                '<div class="cur-hero__names">' +
                  '<span class="fn">' + esc(cur.name_en_first) + '</span>' +
                  '<span class="ln">' + esc(cur.name_en_last) + '</span>' +
                '</div>' +
                '<p class="cur-hero__ig"><a href="' + esc(igHref) + '" target="_blank" rel="noopener noreferrer">@' + esc(ig.replace(/^@/, '')) + '</a></p>' +
              '</div>' +
              renderBio(cur.bio_he) +
            '</div>' +
            '<div class="cur-hero__pic-wrap">' +
              '<div class="cur-hero__portrait">' +
                '<img src="' + esc(psrc) + '" alt="' + esc(palt) + '" width="' + (+portrait.width || 1638) + '" height="' + (+portrait.height || 2048) + '" fetchpriority="high" decoding="async">' +
              '</div>' +
            '</div>' +
          '</div>' +
        '</section>' +
        '<section class="cur-ex">' +
          '<div class="cur-ex__inner">' +
            '<h2 class="cur-ex__head">' + esc(cur.section_heading_en || "the curator's exhibitions") + '</h2>' +
            '<div class="cur-ex__grid">' + cardsHtml + '</div>' +
          '</div>' +
        '</section>';

      document.body.classList.remove('is-loading-data');
    }catch(err){
      page.innerHTML = '<div class="loading">failed to load — use a local server (e.g. python3 -m http.server)</div>';
      document.body.classList.remove('is-loading-data');
    }
  })();
})();
</script>
