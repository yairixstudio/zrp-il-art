<!DOCTYPE html>
<html lang="he" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Art Works — Zielinski &amp; Rozen</title>
<link rel="preload" href="../פונטים/Copperplate-Light.ttf" as="font" type="font/ttf" crossorigin>
<link rel="preload" href="../פונטים/CopperplateCC-Bold.otf" as="font" type="font/otf" crossorigin>
<link rel="preload" href="../פונטים/FbEzmel-Regular.otf" as="font" type="font/otf" crossorigin>
<link rel="stylesheet" href="../components/site-boot.css">
<meta name="description" content="The Art Works — featured artists at Zielinski & Rozen Galleries">
<link rel="stylesheet" href="../components/artwork-lightbox.css">
<link rel="stylesheet" href="../components/triptych-gallery.css">
<style>
/* ===== LOCAL FONTS ===== */
@font-face{font-family:"Copperplate";src:url("../פונטים/Copperplate-Light.ttf") format("truetype");font-weight:300;font-style:normal;font-display:swap}
@font-face{font-family:"Copperplate";src:url("../פונטים/Copperplate.otf") format("opentype");font-weight:400;font-style:normal;font-display:swap}
@font-face{font-family:"Copperplate";src:url("../פונטים/CopperplateCC-Bold.otf") format("opentype");font-weight:700;font-style:normal;font-display:swap}
@font-face{font-family:"Copperplate";src:url("../פונטים/CopperplateCC-Heavy.otf") format("opentype");font-weight:900;font-style:normal;font-display:swap}
@font-face{font-family:"FbEzmel";src:url("../פונטים/FbEzmel-Light.otf") format("opentype");font-weight:300;font-style:normal;font-display:swap}
@font-face{font-family:"FbEzmel";src:url("../פונטים/FbEzmel-Regular.otf") format("opentype");font-weight:400;font-style:normal;font-display:swap}

:root{
  --white:#FFFFFF;
  --bg-grey:#EEF0EF;
  --ink:#1B1B1B;
  --grey-mid:#808080;
  --copy-grey:#6B7280;
  --sep:#EFEFEF;
  --artist:#828282;
  --max:1440px;
  --cop:"Copperplate","Times New Roman",serif;
  --heb:"FbEzmel","Arial Hebrew","David Libre",serif;
  --pad-x:96px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--white);color:var(--ink);font-family:var(--cop);-webkit-font-smoothing:antialiased;overflow-x:hidden}
img{display:block;max-width:100%;height:auto}
a{color:inherit;text-decoration:none}
button{font:inherit;cursor:pointer;background:none;border:0;color:inherit}

/* GLOBAL CASING RULE — all English text renders UPPERCASE (project-wide).
   Hebrew is exempt. See CLAUDE.md §9. */
body{text-transform:uppercase}
.heb,.heb *,[dir="rtl"],[dir="rtl"] *{text-transform:none;font-family:var(--heb)}

/* ===== NAV/FOOTER moved to ../components/site-chrome.css ===== */

/* ===== HERO (THE ART works) ===== */
.hero{background:var(--bg-grey);padding:48px var(--pad-x) 40px;display:flex;justify-content:center}
.hero-inner{width:100%;max-width:var(--max);display:flex;align-items:flex-end;gap:48px}
.hero h1,.hero h2{font-family:var(--cop);font-size:80px;line-height:1;color:var(--ink);letter-spacing:.02em;text-align:left}
.hero h1{font-weight:700}
.hero h2{font-weight:300}
.hero-side{margin-left:auto;font-family:var(--heb);font-weight:300;font-size:18px;color:var(--ink);direction:rtl;text-align:right;max-width:360px;line-height:1.55;align-self:flex-end;padding-bottom:8px}

/* ===== ARTWORK GRID ===== */
.grid{padding:48px var(--pad-x);display:grid;grid-template-columns:repeat(3,1fr);gap:48px 32px;background:#fafafa}
.card{display:flex;flex-direction:column;gap:16px;min-width:0}
.card .img{position:relative;width:100%;height:478.38px;overflow:hidden;background:#f3f1ee}
.card .img img{width:100%;height:100%;object-fit:cover;transition:transform .8s ease}
.card:hover .img img{transform:scale(1.04)}
.card .img::after{content:"";position:absolute;inset:0;background:rgba(27,27,27,0);transition:background .3s}
.card:hover .img::after{background:rgba(27,27,27,.06)}
.card .name{font-family:var(--heb);font-weight:400;font-size:16px;color:var(--ink);direction:rtl;text-align:center;line-height:1.3;padding:0 4px;display:block;transition:opacity .2s,text-decoration-color .2s;text-decoration:underline transparent;text-underline-offset:3px}
.card a.name .name-line2{display:block;font:inherit;font-weight:300;margin-top:.15em}
.card a.name:hover{opacity:.65;text-decoration-color:currentColor}

/* fit-vs-cover variants per Figma scaleMode */
.card.fit .img img{object-fit:contain;background:#f3f1ee}

/* lightbox styles imported from components/artwork-lightbox.css (see <link> in head) */

/* WORKS CAROUSEL — mobile-only; hidden on desktop */
.works-carousel{display:none}

/* ============================================================
   RESPONSIVE — TABLET (≤1100px)
   ============================================================ */
@media (max-width:1100px){
  :root{--pad-x:48px}
  .hero h1,.hero h2{font-size:60px}
  .card .img{height:380px}
}

/* ============================================================
   RESPONSIVE — MOBILE (≤768px)
   ============================================================ */
@media (max-width:768px){
  :root{--pad-x:16px}

  /* HERO */
  .hero{padding:32px 16px 24px}
  .hero-inner{flex-direction:column;align-items:flex-start;gap:8px}
  .hero h1,.hero h2{font-size:48px}
  .hero-side{margin-left:0;max-width:100%;font-size:14px;align-self:stretch;padding-bottom:0;margin-top:8px}

  /* GRID → hide; carousel takes over */
  .grid{display:none}
  .works-carousel{display:block;padding:24px 16px 32px}
  .works-carousel .tri{
    --tri-aspect: 3/4;
    --tri-center-w: 58%;
    --tri-peek-w: 28%;
    --tri-peek-h: 75%;
    --tri-peek-left: 0%;
    --tri-peek-right: 100%;
  }
  /* LIGHTBOX */
}

/* ============================================================
   RESPONSIVE — SMALL MOBILE (≤400px)
   ============================================================ */
@media (max-width:400px){
  .hero h1,.hero h2{font-size:36px}
  .card .name{font-size:12px}
}
</style>
</head>
<body>

<!-- NAV -->
<site-header></site-header>

<!-- HERO -->
<section class="hero">
  <div class="hero-inner">
    <div>
      <h1>THE ART</h1>
      <h2>works</h2>
    </div>
  </div>
</section>

<!-- Grid (desktop) + Carousel (mobile) — both rendered from single data source -->
<section class="grid" data-artwork-gallery id="works-grid"></section>
<section class="works-carousel" data-artwork-gallery id="works-carousel"></section>

<script type="application/json" id="works-data">
[
  {"img":"eitan-goldson-henrika","name_he":"איתן גולדסון","name_he_line2":"הנריקה רוטנברג","name_en":"eitan goldson","slug":"eitan-goldson","fit":true},
  {"img":"elsa-ars-brush","name_he":"אלסה ארס ברוש","name_en":"elsa ars brush","slug":"elsa-ars-brush"},
  {"img":"gal-polk","name_he":"גל פולק","name_en":"gal polk","slug":"gal-polk"},
  {"img":"tanya-shin","name_he":"טניה שין","name_en":"tanya shin","slug":"tanya-shin"},
  {"img":"zohar-shtrit","name_he":"זוהר שטרית","name_en":"zohar shitrit","slug":"zohar-shtrit","fit":true},
  {"img":"hila-loterstein","name_he":"הילה לוטרשטיין","name_en":"hila loterstein","slug":"hila-loterstein"},
  {"img":"nir-giorgio-levin","name_he":"ניר ג׳ורג׳יו לוין","name_en":"nir giorgio levin","slug":"nir-giorgio-levin"},
  {"img":"sami-david","name_he":"סמי דוד","name_en":"sami david","slug":"sami-david"},
  {"img":"zohar-ron","name_he":"זוהר רון","name_en":"zohar ron","slug":"zohar-ron","fit":true},
  {"img":"risa-oz","name_he":"ריסה עוז","name_en":"risa oz","slug":"risa-oz"},
  {"img":"zohar-ron-dan-ben-ari","name_he":"זוהר רון | דן בן ארי","name_en":"zohar ron | dan ben ari","slug":"zohar-ron-dan-ben-ari"},
  {"img":"adi-duak","name_he":"עדי דואק","name_en":"adi duek","slug":"adi-duak"}
]
</script>
<script>
(function(){
  var items=JSON.parse(document.getElementById('works-data').textContent);
  var base='../images/works/grid/';

  /* --- GRID (desktop) --- */
  var grid=document.getElementById('works-grid');
  grid.innerHTML=items.map(function(w){
    var src=base+w.img+'.webp';
    var href='../artists/'+w.slug+'/';
    return '<article class="card'+(w.fit?' fit':'')+'">'+
      '<div class="img" data-artwork-src="'+src+'" data-artwork-title="'+w.name_he+'" data-artwork-artist="'+w.name_en+'" data-artwork-link="'+href+'"'+(w.name_he_line2?' data-artwork-he-line2="'+w.name_he_line2.replace(/&/g,'&amp;').replace(/"/g,'&quot;')+'"':'')+'>'+
        '<img src="'+src+'" alt="'+w.name_he+'" decoding="async" fetchpriority="high">'+
      '</div>'+
      '<a class="name" href="'+href+'">'+w.name_he+(w.name_he_line2?'<br><span class="name-line2">'+w.name_he_line2+'</span>':'')+'</a>'+
    '</article>';
  }).join('');

  /* --- CAROUSEL (mobile) --- */
  var car=document.getElementById('works-carousel');
  var slides=items.map(function(w,i){
    var src=base+w.img+'.webp';
    var href='../artists/'+w.slug+'/';
    return '<img class="tri-slide" src="'+src+'" alt="'+w.name_he+(w.name_he_line2?' · '+w.name_he_line2:'')+'" draggable="false"'+(i?' loading="lazy"':'')+' data-caption="'+w.name_he+'"'+(w.name_he_line2?' data-caption-line2="'+w.name_he_line2.replace(/&/g,'&amp;').replace(/"/g,'&quot;')+'"':'')+' data-artwork-src="'+src+'" data-artwork-title="'+w.name_he+'" data-artwork-artist="'+w.name_en+'" data-artwork-link="'+href+'"'+(w.name_he_line2?' data-artwork-he-line2="'+w.name_he_line2.replace(/&/g,'&amp;').replace(/"/g,'&quot;')+'"':'')+' decoding="async">';
  }).join('');
  var dots=items.map(function(_,i){
    return '<button type="button" class="tri-dot'+(i===0?' is-on':'')+'" role="tab" aria-selected="'+(i===0)+'">';
  }).join('');
  car.innerHTML='<div class="tri" data-tri-loop="true"><div class="tri-frame">'+slides+'</div><div class="tri-dots" role="tablist" aria-label="gallery navigation">'+dots+'</div></div>';

  if(window.TriptychGallery) TriptychGallery.refresh();
  if(window.ArtworkLightbox) ArtworkLightbox.refreshFocusable();
})();
</script>

<!-- LIGHTBOX: shared component, see components/artwork-lightbox.{css,js} -->

<!-- FOOTER -->
<site-footer></site-footer>

<!-- Artwork Lightbox component (shared) — see CLAUDE.md §15 -->
<script src="../components/artwork-lightbox.js" defer></script>
<script src="../components/triptych-gallery.js" defer></script>

<!-- Site chrome: shared header + footer (single source of truth) -->
<script src="../components/site-chrome.js" defer></script>

<script src="../components/picture-upgrade.js" defer></script>
</body>
</html>
