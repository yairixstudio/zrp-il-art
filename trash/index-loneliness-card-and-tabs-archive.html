<script>
(function(){
  var thumbsEl = document.querySelector('.past-thumbs');
  var tabsEl   = document.querySelector('.past-tabs');
  if (!thumbsEl || !tabsEl) return;

  var data = null;
  var byGallery = {};

  function loadData(){
    return fetch('data/exhibitions.json')
      .then(function(r){ if(!r.ok) throw 0; return r.json(); })
      .then(function(j){ return j && j.archive_thumbnails; })
      .catch(function(){
        var node = document.getElementById('fallback-archive');
        try { return node ? JSON.parse(node.textContent) : null; }
        catch(e){ return null; }
      });
  }

  function renderThumbs(galleryId){
    var tab = byGallery[galleryId];
    if (!tab) return;
    var html = tab.thumbs.map(function(t){
      var title = (t.title_he || '').replace(/"/g,'&quot;');
      var link = t.exhibition_id ? ('exhibitions/'+encodeURIComponent(t.exhibition_id)+'/') : '';
      return '<div class="past-thumb" '+
                'data-artwork-src="'+t.image+'" '+
                'data-artwork-title="'+title+'" '+
                'data-artwork-exhibition="'+(t.exhibition_id||'')+'" '+
                (link  ? 'data-artwork-link="'+link+'" data-artwork-link-label="מעבר לתערוכה" ' : '')+
                'tabindex="0" role="button" aria-label="'+(t.n ? t.n+' — '+title : title)+'">'+
               '<span class="num">'+t.n+'</span>'+
               '<img src="'+t.image+'" alt="'+title+'" decoding="async" loading="lazy">'+
             '</div>';
    }).join('');
    thumbsEl.innerHTML = html;
    updateThumbsLayout();
    if (window.ArtworkLightbox && window.ArtworkLightbox.refreshFocusable){
      window.ArtworkLightbox.refreshFocusable();
    }
  }

  function updateThumbsLayout(){
    var isMobile = window.matchMedia('(max-width: 768px)').matches;
    if (!isMobile){
      thumbsEl.classList.remove('past-thumbs--centered');
      return;
    }
    var hasOverflow = thumbsEl.scrollWidth - thumbsEl.clientWidth > 1;
    thumbsEl.classList.toggle('past-thumbs--centered', !hasOverflow);
  }

  function setActive(galleryId){
    var btns = tabsEl.querySelectorAll('button[data-tab]');
    Array.prototype.forEach.call(btns, function(b){
      var on = b.getAttribute('data-tab') === galleryId;
      b.classList.toggle('active', on);
      b.classList.toggle('inactive', !on);
      b.setAttribute('aria-selected', on ? 'true' : 'false');
    });
    renderThumbs(galleryId);
  }

  tabsEl.addEventListener('click', function(e){
    var btn = e.target.closest('button[data-tab]');
    if (!btn) return;
    setActive(btn.getAttribute('data-tab'));
  });

  loadData().then(function(d){
    if (!d || !d.tabs) return;
    data = d;
    d.tabs.forEach(function(t){ byGallery[t.gallery_id] = t; });
    var initial = (d.tabs.filter(function(t){ return t.active; })[0] || d.tabs[0]).gallery_id;
    setActive(initial);
  });

  window.addEventListener('resize', function(){
    updateThumbsLayout();
  });
})();
</script>
