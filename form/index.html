<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zielinski &amp; Rozen</title>
<style>
  :root{
    --ink:#1B1B1B; --white:#FFFFFF; --line:#E2E2E2; --muted:#6B7280; --field:#F6F6F5;
    --ui:ui-sans-serif,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --serif:Georgia,"Times New Roman",serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--ui);color:var(--ink);background:var(--white);line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  a{color:inherit}
  .card{width:100%;max-width:440px;text-align:center}
  .logo{height:34px;margin:0 auto 28px;display:block}
  .lang-switch{position:fixed;top:16px;right:16px}
  [dir="rtl"] .lang-switch{right:auto;left:16px}
  .lang-switch select{font-family:var(--ui);font-size:13px;color:var(--muted);background:var(--white);border:1px solid var(--line);border-radius:8px;padding:7px 10px;cursor:pointer}
  .chip{display:inline-block;font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:5px 12px;margin-bottom:22px}
  h1{font-family:var(--serif);font-weight:400;font-size:30px;letter-spacing:.01em;margin-bottom:10px}
  .sub{font-size:15px;color:var(--muted);margin-bottom:28px}
  form{text-align:left}
  .field{margin-bottom:14px}
  .field input[type=text],.field input[type=email]{width:100%;font-family:var(--ui);font-size:16px;color:var(--ink);background:var(--field);border:1px solid var(--line);border-radius:10px;padding:13px 15px;outline:none;transition:border-color .15s}
  .field input:focus{border-color:var(--ink)}
  .consent{display:flex;align-items:flex-start;gap:10px;font-size:13px;color:var(--muted);margin:18px 2px 22px;text-align:left}
  [dir="rtl"] .consent{text-align:right}
  .consent input{margin-top:3px;flex:0 0 auto;width:16px;height:16px;accent-color:var(--ink)}
  .consent a{color:var(--ink);text-decoration:underline}
  .submit{width:100%;font-family:var(--ui);font-size:15px;font-weight:600;letter-spacing:.02em;color:var(--white);background:var(--ink);border:1px solid var(--ink);border-radius:10px;padding:14px;cursor:pointer;transition:opacity .15s}
  .submit:hover{opacity:.85}
  .submit[disabled]{opacity:.5;cursor:default}
  .status{font-size:14px;margin-top:16px;min-height:20px}
  .status.err{color:#B00020}
  .success{display:none;padding:24px 0}
  .success h2{font-family:var(--serif);font-weight:400;font-size:24px;margin-bottom:8px}
  .success p{color:var(--muted);font-size:15px}
  .is-done form,.is-done .sub{display:none}
  .is-done .success{display:block}
</style>
</head>
<body>
  <div class="lang-switch">
    <select id="langSel" aria-label="Language"></select>
  </div>

  <main class="card" id="card">
    <img class="logo" src="../images/header:footer:general/logo.svg" alt="Zielinski &amp; Rozen" width="177" height="37">
    <div class="chip" id="locChip" hidden></div>
    <h1 id="t-title">Stay in touch</h1>
    <p class="sub" id="t-sub">Join our world of scent and art.</p>

    <form id="subscribeForm" novalidate>
      <div class="field">
        <input type="text" id="firstName" name="first_name" autocomplete="given-name" placeholder="First name">
      </div>
      <div class="field">
        <input type="email" id="email" name="email" autocomplete="email" inputmode="email" required placeholder="Email address">
      </div>
      <label class="consent">
        <input type="checkbox" id="consent" required>
        <span id="t-consent">I agree to receive emails and accept the <a href="../privacy/" target="_blank" rel="noopener">privacy policy</a>.</span>
      </label>
      <button type="submit" class="submit" id="submitBtn">Subscribe</button>
      <p class="status" id="status" role="status" aria-live="polite"></p>
    </form>

    <div class="success">
      <h2 id="t-success">Thank you — you're on the list.</h2>
      <p id="t-success-sub"></p>
    </div>
  </main>

<script src="../components/countries.js"></script>
<script>
(function(){
  "use strict";

  /* ============================================================
     Configuration — set these to connect the form to Klaviyo.
     companyId = public API key (site id). listId = target list id.
     Leave blank to run the form without sending data.
     ============================================================ */
  var KLAVIYO = { companyId: "", listId: "" };

  var STR = {
    en:{dir:"ltr",title:"Stay in touch",sub:"Join our world of scent and art.",first:"First name",email:"Email address",consent:'I agree to receive emails and accept the <a href="../privacy/" target="_blank" rel="noopener">privacy policy</a>.',submit:"Subscribe",sending:"Sending…",success:"Thank you — you're on the list.",successSub:"We'll be in touch soon.",error:"Something went wrong. Please try again.",required:"Please complete the required fields."},
    ar:{dir:"rtl",title:"لنبقَ على تواصل",sub:"ادخل عالمنا من العطر والفن.",first:"الاسم الأول",email:"البريد الإلكتروني",consent:'أوافق على تلقّي الرسائل وعلى <a href="../privacy/" target="_blank" rel="noopener">سياسة الخصوصية</a>.',submit:"اشترك",sending:"جارٍ الإرسال…",success:"شكرًا — أنت الآن في القائمة.",successSub:"سنتواصل معك قريبًا.",error:"حدث خطأ ما. يرجى المحاولة مرة أخرى.",required:"يرجى تعبئة الحقول المطلوبة."},
    zh:{dir:"ltr",title:"保持联系",sub:"走进我们的香氛与艺术世界。",first:"名字",email:"电子邮箱",consent:'我同意接收邮件并接受<a href="../privacy/" target="_blank" rel="noopener">隐私政策</a>。',submit:"订阅",sending:"提交中…",success:"谢谢 — 您已加入列表。",successSub:"我们会尽快与您联系。",error:"出错了，请重试。",required:"请填写必填项。"},
    fr:{dir:"ltr",title:"Restons en contact",sub:"Entrez dans notre univers de parfum et d'art.",first:"Prénom",email:"Adresse e-mail",consent:'J\'accepte de recevoir des e-mails et la <a href="../privacy/" target="_blank" rel="noopener">politique de confidentialité</a>.',submit:"S'inscrire",sending:"Envoi…",success:"Merci — vous êtes inscrit(e).",successSub:"Nous vous écrirons bientôt.",error:"Une erreur s'est produite. Veuillez réessayer.",required:"Veuillez remplir les champs obligatoires."},
    de:{dir:"ltr",title:"Bleiben wir in Kontakt",sub:"Tauchen Sie ein in unsere Welt aus Duft und Kunst.",first:"Vorname",email:"E-Mail-Adresse",consent:'Ich möchte E-Mails erhalten und akzeptiere die <a href="../privacy/" target="_blank" rel="noopener">Datenschutzrichtlinie</a>.',submit:"Abonnieren",sending:"Senden…",success:"Danke — Sie sind dabei.",successSub:"Wir melden uns bald.",error:"Etwas ist schiefgelaufen. Bitte versuchen Sie es erneut.",required:"Bitte füllen Sie die Pflichtfelder aus."},
    he:{dir:"rtl",title:"נשארים בקשר",sub:"היכנסו לעולם של ניחוח ואמנות.",first:"שם פרטי",email:"כתובת אימייל",consent:'אני מאשר/ת קבלת מיילים ומסכים/ה ל<a href="../privacy/" target="_blank" rel="noopener">מדיניות הפרטיות</a>.',submit:"הרשמה",sending:"שולח…",success:"תודה — נוספת לרשימה.",successSub:"נהיה בקשר בקרוב.",error:"משהו השתבש. נסו שוב.",required:"נא למלא את שדות החובה."},
    it:{dir:"ltr",title:"Restiamo in contatto",sub:"Entra nel nostro mondo di profumo e arte.",first:"Nome",email:"Indirizzo email",consent:'Accetto di ricevere email e l\'<a href="../privacy/" target="_blank" rel="noopener">informativa sulla privacy</a>.',submit:"Iscriviti",sending:"Invio…",success:"Grazie — sei nella lista.",successSub:"Ti scriveremo presto.",error:"Qualcosa è andato storto. Riprova.",required:"Compila i campi obbligatori."},
    ja:{dir:"ltr",title:"つながりましょう",sub:"香りとアートの世界へ。",first:"名前",email:"メールアドレス",consent:'メールの受信と<a href="../privacy/" target="_blank" rel="noopener">プライバシーポリシー</a>に同意します。',submit:"登録する",sending:"送信中…",success:"ありがとうございます — 登録が完了しました。",successSub:"近日中にご連絡します。",error:"問題が発生しました。もう一度お試しください。",required:"必須項目を入力してください。"},
    ru:{dir:"ltr",title:"Оставайтесь на связи",sub:"Откройте наш мир аромата и искусства.",first:"Имя",email:"Электронная почта",consent:'Я согласен получать письма и принимаю <a href="../privacy/" target="_blank" rel="noopener">политику конфиденциальности</a>.',submit:"Подписаться",sending:"Отправка…",success:"Спасибо — вы в списке.",successSub:"Мы скоро свяжемся с вами.",error:"Что-то пошло не так. Попробуйте ещё раз.",required:"Пожалуйста, заполните обязательные поля."},
    es:{dir:"ltr",title:"Mantengámonos en contacto",sub:"Entra en nuestro mundo de aroma y arte.",first:"Nombre",email:"Correo electrónico",consent:'Acepto recibir correos y la <a href="../privacy/" target="_blank" rel="noopener">política de privacidad</a>.',submit:"Suscribirse",sending:"Enviando…",success:"Gracias — ya estás en la lista.",successSub:"Te escribiremos pronto.",error:"Algo salió mal. Inténtalo de nuevo.",required:"Completa los campos obligatorios."}
  };
  var LANG_NAMES = {ar:"العربية",zh:"中文",en:"English",fr:"Français",de:"Deutsch",he:"עברית",it:"Italiano",ja:"日本語",ru:"Русский",es:"Español"};
  var LANG_ORDER = ["ar","zh","en","fr","de","he","it","ja","ru","es"];

  var $ = function(id){ return document.getElementById(id); };
  var params = new URLSearchParams(window.location.search);

  // ---- properties forwarded to Klaviyo (everything passed on the link) ----
  var props = {};
  params.forEach(function(v, k){ if (k !== "lang") props[k] = v; });
  var countryCode = props.country || "";
  var countryName = "";
  if (countryCode) {
    var match = (window.COUNTRIES || []).filter(function(c){ return c.code === countryCode; })[0];
    countryName = match ? match.name : countryCode;
    if (match) props.country_name = countryName;
  }

  // ---- language ----
  function pickLang(){
    var q = (params.get("lang") || "").toLowerCase();
    if (STR[q]) return q;
    return "en";
  }
  var lang = pickLang();

  var langSel = $("langSel");
  LANG_ORDER.forEach(function(code){
    var o = document.createElement("option");
    o.value = code; o.textContent = LANG_NAMES[code];
    langSel.appendChild(o);
  });

  function applyLang(code){
    lang = code;
    var t = STR[code];
    document.documentElement.lang = code;
    document.documentElement.dir = t.dir;
    $("t-title").textContent = t.title;
    $("t-sub").textContent = t.sub;
    $("firstName").placeholder = t.first;
    $("email").placeholder = t.email;
    $("t-consent").innerHTML = t.consent;
    $("submitBtn").textContent = t.submit;
    $("t-success").textContent = t.success;
    $("t-success-sub").textContent = t.successSub;
    langSel.value = code;
  }
  langSel.addEventListener("change", function(){ applyLang(langSel.value); });
  applyLang(lang);

  // ---- location chip ----
  var locParts = [props.city, countryName].filter(Boolean);
  if (locParts.length) {
    var chip = $("locChip");
    chip.textContent = locParts.join(" · ");
    chip.hidden = false;
  }

  // ---- submit ----
  var form = $("subscribeForm"), statusEl = $("status"), btn = $("submitBtn");

  function setStatus(msg, isErr){
    statusEl.textContent = msg || "";
    statusEl.className = "status" + (isErr ? " err" : "");
  }

  function sendToKlaviyo(email, firstName){
    if (!KLAVIYO.companyId || !KLAVIYO.listId) return Promise.resolve(true);
    var attrs = { email: email, properties: props };
    if (firstName) attrs.first_name = firstName;
    var body = {
      data: {
        type: "subscription",
        attributes: {
          custom_source: props.campaign || "QR code",
          profile: { data: { type: "profile", attributes: attrs } }
        },
        relationships: { list: { data: { type: "list", id: KLAVIYO.listId } } }
      }
    };
    return fetch("https://a.klaviyo.com/client/subscriptions/?company_id=" + encodeURIComponent(KLAVIYO.companyId), {
      method: "POST",
      headers: { "Content-Type": "application/json", "revision": "2024-10-15" },
      body: JSON.stringify(body)
    }).then(function(res){ return res.ok; });
  }

  form.addEventListener("submit", function(e){
    e.preventDefault();
    var email = $("email").value.trim();
    var firstName = $("firstName").value.trim();
    var ok = $("consent").checked && /\S+@\S+\.\S+/.test(email);
    if (!ok) { setStatus(STR[lang].required, true); return; }
    btn.disabled = true;
    setStatus(STR[lang].sending, false);
    sendToKlaviyo(email, firstName).then(function(success){
      if (success) {
        document.body.classList.add("is-done");
      } else {
        btn.disabled = false;
        setStatus(STR[lang].error, true);
      }
    }).catch(function(){
      btn.disabled = false;
      setStatus(STR[lang].error, true);
    });
  });
})();
</script>
</body>
</html>
