<!DOCTYPE html>
<html lang="he" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Art Works — Zielinski &amp; Rozen</title>
<link rel="preload" href="../פונטים/Copperplate-Light.ttf" as="font" type="font/ttf" crossorigin>
<link rel="preload" href="../פונטים/CopperplateCC-Bold.otf" as="font" type="font/otf" crossorigin>
<link rel="preload" href="../פונטים/FbEzmel-Regular.otf" as="font" type="font/otf" crossorigin>
<link rel="stylesheet" href="../components/site-boot.css">
<meta name="description" content="The Art Works — original artworks from the artists of Zielinski & Rozen Galleries">
<link rel="stylesheet" href="../components/artwork-lightbox.css">
<style>
/* ===== LOCAL FONTS ===== */
@font-face{font-family:"Copperplate";src:url("../פונטים/Copperplate-Light.ttf") format("truetype");font-weight:300;font-style:normal;font-display:swap}
@font-face{font-family:"Copperplate";src:url("../פונטים/Copperplate.otf") format("opentype");font-weight:400;font-style:normal;font-display:swap}
@font-face{font-family:"Copperplate";src:url("../פונטים/CopperplateCC-Bold.otf") format("opentype");font-weight:700;font-style:normal;font-display:swap}
@font-face{font-family:"Copperplate";src:url("../פונטים/CopperplateCC-Heavy.otf") format("opentype");font-weight:900;font-style:normal;font-display:swap}
@font-face{font-family:"FbEzmel";src:url("../פונטים/FbEzmel-Light.otf") format("opentype");font-weight:300;font-style:normal;font-display:swap}
@font-face{font-family:"FbEzmel";src:url("../פונטים/FbEzmel-Regular.otf") format("opentype");font-weight:400;font-style:normal;font-display:swap}

:root{
  --white:#FFFFFF;
  --bg-grey:#EEF0EF;
  --ink:#1B1B1B;
  --grey-mid:#7D7D7D;
  --copy-grey:#6B7280;
  --max:1440px;
  --cop:"Copperplate","Times New Roman",serif;
  --heb:"FbEzmel","Arial Hebrew","David Libre",serif;
  --pad-x:96px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;overflow-x:clip}
body{background:var(--white);color:var(--ink);font-family:var(--cop);-webkit-font-smoothing:antialiased;overflow-x:clip;max-width:100vw}
img{display:block;max-width:100%;height:auto}
a{color:inherit;text-decoration:none}
button{font:inherit;cursor:pointer;background:none;border:0;color:inherit}

/* GLOBAL CASING RULE — all English text renders UPPERCASE (project-wide).
   Hebrew is exempt. See CLAUDE.md §9 / conventions.md §5. */
body{text-transform:uppercase}
.heb,.heb *,[dir="rtl"],[dir="rtl"] *{text-transform:none;font-family:var(--heb)}

/* ===== HERO (THE ART works) ===== */
.hero{background:var(--bg-grey);padding:48px var(--pad-x) 40px}
.hero-inner{width:100%;max-width:var(--max);margin:0 auto;text-align:right}
.hero h1,.hero h2{font-family:var(--cop);font-size:80px;line-height:.96;color:var(--ink);letter-spacing:.02em}
.hero h1{font-weight:700}
.hero h2{font-weight:300}

/* ===== ARTWORK GRID — 2 columns (desktop + mobile), per Figma 491:928 / 489:4 ===== */
.grid{
  max-width:var(--max);margin:0 auto;
  display:grid;grid-template-columns:repeat(2,1fr);
  column-gap:16px;row-gap:64px;
  padding:48px var(--pad-x);background:var(--white);
}
.card{display:flex;flex-direction:column;gap:16px;min-width:0;height:100%}
.card .img{position:relative;width:100%;aspect-ratio:100/121;overflow:hidden;background:#f3f1ee;cursor:pointer}
.card .img img{width:100%;height:100%;object-fit:contain;transition:transform .7s ease}
.card .img::after{content:"";position:absolute;inset:0;background:rgba(27,27,27,0);transition:background .3s;pointer-events:none}
.card .img:hover img{transform:scale(1.03)}
.card .img:hover::after{background:rgba(27,27,27,.05)}

/* card meta — right-aligned (RTL), per Figma Frame 376/379 */
.meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;text-align:right;flex:1}
.meta .artist{font-family:var(--heb);font-weight:400;font-size:18px;color:var(--ink);line-height:1.25;direction:rtl}
.meta .artist.is-en{font-family:var(--cop);font-weight:700;text-transform:uppercase;letter-spacing:.03em;direction:ltr}
.meta a.artist{transition:opacity .2s}
.meta a.artist:hover{opacity:.6}
.meta .title{font-size:16px;color:var(--ink);line-height:1.3}
.meta .title.is-he{font-family:var(--heb);direction:rtl;text-transform:none}
.meta .title.is-en{font-family:var(--cop);font-weight:300;text-transform:uppercase;letter-spacing:.03em;direction:ltr}
.meta .title.is-bi{display:inline-flex;flex-direction:row;direction:rtl;align-items:baseline;justify-content:flex-end;gap:0.35em;flex-wrap:wrap;max-width:100%}
.meta .title.is-bi .title-he{font-family:var(--heb);direction:rtl;text-transform:none}
.meta .title.is-bi .title-sep{display:inline-block;width:1.4px;height:0.85em;background:var(--ink);opacity:.55;align-self:center;flex-shrink:0;direction:ltr;unicode-bidi:isolate}
.meta .title.is-bi .title-en{font-family:var(--cop);font-weight:300;text-transform:uppercase;letter-spacing:.03em;direction:ltr;unicode-bidi:isolate}
.meta .details{font-family:var(--heb);font-weight:300;font-size:15px;color:var(--grey-mid);line-height:1.2;direction:rtl;max-width:100%}
.meta-foot{display:flex;flex-direction:column;align-items:flex-end;gap:6px;margin-top:auto;padding-top:12px}
.sold{font-family:var(--heb);font-weight:300;font-size:14px;color:var(--ink);border:1.4px solid var(--ink);padding:2px 10px;line-height:1.25}
.gallery{font-family:var(--cop);font-weight:700;font-size:10px;color:var(--ink);text-transform:uppercase;letter-spacing:.02em;direction:ltr;transition:opacity .2s}
.gallery:hover{opacity:.6}

/* lightbox styles imported from components/artwork-lightbox.css (see <link> in head) */

/* ============================================================
   RESPONSIVE — TABLET (≤1100px)
   ============================================================ */
@media (max-width:1100px){
  :root{--pad-x:48px}
  .hero h1,.hero h2{font-size:60px}
  .grid{row-gap:48px}
}

/* ============================================================
   RESPONSIVE — MOBILE (≤768px) — stays 2-up per Figma 489:4
   ============================================================ */
@media (max-width:768px){
  :root{--pad-x:16px}
  .hero{padding:32px 16px 8px}
  .hero-inner{text-align:center}
  .hero h1{font-size:clamp(40px,15vw,58px)}
  .hero h2{font-size:clamp(64px,24vw,91px);margin-top:-.12em}
  .grid{padding:32px 16px;column-gap:16px;row-gap:40px}
  .card{gap:12px}
  .meta .artist{font-size:16px}
  .meta .title{font-size:15px}
  .meta .details{font-size:15px}
}

/* ============================================================
   RESPONSIVE — SMALL MOBILE (≤390px)
   ============================================================ */
@media (max-width:390px){
  .grid{column-gap:12px}
  .meta .artist{font-size:15px}
}
</style>
</head>

<script>
(function(){
  var items = JSON.parse(document.getElementById('works-data').textContent);
  var base  = '../images/works/v2/';
  var HEB   = /[א-ת]/;

  function esc(s){
    if(s==null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  function srcset(w){
    return w.widths.map(function(width,i){
      var last = i === w.widths.length-1;
      var file = last ? (base+w.img+'.webp') : (base+w.img+'-'+width+'w.webp');
      return file+' '+width+'w';
    }).join(', ');
  }
  function artistName(w){ return w.artist_he || w.artist_en || ''; }
  function captionTitle(w){
    if(w.title_he && w.title_en) return w.title_he + ' · ' + w.title_en;
    return w.title_he || w.title_en || '';
  }

  function titleHtml(w){
    if(w.title_he && w.title_en){
      return '<span class="title is-bi">'+
        '<span class="title-he">'+esc(w.title_he)+'</span>'+
        '<span class="title-sep" aria-hidden="true"></span>'+
        '<span class="title-en">'+esc(w.title_en)+'</span>'+
      '</span>';
    }
    if(w.title_he) return '<span class="title is-he">'+esc(w.title_he)+'</span>';
    if(w.title_en) return '<span class="title is-en">'+esc(w.title_en)+'</span>';
    return '';
  }
  function artistHtml(w){
    var href = '../artists/'+w.artist_slug+'/';
    var cls  = w.artist_he ? 'is-he' : 'is-en';
    var name = w.artist_he || w.artist_en;
    return '<a class="artist '+cls+'" href="'+href+'">'+esc(name)+'</a>';
  }

  var grid = document.getElementById('works-grid');
  grid.innerHTML = items.map(function(w,i){
    var main   = base+w.img+'.webp';
    var href   = '../artists/'+w.artist_slug+'/';
    var alt    = artistName(w) + (captionTitle(w) ? ' — '+captionTitle(w) : '');
    var loadAttr = i ? 'loading="lazy"' : 'fetchpriority="high"';
    var imgTag = '<img src="'+main+'" srcset="'+srcset(w)+'" sizes="(max-width:768px) 46vw, (max-width:1100px) 45vw, 600px" '+
                 'width="'+w.w+'" height="'+w.h+'" alt="'+esc(alt)+'" decoding="async" '+loadAttr+'>';
    var details = w.details_he ? '<span class="details">'+esc(w.details_he)+'</span>' : '';
    var foot = (w.sold ? '<span class="sold">נמכר</span>' : '') +
               '<a class="gallery" href="../#galleries">'+esc(w.gallery_en)+'</a>';
    return '<article class="card" data-artwork-gallery>'+
        '<div class="img" data-artwork-src="'+main+'" data-artwork-title="'+esc(captionTitle(w))+'" '+
             'data-artwork-artist="'+esc(artistName(w))+'" data-artwork-link="'+href+'">'+
          imgTag+
        '</div>'+
        '<div class="meta">'+
          artistHtml(w)+
          titleHtml(w)+
          details+
          '<div class="meta-foot">'+foot+'</div>'+
        '</div>'+
      '</article>';
  }).join('');

  if(window.ArtworkLightbox) ArtworkLightbox.refreshFocusable();
  if(window.PictureUpgrade)  PictureUpgrade.refresh(grid);
})();
</script>
