:root{
  --white:#FFFFFF;
  --bg-grey:#EEF0EF;
  --ink:#1B1B1B;
  --grey-mid:#808080;
  --copy-grey:#6B7280;
  --artist:#828282;
  --slide-active:#515151;
  --max:1440px;
  --cop:"Copperplate","Times New Roman",serif;
  --heb:"FbEzmel","Arial Hebrew","David Libre",serif;
  --exo-title-en:"Solway","Copperplate","Times New Roman",serif;
  --pad-x:96px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--white);color:var(--ink);font-family:var(--cop);-webkit-font-smoothing:antialiased;overflow-x:hidden}
img{display:block;max-width:100%;height:auto}
a{color:inherit;text-decoration:none}
button{font:inherit;cursor:pointer;background:none;border:0;color:inherit}

/* GLOBAL CASING — English UPPERCASE everywhere; Hebrew exempt. CLAUDE.md §9.2 */
body{text-transform:uppercase}
.heb,.heb *,[dir="rtl"],[dir="rtl"] *{text-transform:none;font-family:var(--heb)}

.only-mobile{display:none}
.only-desktop{display:block}

/* ===== NAV/FOOTER moved to ../../components/site-chrome.css ===== */

/* ============================================================
   EXHIBITION HERO BLOCK — desktop (gray bg + side image)
   ============================================================ */
.ex-hero{background:var(--bg-grey);padding:48px var(--pad-x) 32px;display:flex;justify-content:center}
.ex-hero .row{display:flex;gap:48px;align-items:stretch;width:100%;max-width:var(--max);margin-inline:auto}
.ex-hero .text-col{flex:1;min-width:0;display:flex;flex-direction:column;padding:0 16px}
.ex-hero .text-stack{width:100%;max-width:676px;margin-inline-start:auto;display:flex;flex-direction:column;gap:32px}
.ex-hero .status-row{display:flex;justify-content:flex-end;align-items:center;gap:16px;flex-wrap:wrap;width:100%}
.ex-hero .badge{display:inline-flex;align-items:center;gap:10px;padding:4px 8px;border:1px solid var(--ink);min-height:30px}
.ex-hero .badge.heb-badge{font-family:var(--heb);font-weight:300;font-size:18px}
.ex-hero .badge.status-badge{font-family:var(--cop);font-weight:300;font-size:18px;letter-spacing:.04em}
.ex-hero .letter-heading{font-family:var(--cop);font-weight:400;font-size:36px;line-height:1.35;text-align:right;color:var(--ink);letter-spacing:.04em;width:100%;word-break:break-word}
.ex-hero .letter-heading[hidden]{display:none !important}
.ex-hero .descblock{display:flex;flex-direction:column;gap:0;align-items:flex-end;width:100%;container-type:inline-size}
.ex-hero .descblock .desc{width:100%;font-family:var(--heb);font-weight:300;font-size:18px;line-height:1.45;text-align:right;direction:rtl;color:var(--ink)}
.ex-hero .curator-footer{display:flex;flex-direction:column;align-items:flex-end;width:100%;padding-top:24px;gap:16px}
.ex-hero .curator-footer[hidden]{display:none !important}
.ex-hero .hero-divider{width:72px;height:1px;background:#d2d2d2;flex-shrink:0;border:0}
.ex-hero .curator-credit{font-family:var(--heb);font-weight:300;font-size:18px;line-height:normal;text-align:right;color:var(--ink);white-space:nowrap}
.ex-hero .curator-credit a{color:inherit;text-decoration:none}
.ex-hero .curator-credit a:hover{text-decoration:underline}
.ex-hero .descblock .desc p{margin:0 0 14px}
.ex-hero .descblock .desc p:last-child{margin-bottom:0}
.ex-hero .descblock .desc p.regular{font-weight:400}
.ex-hero .descblock .desc p.heading-en{font-family:var(--cop);font-weight:400;font-size:22px;line-height:1;text-align:right;direction:ltr;letter-spacing:.04em;margin:0 0 18px;white-space:nowrap;width:100%;max-width:100%;box-sizing:border-box;overflow:hidden}
.ex-hero .img-col{flex:0 0 492px;display:flex;justify-content:flex-end;align-self:flex-start}
.ex-hero .img-frame{position:relative;flex-shrink:0;width:492px;height:auto;aspect-ratio:492/744;overflow:hidden}
.ex-hero .img-frame img{width:100%;height:100%;object-fit:cover;object-position:center center}
.ex-hero .img-frame image-gallery .gal-slide img{object-position:center center}
/* Gallery fills the frame; no z-index on it so its arrows/dots (z:2)
   participate in the .img-frame stacking context above the gradient. */
.ex-hero .img-frame > image-gallery{position:absolute;inset:0}
.ex-hero .img-frame::after{content:"";position:absolute;inset:0;background:linear-gradient(0deg,rgba(0,0,0,.85) 0%,rgba(0,0,0,0) 70%);pointer-events:none;z-index:1}
.ex-hero .overlay{position:absolute;left:90px;top:326px;width:max-content;max-width:calc(100% - 32px);display:flex;flex-direction:column;gap:6px;color:#fff;z-index:2;pointer-events:none}
.ex-hero .overlay > *{pointer-events:auto}
.ex-hero .overlay .title-bar{display:flex;align-items:center;justify-content:center;gap:13px;flex-wrap:nowrap;white-space:nowrap}
.ex-hero .overlay .title-bar .lbl{font-family:var(--cop);font-weight:300;font-size:26px;letter-spacing:.04em;white-space:nowrap;flex-shrink:0}
.ex-hero .overlay .title-bar .dot{display:block;width:6px;height:6px;border-radius:300px;background:#fff;flex-shrink:0}
.ex-hero .overlay .title-he{font-family:var(--heb);font-weight:400;font-size:29px;text-align:center;direction:rtl;line-height:1.1}
.ex-hero .overlay .title-en{font-family:var(--exo-title-en);font-weight:300;font-size:17px;text-align:center;line-height:1.3;letter-spacing:.04em}
.ex-hero.ex-hero--overlay-en-only .overlay .title-bar,
.ex-hero.ex-hero--overlay-en-only .overlay .title-he{display:none !important}
.ex-hero .img-frame:not(.is-hero-slide-0) .overlay{opacity:0;visibility:hidden;pointer-events:none;transition:opacity .2s ease,visibility 0s linear .2s}
.ex-hero .img-frame.is-hero-slide-0 .overlay{opacity:1;visibility:visible;pointer-events:none;transition:opacity .2s ease,visibility 0s linear 0s}

/* ============================================================
   ARTISTS BAND — horizontally scrollable on all sizes
   ============================================================ */
.ex-artists,.ex-curator{padding:32px var(--pad-x);background:var(--white);display:flex;justify-content:center}
.ex-artists .wrap,.ex-curator .wrap{display:flex;flex-direction:column;gap:16px;width:100%;max-width:1248px}
.ex-artists .head,.ex-curator .head{display:flex;align-items:center;justify-content:space-between;gap:16px}
.ex-artists .head .label,.ex-curator .head .label{display:flex;align-items:center;gap:8px;font-family:var(--cop);font-weight:300;font-size:28px;color:var(--ink);letter-spacing:.04em}
.ex-artists .head .rule,.ex-curator .head .rule{flex:1;height:1px;background:var(--ink);opacity:.85}
.ex-artists .strip,.ex-curator .strip{display:flex;gap:6px;overflow-x:auto;overflow-y:hidden;scroll-snap-type:x proximity;padding-bottom:8px;-webkit-overflow-scrolling:touch}
.ex-artists .strip::-webkit-scrollbar,.ex-curator .strip::-webkit-scrollbar{height:4px}
.ex-artists .strip::-webkit-scrollbar-thumb,.ex-curator .strip::-webkit-scrollbar-thumb{background:var(--bg-grey)}
.ex-artists .card,.ex-curator .card{flex:0 0 178px;display:flex;flex-direction:column;align-items:center;gap:8px;scroll-snap-align:start;cursor:pointer}
.ex-artists .card .pic,.ex-curator .card .pic{width:178px;height:148px;overflow:hidden;background:var(--bg-grey)}
.ex-artists .card .pic picture,.ex-curator .card .pic picture{display:block;width:100%;height:100%}
.ex-artists .card .pic img,.ex-curator .card .pic img{width:100%;height:100%;object-fit:cover;transition:transform .6s ease}
.ex-artists .card:hover .pic img,.ex-curator .card:hover .pic img{transform:scale(1.04)}
.ex-artists .card .name,.ex-curator .card .name{font-family:var(--cop);font-weight:300;font-size:18px;line-height:18px;text-align:center;color:var(--artist);text-transform:uppercase;white-space:pre-line;word-break:normal;overflow-wrap:normal;hyphens:none;text-wrap:balance}
.ex-curator[hidden]{display:none !important}


/* ============================================================
   RESPONSIVE — TABLET (≤1100px)
   ============================================================ */
@media (max-width:1100px){
  :root{--pad-x:48px}
  .ex-hero .text-stack{max-width:100%;margin-inline:auto}
  .ex-hero .img-col{flex-basis:380px}
  .ex-hero .img-frame{width:100%;max-width:380px;height:auto;aspect-ratio:492/744}
  .ex-hero .overlay{left:50px;top:200px;width:280px}
  .ex-hero .overlay .title-he{font-size:24px}
  .ex-hero .overlay .title-bar .lbl{font-size:20px}
}

/* ============================================================
   RESPONSIVE — MOBILE (≤768px)
   ============================================================ */
@media (max-width:768px){
  :root{--pad-x:16px}
  .only-desktop{display:none !important}
  .only-mobile{display:block}

  /* HERO becomes vertical: banner image full-width on top, then info section, then artists */
  .ex-hero{padding:0;background:var(--white);display:block}
  .ex-hero .row{flex-direction:column;gap:0;width:100%}
  .ex-hero .text-col{order:2}
  .ex-hero .img-col{flex:0 0 auto;width:100%;justify-content:center;order:1}
  /* Fluid height with width — avoids object-fit:cover re-cropping when only width grows */
  .ex-hero .img-frame{width:100%;max-width:100%;height:auto;aspect-ratio:492/744}
  /* Mobile darken layer on top of gallery slides, below arrows/dots/overlay. */
  .ex-hero .img-frame::before{content:"";position:absolute;inset:0;background:rgba(27,27,27,0.4);z-index:1;pointer-events:none}
  .ex-hero .img-frame::after{display:none}
  .ex-hero .img-frame img{position:relative}
  .ex-hero .overlay{left:50%;top:50%;transform:translate(-50%,-50%);width:min(313px,calc(100% - 32px));text-align:center;align-items:center}
  .ex-hero .overlay .title-bar .lbl{font-size:22px}
  .ex-hero .overlay .title-he{font-size:24px}
  .ex-hero .overlay .title-en{font-size:15px}

  /* slideshow dots */
  .slide-dots{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);display:flex;gap:8px;z-index:2}
  .slide-dots span{width:32px;height:2px;background:var(--slide-active)}
  .slide-dots span.on{background:#fff}

  /* INFO SECTION (status row + description) — white bg, RTL aligned */
  .ex-hero .text-col{padding:24px 16px;align-items:stretch;width:100%;min-width:0;overflow-x:clip}
  .ex-hero .text-stack{gap:24px;max-width:100%;min-width:0;margin-inline:0}
  .ex-hero .descblock{max-width:100%;min-width:0;overflow-x:clip}
  .ex-hero .descblock .desc{max-width:100%;min-width:0}
  .ex-hero .status-row{justify-content:flex-end;width:100%}
  .ex-hero .letter-heading{font-size:28px;line-height:1.32}
  .ex-hero .badge.heb-badge{font-size:16px;font-weight:300}
  .ex-hero .badge.status-badge{font-size:16px}
  .ex-hero .descblock{width:100%;align-items:flex-end}
  .ex-hero .descblock .desc{font-size:16px;line-height:1.42;max-width:100%}
  .ex-hero .curator-credit{font-size:16px;white-space:normal}

  /* ARTISTS + CURATOR — smaller cards on mobile (Figma exhibition curator 119:702) */
  .ex-artists,.ex-curator{padding:32px 16px}
  .ex-artists .head .label,.ex-curator .head .label{font-size:20px}
  .ex-artists .card,.ex-curator .card{flex:0 0 96px}
  .ex-artists .card .pic,.ex-curator .card .pic{width:96px;height:80px}
  .ex-artists .card .name,.ex-curator .card .name{font-size:13px;line-height:14px}

}

/* loading state */
.loading{padding:120px 24px;text-align:center;font-family:var(--cop);font-weight:300;color:var(--grey-mid);letter-spacing:.08em}

a.card.is-linked{cursor:pointer;display:flex;flex-direction:column;color:inherit;text-decoration:none}
a.card.is-linked:hover .pic img{filter:brightness(.96)}
a.card.is-linked .pic img{transition:filter .25s}
</style>

    }catch(_){/* file:// or offline */}
    const el = document.getElementById(embeddedId);
    if(el) return JSON.parse(el.textContent);
    throw new Error('cannot load ' + path);
  }

    `;

      while (size > minPx && el.scrollWidth > limit) {
        size -= 0.25;
        el.style.fontSize = size + 'px';
      }
    };
    run();
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(run);
  }

  if (heroSec) {
    fitExHeadingEn(heroSec);
    const descBlock = heroSec.querySelector('.descblock');
    if (descBlock && typeof ResizeObserver !== 'undefined') {
      new ResizeObserver(() => fitExHeadingEn(heroSec)).observe(descBlock);
    }
    window.addEventListener('resize', () => fitExHeadingEn(heroSec), { passive: true });
  }

  function syncHeroSlideOverlay() {
    if (!imgFrame) return;
    const gal = imgFrame.querySelector('image-gallery');
    let idx = 0;
    if (gal && typeof gal._idx === 'number') idx = gal._idx;
    imgFrame.classList.toggle('is-hero-slide-0', idx === 0);
  }

  customElements.whenDefined('image-gallery').then(() => {
    syncHeroSlideOverlay();
    const gal = imgFrame && imgFrame.querySelector('image-gallery');
    if (gal) {
      gal.addEventListener('gallery:change', (e) => {
        const i = e.detail && typeof e.detail.index === 'number' ? e.detail.index : 0;
        imgFrame.classList.toggle('is-hero-slide-0', i === 0);
      });
    }
  });
})();
</script>
