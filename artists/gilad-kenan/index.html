<script id="ex-statements-inline">window.__EX_STATEMENTS_INLINE__=[{"artist_slug":"aharon-bas","exhibition_title_he":"הקולפן","exhibition_slug":"the-peeler","exhibition_route":"opencalls/the-peeler","statement_he":["היצירה \"ניגודים\" מבטאת את לב עולמו היצירתי: ההבנה שהאדם אינו עשוי מקו אחד ברור, אלא מריבוי כוחות, מאבקים, אהבות ופחדים. דווקא הניגודים שבתוכנו הם שמרכיבים את האנושיות שלנו — ומגלים שגם האחר, בפנים אחרות ובשם אחר, נושא בתוכו את אותה מלחמה, באותו הלב."]},{"artist_slug":"bar-cohen","exhibition_title_he":"הקולפן","exhibition_slug":"the-peeler","exhibition_route":"opencalls/the-peeler","statement_he":["העבודה \"במקרה\" נולדה מתוך תקופה של שינויים, בניית דרך עצמאית והתמודדות עם בדידות, חוסר ודאות ובלבול. מתוך הכמיהה לבהירות וההבנה כי תחושות מנוגדות – תסכול והודיה, חופש ופחד, צמיחה ותקיעות – יכולות להתקיים בו-זמנית באותו מרחב, התגבשה היצירה כהכרה במורכבות החיים כאן ועכשיו. העבודה מתכתבת עם טקסט שירי שמנסח את המורכבות הזו, ונוגעת בנושאים שמלווים את יצירתה כחשיפה לצד הסתרה, והאפשרות לשאת אמיתות שונות בעת ובעונה אחת."]},{"artist_slug":"zohar-ron","exhibition_title_he":"הקולפן | בּוּרְקָה | برقع","exhibition_slug":"the-peeler","exhibition_route":"opencalls/the-peeler","statement_he":["הסתרה אינה רק העדר נראות היא כוח היוצר משמעות.","דווקא מה שנמנע מן העין נטען בכמיהה, בדמיון ובתשוקה.","מה קורה לתרבות שבה הסוד אינו מעשה של חירות, אלא מנגנון של פחד?","כאשר אישה נדרשת להסתתר מפני תשוקתו של גבר, מהו הדבר שאנחנו הגברים מנסים להסתיר?","התכשיט מסמן את הסדק שדרכו מבקשת הפנימיות לפגוש את העולם. לא כחשיפה מלאה, אלא כרמז עדות לכך שהכמיהה להיראות חזקה לא פחות מן הרצון להסתתר."]},{"artist_slug":"zohar-ron","exhibition_title_he":"הקולפן | כְּמִיהָה","exhibition_slug":"the-peeler","exhibition_route":"opencalls/the-peeler","statement_he":["כוח משיכה קדום אל מה שמעבר לקיים, בין יופי לסכנה.","הדג נשלף מהים ומשתוקק חזרה למעמקיו, מונח על הגוף כישות זרה. קשקשים קרים נוגעים בעור החם, המפגש ביניהם יוצר מנעד בין משיכה לדחייה, בין עדינות לאלימות, תשוקה ואבדן, כל התחושות והרגשות מתקיימים יחד.","בצילומים הכמיהה מופנית אל החוויה של המפגש עם האחר.","הדג סמל לכוח קדום ובלתי ניתן לאילוף, יצור המגיע מממלכה זרה, נושא עמו את זכרון הים.","הגוף האנושי אינו מבקש לשלוט בו, הוא מבקש להתקרב, לגעת במה שלעולם ישאר בלתי מושג.","הקעקועים החרוטים בעור מהדהדים מבנים אורגניים, בין קשקשים לתאי כוורת, כנפיים ושרידים ביולוגיים, כאילו הגוף עצמו מבקש להתמזג עם עולם אחר.","בתוך המתח הזה נולד רצון לחצות את גבולות העצמי, להתאחד עם דבר מה זר, גם במחיר של אבדן, גם בידיעה שהאיחוד המלא לעולם לא יתרחש.","היצירה ממקדת מבט על אחד הכוחות העתיקים ביותר בנפש האנושית הכמיהה אל מה שנמצא מעבר להשג ידנו. אל מה שמסוכן, יפהפה, חמקמק וחולף. אל מה שאיננו יכולים להחזיק, אך איננו מסוגלים להפסיק לחשוק ולקרב."]},{"artist_slug":"zohar-ron","exhibition_title_he":"בדידות בסביבה תוססת | כְּתוּבָּה | QTUBA","exhibition_slug":"loneliness","exhibition_route":"exhibitions/loneliness","statement_he":["בסדרה כְּתוּבָּה, זוהר רון פורם את הגבולות שבין שפה, גוף ודימוי, ויוצר מערכת יחסים חדשה ביניהם.\nהכתב העברי מסורת עתיקת יומין של ביטוי פנימי ותפילה מקבל בסדרה זו חיים חדשים כחומר ויזואלי, כמעט פיזי, הנכתב בדיו ומכחול ישירות על גוף חי.","המילים, שנוצרות מתוך דיאלוג אינטואיטיבי עם המוזה המצולמת, אינן משמשות כתוספת צורנית או עיטורית, אלא כפעולה טקסית, אינטימית, בעלת ממד כמעט מאגי. הגוף הופך קנבס חי, והטקסט לחש, שכבת תקשורת, הגנה או גילוי.","השפה העברית שימשה אותנו אלפי שני כשפת קודש לתפילה כוח ליצירת מציאות, מוצגת כאן למופע של תשוקה, כמיהה, רכות ומסתורין.","זוהר מבקש להחזיר את הכוונה למילה, את המשמעות לנראות, את האינטימיות לעשייה האמנותית. במרחב של צריחה ויזואלית, כְּתוּבָּה לוחשת.","בהקשר של נושא התערוכה \"בדידות בסביבה תוססת\", עבודותיו של זוהר מציעות מבט נוסף על בדידות מסוג אחר לא כניתוק, אלא כהשתהות.\nבעולם רווי דימויים, מילים כוונה, ללא עומק, המילה הכתובה ביד על עור חשוף, חוזרת להיות טקס, אמירה, חיבור."]},{"artist_slug":"nir-giorgio-levin","exhibition_title_he":"הקולפן | רגש נבחר – התמסרות","exhibition_slug":"the-peeler","exhibition_route":"opencalls/the-peeler","statement_he":["גוף העבודות המוצג בתערוכה נע בין דימויים של קרבה, כיסוי, שבר, היעלמות והישענות. דרך דמויות צמודות, פנים סדוקות ופסליות מתפוררת, העבודות בוחנות את ההתמסרות לא כרגע חד משמעי של אהבה או כניעה, אלא כמצב מורכב שבו הגוף מפסיק להחזיק את עצמו באופן מלא ונעשה זמין יותר למשהו שמחוץ לו: למבט, לאחר, לזיכרון, לאמונה, לשבר, או לרצון להיעלם בתוכם.","התמסרות, עבורי, אינה רק רגע של קרבה, אלא מצב ראשוני יותר, שבו החיים והגוף נמסרים למסגרת עוד לפני שיש לאדם אפשרות לבחור. כמי שנולד אל זהות אחת, נמסר למשפחה אחרת, וגדל בתוך סיפור דתי ותרבותי שנבחר עבורו, אני חוזר שוב ושוב אל הרגע שבו אדם הופך לשייך, נעטף, נקרא בשם, ומפסיק להיות רק של עצמו. מתוך המקום הזה אני מתבונן בהתמסרות גם כמעשה של רוך וגם כוויתור, גם כאהבה וגם כאובדן שליטה.","העבודות בתערוכה נעות בין צבע לשחור לבן, בין גוף חי לבין דימוי של שריד, בין אינטימיות לבין היעלמות. חלקן מבוססות על קרבה גופנית כמעט חרישית, חלקן על דמויות מכוסות שפניהן נעלמו, וחלקן על פנים ופסלים שבורים שכבר איבדו את שלמותם. יחד הן יוצרות מרחב שבו ההתמסרות מופיעה כפעולה כפולה: גם התרככות וגם התפוררות, גם מנוחה וגם סיכון.","באמצעות סריגה, פירוק והרכבה מחדש של דימוי, אני מבקש לתת צורה למקום שבו האדם מפסיק להתנגד לגמרי, אך גם אינו נעלם לחלוטין. זהו מרחב שבו חשיפה, שייכות, פגיעות ורצון להימסר מתקיימים יחד, בלי להכריע אם ההתמסרות היא הצלה, אובדן, או שניהם בו זמנית."]},{"artist_slug":"nir-giorgio-levin","exhibition_title_he":"How Many Partners Have You Had?","exhibition_slug":"how-many","exhibition_route":"exhibitions/how-many","statement_he":["\"Untitled\" (Flesh and Marble)\nהעבודה עוסקת ברגע של מפגש בין חי לדומם. המגע והקרבה מציעים שותפות לא סימטרית: מצד אחד נשימה וחום, ומצד שני קשיחות וקרירות, אבל שניהם מחזיקים יחד את אותו רגע של תשוקה, מראה אחד לשני, שני חלקים של אותו שלם. העבודה מציבה את היחסים כמרחב שבו הגוף החי נמדד מול דימוי שנולד כדי להיראות, לא כדי להרגיש.","בהקשר לשאלה \"כמה שותפים היו לך\", העבודה מציעה מבט ביקורתי ואישי על יחסים דרך מפגש שבו אחד מרגיש והשני נראה, ושואלת מי מהם מחשיב את השני כ\"שותף\".","\"Untitled\" (With Eyes Closed, We Saw)\nהעבודה עוסקת ברגע שבו מבט כבר לא מחזיק את האמת, אך הקרבה עוד מתקיימת. כשהעיניים נעצמות ומשהו אחר נפתח. זו אינטימיות שנוכחת למרות הכל, אהבה שמתקיימת בשתיקה, בגבול הדק שבין נוכחות להיעלמות.","בתוך השאלה \"כמה שותפים היו לך\", היא מבקשת להזיז את המבט מהכמות אל מה שנשאר בגוף ובזיכרון, ומה שנאגר במגע."]},{"artist_slug":"noemi-safir","exhibition_title_he":"הקולפן | מעורר רגש: 'מרחק שקט'","exhibition_slug":"the-peeler","exhibition_route":"opencalls/the-peeler","statement_he":["שלוש העבודות עוסקות ב 'מרחק שקט' כמצב רגשי וכמהלך שנרשם בגוף, בקשר ובזיכרון.\nבעבודה הראשונה, 'היא מעולם לא נכנסה', המרחק מופיע מול דמות קרובה שאמורה הייתה לראות, להכיל, אך נשארת על הסף.","בעבודה השנייה, 'בין החדרים', המרחק שב ומופיע בתוך קשר קרוב ועכשווי יותר, לא כאותו חוסר קודם, אלא כפחד מהישנותו בצורה חדשה.","ובעבודה השלישית, 'אחרי שכולם הלכו', המרחק כבר נספג בגוף עצמו והופך לעומס, לתנוחה ולמשקע פנימי.","יחד, העבודות יוצרות מהלך שנע בין מקורו של סדק רגשי, הדרך שבה הוא שב ומבקש להופיע בתוך קרבה והאופן שבו הוא ממשיך לחיות בגוף גם כאשר אינו נאמר במפורש.","במסגרת התערוכה, העבודות מבקשות לתת צורה למה שפועל בשקט, לקרבה שאינה מחזיקה, למרחק שמחלחל ולזיכרון רגשי שמוסיף להדהד בתוך הגוף גם הרבה אחרי שהרגע עצמו חלף."]},{"artist_slug":"noemi-safir","exhibition_title_he":"How Many Partners Have You Had?","exhibition_slug":"how-many","exhibition_route":"exhibitions/how-many","statement_he":["בסדרה המוצגת בתערוכה, אני עוסקת בשותפויות שמצטברות בתוך הגוף: דינמיקות משפחתיות, מערכות יחסים, ציפיות, תלות וריצוי. כל קשר כזה מותיר עקבה, לא תמיד נראית,\nאך מורגשת. הגוף בעבודות מתארך, נמתח, מתכופף, נשען או נלכד, לא מתוך בחירה חופשית, אלא מתוך הסתגלות מתמשכת למה שפועל עליו.","הדמויות מופיעות בזוגות, יושבות קרוב מדי, נוגעות כמעט, אך לא באמת. הקרבה ביניהן אינה מנחמת אלא טעונה, לעיתים חונקת.\nהן מחזיקות זו את זו ובאותה נשימה גם מגבילות זו את תנועתה של זו. בתוך המפגש הזה מתגלה רגע שבו אינטימיות הופכת להסכם שקט, וכוח פועל דווקא דרך עדינות.","How Many Partners Have You Had?\nהשאלה הופכת לשאלה על זהות. כמה גרסאות של עצמי נוצרו מתוך המפגשים האלה?\nכמה חלקים ממני השתנו כדי להישאר?\nהעבודות אינן מציעות תשובה, אלא מציבות גוף שנושא ומתמודד עם מה שנשאר."]},{"artist_slug":"jessica-tabarovsky","exhibition_title_he":"הקולפן","exhibition_slug":"the-peeler","exhibition_route":"opencalls/the-peeler","statement_he":["העבודה שאני מציגה בתערוכה נקראת \"התנערות\". היא נולדה מתוך מעורר הרגש: \"בהמתנה\". זיכרון ספציפי, אישי, רגע מסוים בחיי כשחקנית תיאטרון, המתנה למשהו שיקרה, למשהו שצריך לקרות, למשהו בלתי מזוהה שאמור לבוא ולהעניק לחיי משמעות. המתנה שהפכה לעץ שהסתיר את היער.","ההמתנה הייתה העמדת פנים מצידי כי שאלותיי הקיומיות לא קיימות, מתודה יעילה להיפטר מהן. אבל שאלות אלה היו דבוקות אלי כמו דרדר ברעמת שיער מתולתל. היו מחוברות אלי, ואני לא רציתי אותן בכלל. בניסיון לנער אותן ממני, ניערתי את מוחי כמו שכלב רטוב מנער את גופו ויורה לכל הכיוונים. נכנסתי להמתנה. לאינרציה של המתנה. כיום, אני יודעת שאין המתנה, לא באנו לפה להמתין, משמעות החיים נמצאת בקיום עצמו.","הציור \"התנערות\" איננו \"קולפן\" שבא להסיר בעבודת קילוף קשה את הקליפות ושכבות ההגנה של הזיכרון על מנת לחשוף את ליבו, אלא אקט טבעי של התבוננות עצמית במסע של התפתחות מתמדת.","הצבעוניות העשירה אינה רק בחירה אסטטית, אלא כלי לחקירת \"הטמפרטורה\" של הדמות, המחשבה והרגש, מהראש עד כף הרגל. הצבעים העזים באים להדגיש את רגע הביניים הזה, החולף והכמעט נעלם."]},{"artist_slug":"elsa-ars-brush","exhibition_title_he":"הקולפן","exhibition_slug":"the-peeler","exhibition_route":"opencalls/the-peeler","statement_he":["אנטומיה של שרף, חלומו של השרף שני הציורים הללו מנתחים את הארכיטקטורה השבירה של אהבה למשהו שמעולם לא היה קיים במלואו. \"אנטומיה של שרף\" מציג דמות שאינה שלמה ואינה יחידה; איברים חופפים זה לזה, ידיים מהדהדות, והגוף נמוג לכדי רוך בלתי אפשרי. הציור משקף את המצב הרגשי של התאהבות בפנטזיה: אינטימית, מכלה, אך חומקת ובלתי ניתנת להשגה מיסודה.","כנערה, דמיינתי את פריז כמקום מיתי: גותית, זוהרת ורוויית גורל. עשיתי אידיאליזציה לחלום של לימודי אמנות וארכיטקטורה, כוסות קפה שלא נשתו עד תומן, וציור על גדות נהר הסן. כשהגעתי לשם כסטודנטית לאמנות, העיר התגלתה בפניי אחרת: קרה, מרוחקת ובעלת יופי כביר ומאיים,מוכנה לבלוע אותי בשלמותי כפי שהיא עושה לרבים אחרים. כמו השרף, היא אחזה בי, אך מעולם לא לחלוטין. גם לאחר שבע שנים, היא מעולם לא הפכה לביתי במלוא מובן המילה, על אף שאהבתי כל קרן רחוב בה. הדמות המנותחת בעלת הידיים המרובות בציור מרמזת על כמיהה ללכוד משהו שחומק מהישג יד, ניסיון להיאחז בגרסה מדומיינת של שייכות, ושל העצמי.","\"חלומו של השרף\", לעומת זאת, מתאר את האידיאל הארצי – כלה המתכוננת ליום חתונתה, רעיון מושלם הטבוע בתודעתה, אך מולו ניצבת מציאות שבירה המתנגשת עם הגולמיות והחספוס של חיי הנישואין. רגע קפוא בזמן המעניק הצצה אל תוך המשיכה לתוך שלמות שאינה קיימת. ביצירת דיפטיך זו, המסירות הופכת למעגלית, כאשר הנשגב והאלוהי קורס אל תוך האנושי: פגום, כמהּ, ובלתי שלם לנצח; רודף תמיד אחר השלמות, ומעולם לא מסוגל לאחוז בה בקצות אצבעותיו."]},{"artist_slug":"elsa-ars-brush","exhibition_title_he":"How Many Partners Have You Had?","exhibition_slug":"how-many","exhibition_route":"exhibitions/how-many","statement_he":["כמה פרטנרים היו לך? השאלה בוטה, כמעט מנהלתית, כאילו ניתן לצמצם אינטימיות לכדי אריתמטיקה. הציורים הללו מתנגדים לצמצום הזה. במקום לספור, ברוש מתחקה אחר מה שנותר.","לאחר פרידה, הגוף ממשיך להושיט יד לעבר מישהו שכבר איננו. העור זוכר; השרירים מתכווצים סביב ההיעדר. מתוך שאילה של מושג \"איבר הרפאים\" (PHANTOM LIMB) כמצב רגשי, הדמויות שלה לוחצות, אוחזות ומחפשות – ועם זאת, משהו תמיד חסר.","רסיסי צבע מרחפים כשאריות של מגע, תלויים בין נוכחות לזיכרון. כל פרטנר משאיר אחריו יותר ממספר. הם מותירים מחוות, תחושות, חותמים. האינטימיות הופכת פיזית, וחווטת מחדש את הגוף לכדי ארכיון של הדים מצטברים."]},{"artist_slug":"anat-wegier","exhibition_title_he":"הקולפן","exhibition_slug":"the-peeler","exhibition_route":"opencalls/the-peeler","statement_he":["שלושת הציורים המוצגים בתערוכה פועלים כחלל אחד. הדמות אינה מתייצבת; היא נבנית ומתפרקת בו־זמנית. הצבע נוזל, הקווים מתמוססים, והפנים אינן נסגרות — כאילו משהו בהן עדיין מחפש צורה.","בכל אחד מהציורים מופיע מצב מעט שונה של אותו מתח: ניסיון להחזיק דימוי, לייצב אותו, ולצדו רגעים שבהם הוא מתערער ונשמט. התנועה ביניהם אינה ליניארית, אלא חוזרת, מתעכבת ולעיתים נתקעת.","מעורר הרגש בעבודות האלו הוא הצורך באישור. לא רק כרצון, אלא כמקום עדין ופגיע — שבו מה שאינו מקבל אישור מתחיל להיעלם.","העבודות נולדו מתוך זיכרון של עמידה מול מראה בתוך מערכת יחסים — שני מבטים על אותה דמות. רגע שקט לכאורה, אך כזה שבו נוצר פער בין מה שאני רואה לבין מה שמוחזר אליי. פער שמערער, שמכניס ספק, שמבקש אישור.","מתוך המקום הזה מופיעה פעולה של כיסוי — איפור, טשטוש, מחיקה. לא רק כדי להסתיר, אלא כדי להתאים, כדי להיות \"נכונה\" בעיני האחר.","עם הזמן, התנועה הזו מתרחבת מעבר לציור — אל הגוף, אל הבחירות, ואל האופן שבו אני נוכחת בעולם. אזורים שלא מקבלים אישור מצטמצמים, ולעיתים נעלמים. הפחד והבושה נכנסים פנימה, והדימוי מתחיל להתרופף.","פעולת הכיסוי בעבודות אינה רק הסתרה, אלא גם ניסיון להחזיק במה שמבקש להישאר — שכבה שנבנתה מתוך צורך באישור, ושקשה להסיר. במובן זה, הקילוף אינו פעולה פשוטה של חשיפה, אלא תהליך מורכב שבו מה שמתחת אינו בהכרח יציב או נגיש.","העבודות האלו מחזיקות את הרגע הזה — בין ניסיון להישאר לבין תחושת היעלמות."]},{"artist_slug":"anat-wegier","exhibition_title_he":"How Many Partners Have You Had?","exhibition_slug":"how-many","exhibition_route":"exhibitions/how-many","statement_he":["בתערוכה זו ויז'ייה מציגה את העבודה \"אותו אחד שוב\" (2026), שמן על בד, 95×115 ס\"מ.","העבודה נולדה מתוך התבוננות בשאלה: HOW MANY PARTNERS HAVE YOU HAD? לא כשאלה של מספר, אלא כשאלה על חזרתיות, זיכרון ומשיכה. במבט לאחור, נדמה שהדמויות מתחלפות, אך הדינמיקה הרגשית נותרת דומה — אותו סיפור חוזר בצורות שונות.","בציור מופיעות ארבע דמויות במבנה סגור, מחזיקות ידיים, כמעין מערכת שחוזרת על עצמה.","המסכות מטשטשות את הזהות האישית, אך בו בזמן מדגישות את הדמיון — את האפשרות שכל אחד מהם הוא אותו אדם, בצורה אחרת.","העבודה נוגעת בפער שבין שינוי חיצוני לבין חזרתיות פנימית, ובשאלה עד כמה אנו באמת פוגשים אחרים — או פוגשים שוב ושוב את אותו הסיפור."]},{"artist_slug":"gal-rotem","exhibition_title_he":"How Many Partners Have You Had?","exhibition_slug":"how-many","exhibition_route":"exhibitions/how-many","statement_he":["ביצירה זו אני מנסה להביא לידי ביטוי דרך חיים לא ממומשת ואיתה מגיעה התמסרות טוטאלית לבדידות.","אישה עירומה, עוצמת עיניים ומרפה את גופה לחלוטין.\nהתמסרות מלאה לתחושת בדידות מביאה עמה ויתור מוחלט על ההצלחה לייצר קשרים חברתיים אמיתיים ועמוקים. תחושה שיכולה להתעצם אצל אדם שזה כל רצונו.\nכל דרך חיים שנפגעת או לא ממומשת יוצרת ריק שמביא לטביעה בחשיכה תרתי משמע.","המים החשוכים המייצגים את הבדידות מנצחים והמרדף מפסיק.\nהסיפוק שהיא מקבלת מפעולת הוויתור הוא אין סופי אך פני המים מעליה מראים שלא צריך הרבה בשביל לצאת, יד אחת מושטת יכולה להספיק."]},{"artist_slug":"yarden-amir","exhibition_title_he":"הקולפן | רגש נבחר – נשארתי\nלמרות שידעתי","exhibition_slug":"the-peeler","exhibition_route":"opencalls/the-peeler","statement_he":["Heart Blown\nהיצירה עשויה בלון הליום בצורת לב, נעוץ ומקומט אל משטח עץ המשרטט \"נימים שבסדינים\" – קיפולי וכיווצי הבלון משקפים את המצעים שנשארים במיטה של הלב לאחר פרידה.","במערכת היחסים האחרונה שלי נבגדתי, ידעתי עמוק בפנים שהיא לא נכונה לי ולא תפתח אותי למקומות אליהם אני שואפת, לחלוק ולהתרחב. עם זאת, נשארתי. נשארתי למרות שידעתי. התאהבתי עד מעל הראש והאהבה ורק היא, השאירה אותי. נדרשו לי כמה סיבובים של חוסר הקשבה פנימי ואקט חיצוני של בגידה כדי לשחרר.","העבודה משקפת את המקום השקט והבטוח, המיטה הזוגית, האינטימיות שבה, איפה שמתחיל כל יום וגם מסתיים. בתהליך של פרידה, יש קושי להיפרד מהרגלים משותפים, מזיכרון המגע שבגוף. המיטה הופכת לגדולה והצד שלו הופך לאיבר חסר.","הניגוד החומרי בין הבלון הקל, לבין הנעצים בעץ הקשה מדגישים את הפער ברגש הנבחר. נדרש תהליך קילוף עמוק של שכבות ההיקשרות ושל השכבות שלי – כדי להתחבר מחדש לחיים ול פתוח שוב את הלב. וכך קורה. היצירה נותנת את שני קצוות התחושות הללו – ההתרפקות על הזיכרון , וכיווץ ההרפיה שבשחרור הלב.","היצירה השניה, הטריפטיך FREE MY HEART, היא המשך ישיר להשלמה עם הפרידה ולשחרור ממנה. הטריפטיך משקף את הלב הבוחר להשתחרר. בשני העיגולים מצד ימין ישנה קשת בענן ושמיים מעוננים מורכבים מנעצים כסופים שנצבעו חלקם בכחול-אפור. כמו לטבע, גם ללב יש עונות."]},{"artist_slug":"yarden-amir","exhibition_title_he":"How Many Partners Have You Had?","exhibition_slug":"how-many","exhibition_route":"exhibitions/how-many","statement_he":["HOW MANY PARTNERS HAVE YOU HAD? העבודות בתערוכה פועלות כגוף אחד רב־שכבתי, המתפתח מתנועה פנימית־אינטימית אל התפזרות חופשית במרחב.","נקודת המוצא היא היצירה LIFE MARKS — BODY WHISPERED, המתייחסת לגוף הנשי כאתר של זיכרון, מגע והצטברות: תוואי גוף־נוף, איבר אינטימי, מרחב של הגנה וחשיפה בו־זמנית. מן הגוף הכמוס נפרשת תנועה החוצה.","מטאוריטים — טריפטיך בגווני שחור, כסף ורוז גולד — מציגים מסות חומריות כשרידים או גופים שמימיים: חלקיקים שנפלטו, נפלו, נחרתו. הם נעים בין משיכה וכובד לבין ריחוף והתנתקות, וממשיכים את רעיון הסימן והעקבה ככוח שפועל גם מעבר לגבולות הגוף.","ציפורי החופש, מקבץ של צורות כסופות, מייצגות תנועה קולקטיבית של התרוממות, דחף, נדידה. אלו אינן ציפורים נרטיביות אלא מחוות של תעופה — גוף שמתפרק לצורה, קצב, כיוון. הן מסמנות שלב של שחרור מן הפנים אל המרחב, מן היחיד אל הריבוי.","הפרח האפוקליפטי, עשוי מבלוני הליום, מהווה שיא של התנועה: חומר קל, מקרי, חסר צורה קבועה, הנעוץ אל משטח עץ. זהו אובייקט של נשימה, של התרוממות שנעצרה, של זיכרון אווירי. הפרח מתפקד כהתפוצצות רכה של האינטימי — לא כחשיפה דרמטית, אלא כהתרחבות. יחד, העבודות מתארות מסע מן העומק אל הגובה: מהאיבר הנשי והגוף הזוכר, דרך עקבות חומריות וקוסמיות, ועד חופש חסר צורה.","HOW MANY PARTNERS HAVE YOU HAD? כשנשאלת השאלה העבודות מבקשות — להציע הבנה רחבה של \"שותפים\" כיחסים בין גוף וחומר, זיכרון ומרחב, אינטימיות והתפזרות. מה שנשאר אינו מספר — אלא תנועה."]},{"artist_slug":"chen-ziv","exhibition_title_he":"הקולפן | Cocoon (גולם)","exhibition_slug":"the-peeler","exhibition_route":"opencalls/the-peeler","statement_he":["Cocoon (גולם)\nהפסל Cocoon נולד מתוך מפגש עם רעיון התעופה, ההגשמה והיכולת לעוף. התבקשתי ליצור כנפיים. אך ככל שהתהליך התקדם הבנתי שאינני נמצאת במקום של - המראה. במקום ליצור דמות שכבר פרשה כנפיים, יצרתי גולם.","Cocoon מתייחס לשלב התפתחותי ייחודי בטבע - שלב של המתנה והתהוות. הגולם אינו היעד ואינו ההתחלה; הוא המרחב שביניהם. מקום שבו משהו חדש כבר נוצר, אך עדיין אינו מוכן להיחשף לעולם. למדתי להסכים להיות בשלב הביניים, להתמסר לקצב ההבשלה, ולא לנסות להאיץ תהליך שזקוק לזמן.","מחולל הרגש שנבחר ללוות את היצירה הוא \"בהמתנה\". לא כהמתנה פסיבית, אלא כבחירה מודעת לשהות בתוך תהליך של צמיחה. כמו הגולם, המבקש מאיתנו סבלנות עד לרגע שבו יופיע הפתח הקטן שדרכו נוכל לבקוע, לבנות את הכנפיים תוך כדי התנועה, ולהפוך בהדרגה למי שאנחנו עתידים להיות."]},{"artist_slug":"lahav-barak","exhibition_title_he":"הקולפן","exhibition_slug":"the-peeler","exhibition_route":"opencalls/the-peeler","statement_he":["על היצירות בתערוכת \"הקולפן\": בתערוכה זו אני מציגה סדרה בת חמש יצירות של ספרים מקופלים, בשם ״גבול דק״. השם של הסדרה כולה מייצג את המתח המתמיד שבו אני חיה ויוצרת. מצד אחד, הוא מתייחס לקו הפיזי והחומרי: הגבול הדק של קצה כל דף נייר שמקופל בדיוק רב. מצד שני, הוא נוגע ברובד הנפשי והאישי: הגבול הדק והפרטי שקיים בין הרצון לפרוץ גבולות לבין הצורך הנוקשה לשמור עליהם, והמרחק הקצר שבין פגיעה והרס לבין גילוי של עדינות, רכות ויופי חדש.","היצירה מתחברת למעורר הרגש ״מגע שלא הרגיש במקום\". החוויה של מגע כזה פוגעת בשלמותו של הגוף והנפש. בדומה לכך, פעולת הקיפול פוגעת בכוונה בשלמותו של הספר, משאירה בו חותם בלתי הפיך ומשנה את פניו. אך בשונה ממנגנוני הגנה נוקשים, אחרי חוויות ה\"הרס\" והפירוק שהספר עובר, הוא דווקא הופך לעדין, רגיש ושביר הרבה יותר.","הפעולה האמנותית חושפת את הפגיעות הפנימית שלו, בדיוק כפי שהנפש האנושית נותרת חשופה, רכה ופגיעה בעקבות זיכרונות העבר, מחפשת את הדרך להגן על עצמה מחדש.","היצירה מורכבת מחמישה איברים שונים בגוף, שכל אחד מהם מבקש להשתחרר, להיפתח או להיחשף, אך נחסם ונבלם על ידי זכרונות הטראומה שעבר:\n• הפה: מבקש לצעוק, לדבר ולבטא, אך תפור וחסום בחוט אדום, המייצג את ההשתקה ואת הקושי להיחשף.\n• המוח: מבקש להקשיב ללב ולשחרר, אך עמוס בידע רב, רציונליזציה וניתוח יתר המאיימים עליו וחוסמים את היכולת להרגיש באמת.\n• הלב: האיבר שרוצה להיפתח לאהבה ולקרבה, אך עטוף בחוט תיל דוקרני, משום שהוא פצוע ומנסה בכל כוחו להגן על עצמו מפני פגיעה נוספת.\n• הריאות: המייצגות את החופש, את הנשימה ואת החיות, אך נראות כענפים יבשים וסבוכים, הממחישים את המחנק ואת הקושי לנשום לרווחה.","כל יצירה בסדרה היא עדות למאבק שבין הדחף לחופש לבין כבלי הזיכרון שמקשים על פתיחות מוחלטת. בסופו של דבר, לכל אדם יש את \"התקיעות\" שלו- החסם, הפחד או הזיכרון שמכביד עליו ומאלץ אותו לבנות חומות הגנה. אבל יש כאן גם תקווה: הנייר שעבר את הקיפול לא נהרס, הוא הפך ליצירה חדשה. הגוף והנפש שלנו יודעים להיות גמישים, ומתוך המוכנות להביט בחסימה הזו פנים אל פנים, מתחילה התנועה העדינה לעבר שחרור, נשימה וריפוי."]},{"artist_slug":"baruch-torgeman","exhibition_title_he":"הקולפן","exhibition_slug":"the-peeler","exhibition_route":"opencalls/the-peeler","statement_he":["בתערוכה זו, תחת התמה של \"הקולפן\", אני חוקר את מעוררי הרגש 'אובדן' ו'שליטה'. חוויית אובדן השליטה אינה רק שלילית; היא ההוכחה שדבר מה אכן היה קיים, ומתוכה נולדת קבלה חדשה. תהליך \"קילוף\" השכבות הצבאיות והחינוכיות חשף את האשליה שבה החזקתי, ופינה מקום לביטוי רגשי חופשי.","אני מציג מיצב קיר פיסולי המורכב מספרים פתוחים, שנבחרו בקפידה וכולם עוסקים במושגים \"אובדן\" ו - \"שליטה\" עם העמקה ב 'אהבה' על שלל גווניה; אהבה דרך היסטוריה, גאוגרפיה, דת ורוח. הספרים, המייצגים מסגרות ידע מובנות ומאורגנות, נפרשים ו\"נחשפים\" בפני הצופה. דרך פעולת האוצרות וההצבה, אני לוקח חומרים המייצגים חוקים ותיאוריות, וממיס אותם לתוך שפה ויזואלית חמה ואנושית, המבקשת למצוא את האיזון העדין שבין הצורך האנושי בשליטה לבין האובדן והשחרור שבאים בעקבותיו."]},{"artist_slug":"gilad-kenan","exhibition_title_he":"הקולפן","exhibition_slug":"the-peeler","exhibition_route":"opencalls/the-peeler","statement_he":["כיסא ירח ״כיסא ירח״ הוא אובייקט פיסולי-פונקציונלי, עבודה שנמצאת על הגבול שבין רהיט, פסל וחוויה חזותית. הצורה הירחית יוצרת נוכחות שקטה ומידית: גוף מעוגל, כמעט שמימי, שמזמין את הצופה להתקרב אליו, לשבת בתוכו, או פשוט להתבונן בו כבאובייקט אמנותי בחלל. העבודה עשויה מאלומיניום מסוג 5050 בעוביים של 5 מ״מ ו-3 מ״מ.","היא פותחה בתהליך של עיצוב תלת-ממדי, שרטוט CAD, חיתוך לייזר ממוחשב וכיפוף תלת-ממדי ממוחשב. השילוב בין תכנון דיגיטלי לבין עבודת ייצור מדויקת מאפשר להפוך משטחי מתכת שטוחים לגוף תלת-ממדי בעל נפח, מבנה ואופי. על גוף האלומיניום משולבים חיפויים דקורטיביים מנירוסטה איכותית בעובי 1 מ״מ, חתוכה בלייזר ומיושמת בגימור מראה. החיפויים מצופים בציפוי טיטניום להגנה, ומוסיפים לעבודה שכבה נוספת של עומק, השתקפות ואור.","הנירוסטה המבריקה מגיבה לסביבה שבה העבודה מוצבת: היא קולטת צבעים, תנועה, אור ודמויות, ולכן העבודה משתנה מעט בכל חלל ובכל רגע. ״כיסא ירח״ מבטא את החיבור שמאפיין את עבודתו של גלעד קינן: חומר תעשייתי, תכנון מדויק, אסתטיקה מוקפדת ורגש. למרות שהעבודה בנויה מאלומיניום ונירוסטה — חומרים חזקים, קרים ועמידים — התוצאה הסופית רכה, מזמינה וכמעט פיוטית. הירח, כסמל, מביא איתו שקט, חלום, אור עקיף ותנועה מחזורית. בתוך העבודה הזו, הסמל הזה מתורגם לשפה חומרית עכשווית.","הכוח של ״כיסא ירח״ נמצא גם בפרטים: בקווי החיתוך, בכיפופים, בחיבור בין שכבות החומר, ביחס בין הגוף המרכזי לבין החיפויים, ובמפגש בין אור למתכת. כל פרט דורש סבלנות, והסבלנות הזו ניכרת בתוצאה. היא מאפשרת לדיוק להפוך לאסתטיקה, ולאסתטיקה להפוך לרגש. במובן הזה, הכיסא אינו רק אובייקט לשימוש או לצפייה, אלא מקום קטן של שהייה. הוא מזמין רגע של עצירה בתוך עולם מהיר, ומציע מפגש בין הגוף האנושי לבין צורה שמזכירה גרם שמיים. הצופה פוגש עבודה שנבנתה בכלים מדויקים מאוד, אבל החוויה שלה אינה טכנית בלבד; היא חוויה של אור, חומר, שקט ונוכחות.","זוהי עבודה שמבקשת לא רק להיראות, אלא להשפיע על התחושה של החלל. היא עומדת בו כמו ירח קטן שנחת בתוך המציאות — אובייקט מתכתי, מדויק ושקט, שמחזיק בתוכו גם טכנולוגיה וגם חלום."]},{"artist_slug":"livay-levi","exhibition_title_he":"הקולפן","exhibition_slug":"the-peeler","exhibition_route":"opencalls/the-peeler","statement_he":["היצירה- על פניו","היצירה המוצגת בתערוכה היא מערכת ישיבה פיסולית הכוללת שולחן וכיסא, הניצבת בין אובייקט שימושי לבין יצירת אמנות. במבט ראשון היא עוסקת בחומר, בצורה ובנוכחות, אך למעשה היא עוסקת במערכת היחסים המורכבת שבין קרבה להגנה.","היצירה נולדה מתוך העיסוק במתח הקיים בין הרצון העמוק להתחבר לאחר לבין החשש להיחשף בפניו. זהו אותו מקום אנושי שבו אנו כמהים שיראו אותנו באמת, אך בו בזמן בונים סביבנו שכבות הגנה מפני פגיעה אפשרית. לעיתים ההגנות הללו הופכות לחומות, ולעיתים הן הופכות לחלונות.","\"על פניו\" עוסקת ברגע הזה בדיוק — במקום שבו אדם בוחר להתקרב, אך עדיין משאיר בינו לבין העולם שכבה דקה של הגנה. לא כדי להסתתר, אלא כדי לבחון. כדי לראות ולהיראות.","הזיכרון והרגש המלווים את היצירה קשורים להבנה שלא תמיד צריך להסיר את המגן. לפעמים מספיק להפוך אותו לשקוף. כזה שמאפשר לראות מי עומד מולך באמת, מי מגיע בכנות ומי נשאר רק על פני השטח.","בהקשר לנושא התערוכה, \"הקולפן\", היצירה מייצגת עבורי תהליך של חשיפה. קילוף הדרגתי של שכבות שנבנו עם השנים – פחדים, מנגנוני הגנה ותפיסות עצמיות – במטרה להגיע אל מה שנמצא מתחתיהן. עבורי, התערוכה היא הזמנה להסיר את מה שמסתיר, לאפשר לרגש לצוף, ולחשוף את הזהות האמנותית שלי כפי שהיא.","כי בסופו של דבר, מה שמתגלה לאחר הקילוף אינו דבר חדש — אלא הדבר שהיה שם כל הזמן, ממתין להיראות"]},{"artist_slug":"natasha-zeriker","exhibition_title_he":"הקולפן","exhibition_slug":"the-peeler","exhibition_route":"opencalls/the-peeler","statement_he":["העבודה המוצגת בתערוכה נולדה מתוך מעורר הרגש \"אובדן שליטה\". לאורך השנים אני חוקרת את המתח שבין אחיזה להרפיה, ואת האופן שבו הגוף ממשיך לשאת חוויות וזיכרונות. עבורי הצוואר הוא אזור טעון במיוחד - מקום שבו קול, נשימה, רגש ושליטה נפגשים.","הדימוי נוצר מתוך פעולה מעגלית ורפטטיבית של המצולמת. החזרתיות בתנועה אפשרה ללכוד את הרגע כמריחה וכרטט, ולהעצים את תחושת המתח והפעימה העוברת בגוף. החוט השחור הנכרך סביב הצוואר מסמן עבורי את המקום שבו מתקיימת חקירה של שליטה, בחירה ואינטימיות. הוא עוסק ביכולת לקחת בעלות מחדש על סיטואציה וליצור תנועה חדשה של קונטרה בתוך יחסים - מרחב בטוח המאפשר להשפיע על הקצב, על העוצמה ועל מידת הקרבה.","ככל שהאינטימיות גדלה, כך מתעצמת תחושת הביטחון ומתאפשר יותר שחרור. אובדן השליטה הופך מחוויה שמופעלת עלינו למרחב שנבחר מתוך אמון - מקום שבו אפשר להרפות מאחיזה, להישאר נוכחת בתוך החוויה, ולגלות שהשחרור עצמו יכול להיות מקור לעוצמה.","הבחירה בקנה מידה גדול אינה מקרית. היא מעצימה את נוכחותה של הדמות ואת המתח שהיא נושאת, ומזמינה מפגש שבו הצופה אינו רק מתבונן בה אלא ניצב מולה. במרחב הזה מתקיימים בו־זמנית שליטה ואובדן שליטה, אחיזה והרפיה. הפרופורציות המוגזמות, החורגות מקנה המידה המציאותי, מעצימות את חוויית אובדן השליטה, בעוד שהמתח עצמו נשאר מוחזק והשליטה באופן התנועה בתוכו נמצאת בידיה."]},{"artist_slug":"talia-zoref","exhibition_title_he":"הקולפן","exhibition_slug":"the-peeler","exhibition_route":"opencalls/the-peeler","statement_he":["היצירה כאוס הרמוני נולדה מתוך יום של משבר אישי עמוק וסערת רגשות. בדרך כלל, תהליך היצירה שלי מתחיל מתוך כוונה ליצור הרמוניה, איזון וחיבור, אך הפעם מה שהופיע על הקנבס היה שונה: שכבות של רגש, תנועה ואנרגיה שנראו תחילה ככאוס מוחלט. במהלך העבודה הבנתי שהכאוס אינו עומד בניגוד להרמוניה, אלא מהווה חלק בלתי נפרד ממנה.","המונח \"כאוס הרמוני\" מתאר מצב שבו מתקיים במקביל לאיזון, סדר, יופי, ורוגע מצב של בלאגן, חוסר סדר ואבדן שליטה. ביצירה זו, הקווים, הצבעים והמחוות הציוריות משקפים את המתח שבין חוסר הוודאות לבין האמון בכך שגם מתוך רגעי שבר יכולים להיווצר יופי, צמיחה וסדר חדש. העבודה מזמינה את הצופה להתבונן במורכבות החיים ולהכיר בכך שלעתים דווקא מתוך הכאוס נוצרת ההרמוניה העמוקה ביותר.","ביצירה בחרתי להשתמש בפלטת צבעים הכוללת גוונים של ירוק וצבעים נוספים המזוהים עם רוגע, איזון והתחדשות. אל מול תחושת השלווה שמעניקים הצבעים, משיכות המכחול נותרו נועזות, חופשיות וסוערות, ונעות בין שליטה לשחרור. חלקים מהעבודה נוצרו באמצעות ציור ישיר בידיים, באופן אינטואיטיבי ואקספרסיבי, שאפשר לרגש להתבטא ללא סינון. המפגש בין הצבעים המרגיעים לבין המחוות האנרגטיות והכאוטיות יוצר מתח חזותי המשקף את לב היצירה: החיפוש אחר הרמוניה בתוך סערה רגשית.","במרכז היצירה מופיעה דמות אישה בעיניים עצומות, כחלק מסדרה העוסקת ברגעים של התכנסות פנימית וניתוק מרעשי העולם החיצוני. עבורי, עצימת העיניים אינה מסמלת בריחה מהמציאות, אלא דווקא דרך להעמיק את החיבור אליה דרך העולם הפנימי. זהו רגע של הקשבה, תפילה, נוכחות ואחדות, מצב שבו המבט מופנה פנימה, אל האינטואיציה, הרגש והקול הפנימי. בתוך הכאוס והגירויים הבלתי פוסקים שמסביב, עצימת העיניים הופכת לפעולה של אמון, המאפשרת חיבור מחודש לעצמי ולמרחב של שקט ובהירות."]},{"artist_slug":"risa-oz","exhibition_title_he":"How Many Partners Have You Had?","exhibition_slug":"how-many","exhibition_route":"exhibitions/how-many","statement_he":["HOW MANY PARTNERS HAVE YOU HAD?\nהעבודות אינן מציעות תשובה, אלא יוצרות מרחב התבוננות. הן עוסקות במתח שבין קרבה לריחוק, שליטה ואובדן,\nובוחנות גבולות של אינטימיות ומגננה.","זה לוכד את אותו רגע אנושי מאוד של:\nאני לא רוצה לחשוב על שום דבר אחר. אני רק רוצה להיות כאן, בתוך זה, איפה ששום דבר אחר לא קיים.","יאללה, עזבו אותי. לא עניינכם. אני בוחרת להיות ברגע.\nזה מה שזה מעורר בי."]},{"artist_slug":"tal-nehoray","exhibition_title_he":"How Many Partners Have You Had?","exhibition_slug":"how-many","exhibition_route":"exhibitions/how-many","statement_he":["העבודה מורכבת מעשרות דמעות קרמיקה קטנות, הנערמות לכדי הר שקט ודחוס.כל דמעה נושאת עקבה של חוויה אינטימית — רגע של קרבה, חשיפה או פרידה. יחד הן יוצרות גוף מצטבר של זיכרון רגשי, כזה שאינו נספר אלא מורגש.","״הר של דמעות״ מציע מבט על יחסים לא דרך מספר השותפים, אלא דרך מה שנשאר מהם: משקל עדין, מתמשך, שנשמר בחומר ובגוף."]},{"artist_slug":"tal-nehoray","exhibition_title_he":"בדידות בסביבה תוססת | ״ערכת בדידות״","exhibition_slug":"loneliness","exhibition_route":"exhibitions/loneliness","statement_he":["בסדרה ״ערכת בדידות״, סמלים יומיומיים של נחמה ורגש — כדור האושר, המוח, הלב, בקבוק־החימום המוכר — מקבלים צורה קרמית ונשללים מרכותם המקורית דרך האייקונים הללו טל בוחנת את המתח בין הכמיהה לנחמה לבין הריקנות שאנו לעיתים פוגשים בתוכנו.","הפסלים מזמינים את הצופה לשאול מה באמת מרגיע אותנו, מה ממלא אותנו, ומה ממשיך לרעוד בתווך שבין פעימת הלב הראשונה לאחרונה."]},{"artist_slug":"tanya-shin","exhibition_title_he":"How Many Partners Have You Had?","exhibition_slug":"how-many","exhibition_route":"exhibitions/how-many","statement_he":["HOW MANY PARTNERS HAVE YOU HAD?\nהעבודות המוצגות בתערוכה זו מתייחסות לשאלה לא כשאלה כמותית בלבד, אלא כמרחב של חוויות מצטברות, מפגשים, זיכרונות והשפעות.","כל מפגש מותיר חותם בגוף ובתודעה, ומשפיע על האופן שבו האדם תופס את עצמו ואת גופו. דרך הדימויים, היא בוחנת כיצד אינטימיות, קרבה וריחוק נרשמים בגוף, וכיצד הם מתורגמים לשפה חזותית.","העבודות אינן מציעות תשובה חד-משמעית, הן מזמינות את הצופה לשאול לא רק כמה, אלא מה נשאר מכל אחד."]},{"artist_slug":"gal-polk","exhibition_title_he":"How Many Partners Have You Had?","exhibition_slug":"how-many","exhibition_route":"exhibitions/how-many","statement_he":["העבודה בוחנת את השאלה - \"כמה פרטנרים היו לך?\" לא כמספר, אלא כצלקת או סימן שנשאר על הגוף והנפש. הניגוד של הקריסטלים הנוצצים מול הגרזן משקפים גם מורכבות של מערכת יחסים (יופי מול כאב) וגם כל פרטנר הוא חריטה בתוך העץ, משקע שאי אפשר באמת להרפות ממנו, והשאלה \"כמה?\" היא למעשה הניסיון לספור את החריטות/צלקות האלו.","בנוסף, העבודה מרפררת לשיר פופ מוכר משתעשעת עם משחק מילים והמשמעות של אקס כגרזן ואקס בן זוג לשעבר. בין הרצון לשכוח לבין לא לרצות לשחרר."]},{"artist_slug":"gal-polk","exhibition_title_he":"בדידות בסביבה תוססת | don’t lose your head","exhibition_slug":"loneliness","exhibition_route":"exhibitions/loneliness","statement_he":["במקבץ העבודות שלה don’t lose your head היא בחרה להראות את הקשת הקיימת בבדידות.","בין אם זה התמודדות \"פאסיבית\" של לצלול עמוק אל תוך המסכים והמשחקים כדי למסך את מחשבות טורדניות על בדידות, או בין אכילה רגשית שמציעה נחמה (גם אם קצרה) וחיבוק בצורת ג’אנק פוד שמרגיש שהרוויחו ומגיע לך או לקלל את כל העולם.","לבין התמודדות \"אקטיבית\" בהשראת אן בולין (1507 - 1536) אשתו השניה של מלך אנגליה הנרי השמיני, שבשבילה המלך התגרש מאשתו הראשונה ובצעד חסר תקדים עזב גם את הכנסייה הקתולית עבורה.","אבל לא כל הנוצץ זהב, ויש שטוענים שנמאס לבולין לשבת ולחכות בארמון לבעלה שבגד בה עם אחרות, ויצאה בעצמה למצוא גבר שיפיג לה את הבדידות. כשהנרי גילה, הארמון האשים את בולין בהיותה מכשפה ובוגדת והיא הוצאה להורג.","האות B בזהב עם פנינים בקצה מסמלת את התליון המפורסם של אן בולין בכל הציורים ההיסטוריים."]},{"artist_slug":"liel-salman","exhibition_title_he":"How Many Partners Have You Had?","exhibition_slug":"how-many","exhibition_route":"exhibitions/how-many","statement_he":["יצירתה מתאפיינת בפלטה מונוכרומטית ובשימוש מדויק בקו ובכתם - אלמנטים חדים ונקיים המתקימים במתח\nבין שליטה לשחרור. דרך שפה זו, ליאל מנסחת מהלכים רגשיים ורעיוניים,","כאשר מוטיב ה״נשיקה״ שב ומופיע כחתימה אישית וכמחווה חוזרת של חיבור, מגע ואינטימיות. בגוף עבודות זה, המוצג בתערוכה, נבחן מושג ה״פרטנר״ כמרחב דואלי:\nהתמזגות והתמסרות לצד בחירה וחירות,\nוכן המתח המתמיד בין אור לחושך, בין תלות לעצמאות.","הבחירה בקונטרסט חריף של שחור על לבן מחדדת את עוצמת המחווה ומבקשת לנסח אמירה ישירה ובלתי מתפשרת. עם זאת, הצורות המעוגלות והפתוחות\nמשמרות עמימות מכוונת, המותירה מקום לפרשנות סובייקטיבית של הצופה.","היצירה “TOGETHER”, המורכבת מצמד עבודות מקבילות, מציעה מרחב התבוננות שבו מתבקש הצופה לאתר את עצמו בתוך המופשט - לזהות, להשליך, ולמצוא עומק דווקא\nמתוך המינימלי."]},{"artist_slug":"sami-david","exhibition_title_he":"How Many Partners Have You Had?","exhibition_slug":"how-many","exhibition_route":"exhibitions/how-many","statement_he":["גוף העבודות המוצג בתערוכה מהווה חקירה פיסולית של מורכבות יחסי הכוחות בין אנשים. דרך עולם סוריאליסטי של היברידיים והכלאות בין גוף האדם לאובייקט הדומם, סמי די מעניק ביטוי חומרי למצבים של שליטה וכניעה, תלות ומאבק. הכדים וגופי החומר, הנדמים כצומחים מתוך גפיים אנושיות או קורסים לתוכן, מפרקים את המושג \"כלי קיבול\" והופכים את הגוף עצמו לזירה של קונפליקט ופגיעות.","העבודות מאופיינות בדואליות חומרית וטקסטורלית המדגישה את המתח שבין הפנים לחוץ: בעוד חלקי הכלי הפנימיים והאלמנטים המוזהבים מצופים בגלזורה שקופה המעניקה להם הגנה וברק מפתה, פני השטח הצבעוניים נותרים חשופים ונטולי גלזורה. עליהם מיושמת מכניקת צביעה ייחודית וסיזיפית שפיתח סמי די; באמצעות מזרק ומחט מוחדרות טיפות צבע הנערמות זו על גבי זו. כל פס צבעוני הוא תוצר של פעולה פיזיקלית שבה טיפה אחת דוחפת ומסיטה את קודמתה, מטאפורה חומרית למאבקי כוחות, להשפעות הדדיות ולחותם בלתי נמנע שאנשים מותירים זה על זה.","סדרת עבודות זו הוצגה במקור בגלריית ברוורמן, כחלק מתערוכה שהייתה עתידה להיפתח שבוע בלבד לאחר אסון השבעה באוקטובר, ולבסוף עמדה בחלל ללא קהל. בצל האירועים, הקריאה של גוף העבודות נטענה במשמעות חדשה וכואבת. הדיסוננס בין האסתטיקה המהודרת והזהב המפתה לבין הקיטוע של הגוף המפורק הפך להדהוד של המציאות עצמה. העבודות, שעסקו מלכתחילה בפגיעותו של הגוף ובמתחים המניעים יחסים אנושיים, הפכו לעדות אילמת לשבר עמוק, ומזמינות את הצופה להתבונן בטרנספורמציה של החומר והרוח נוכח טראומה."]},{"artist_slug":"eitan-goldson","exhibition_title_he":"בדידות בסביבה תוססת","exhibition_slug":"loneliness","exhibition_route":"exhibitions/loneliness","statement_he":["”תשע נשמות\" - מדיה מעורבת - עבודה משותפת עם\nהנריקה רוטנברג. צבעי שמן, אקריליק, גרפיט וקפה על קנבס מודפס בלייזר.","כחלק מהפרוייקט המשותף אני בכל פעם בוחר כמה צילום מתוך ספר האמן של הנריקה ובוחר איזו יצירה להדפיס ובאיזה גודל , ואז מתחיל תהליך חשיבה ארוך, לפעמים שבועות ואף חודשים על כל קנבס, איך ליצור סימביוזה בין\nשתי הנשמות שלי ושל האמן הנריקה, וליצור בכל ציור נשמה אחת משותפת.\nבחרתי כאן לגשת ליצירה עם דגש על המיתוס האומר כי לחתול יש תשע נשמות, תוך התייחסות לחיים המודרניים של היום - כמה הזדמנויות אדם מקבל בחיים כדי להצליח לממש את עצמו ולהגיע להצלחה? כמה גלגולי זהות אנחנו עוברים\nעד שאנחנו \"מוצאים את עצמינו\"? האם הצלחה ועושר מפיגים את קללת הבדידות האנושית בתוך החיים המודרניים? האם חתול או חיית מחמד היא הפתרון לבדידות בעיר הגדולה והסואנת? או להתחפש לחיה מארץ יצורי הפרא ולהעמיד פנים שאתה מלא תשוקה לערב אחד במבנה נטוש ורועש?"]},{"artist_slug":"holy-kadosh","exhibition_title_he":"בדידות בסביבה תוססת","exhibition_slug":"loneliness","exhibition_route":"exhibitions/loneliness","statement_he":["בסיום היצירה מתרחש דיאלוג שקט ביני לבין העבודה, ומתוך השכבות הנסתרות מתגלים מסרים, תובנות והשתקפויות\nשל מהותי הפנימית.\nכל יצירה עבורי היא שער רוחני, מראה לנשמה ומסע מתמשך של גילוי עצמי ”גן החיות של התודעה\" הוא אוסף יצירות שנולד מתת־מודע, מרחב פנימי של דימויים פראיים, קולות, קונפליקטים ודמויות שמופיעות כמעט ללא שליטה.\nלמרות העושר והעומס החזותי בלב הסדרה מתקיימת\nתחושת בדידות.","היצירות מציגות את הרגע שבו האדם צופה על עצמו מבפנים, בתוך ”גן חיות״ בלתי צפוי ואף כאוטי, ומזהה שההמולה שמסביב היא למעשה השתקפות של נפשו.\nהבדידות כאן אינה ניתוק מהעולם החיצון, אלא חוויית עומס פנימי: הדמויות מוקפות ביצורים, סמלים ותנועות שמרקדים בתודעה, ועדיין עומדות לבד בתוך הרעש.","HOLY BILL\nיצירה שמציגה שטר של 100 דולר בגווני כחול־סגול, צבעוניות המדגישה את המתח בין העולם החומרי, הקר והמנוכר, לבין רמז לרובד רוחני ותודעתי. הדמויות המאוירות באפור מדגישות את דעיכת האנושי בתוך מערכת פגומה ושחוקה.\nסביב הדמות המרכזית מופיעים מלאך, שטן וארנב- סמלים של מצפון מתערער, פיתוי ואשליה. הם יוצרים תחושה של חיים בתוך \"סרט מצוייר“.\nעולם שבו בעלי הכוח רואים את האדם הפשוט כדמות שטוחה וחסרת עומק. העכברושים משמשים כמטאפורה ל\"כסף מלוכלך\" ולמערכת כלכלית מסואבת.","מתוך כל התנועה, הרעש והסימבוליקה, עולה תחושת בדידות עמוקה: הדמות ניצבת בלב עולם תוסס ורווי כוח, אך נותרת לבד בתוך המאבק המוסרי והנפשי שהכסף יוצר.","HOLY BAG\nשק האגרוף, המעוטר במסכות אצטקיות ובכתובות ברכה, מציב בלב חלל תוסס את מה שאנו נוטים להצניע: מסע ההתמודדות הפנימי. בתוך מרחב מלא תנועה, צבע וקולות, מתגלה האמת השקטה- שהשדים שאנו נלחמים בהם אינם חלק מהעולם החיצון, אלא מתהווים בתוכנו.","היצירה מעניקה לדפוסים הפנימיים האלה צורה, פנים וסמלים. היא מזמינה את הצופה לא רק להיאבק בהם,\nאלא להכיר בהם כשליחים של תודעה מבקשת ריפוי.\nבתוך ההמולה, מתבהרת הבדידות העמוקה של האדם,\nזירה שבה כל אחד פוגש את עצמו ללא מסכות.","כך הופך שק האגרוף לאובייקט רוחני כמעט: כלי שמאפשר לפרוק, להשתנות, ולשחרר. דווקא בסביבה תוססת, הוא מזכיר שהשקט האמיתי נוצר כשאנחנו מעזים לראות את מה שבתוכנו ולהפוך את המאבק למרחב של מודעות וצמיחה."]},{"artist_slug":"costa-magarakis","exhibition_title_he":"בדידות בסביבה תוססת","exhibition_slug":"loneliness","exhibition_route":"exhibitions/loneliness","statement_he":["בתערוכה בגלריה מוצגים פסלים שהם חלק מעולם אישי שהוא בנה לאורך השנים. כל יצירה משלבת מלאכת‐יד, דימיון וצורה חיונית, ומזמינה את הצופה להיכנס לעולם אחר- קצת מוזר, קצת מצחיק, בתוך בועה פנימית, לפעמים מצחיק, לפעמים מוזר, ולעיתים בודד.\nהעבודות שלי מציגות לעיתים קרובות יצורים היברידיים ודמויות שנראות כאילו הן מתקיימות בתוך מציאות פנימית משל עצמן. הן שוכנות במרחבים צבעוניים, אנרגטיים ומלאי חיים, אך כולן נושאות תחושת ריחוק עדינה- נוכחות ייחודית ובודדה. בדרך זו הן משקפות בעיניי את החוויה האנושית\nשל בדידות בתוך סביבה תוססת: להיות חלק מהעולם ובו‐בזמן לעמוד מעט מחוץ לו.","אני שמח לשתף את HIGH HILL,\nאחד מהפסלים בתערוכה הנוכחית.\nעבורי, HIGH HILL הוא יותר מפסל — הוא מטאפורה.\nהוא מייצג את התחושה של עמידה גבוה מעל הכל, בתוך תנועה ורעש מסביב, אך בו זמנית קיום פנימי במרחב של בדידות שקטה.\nהוא חלק מהיקום האישי שלי: צבעוני, דמיוני, חי — ובאותו הזמן מעט מרוחק, מעט בודד."]},{"artist_slug":"hila-loterstein","exhibition_title_he":"בדידות בסביבה תוססת","exhibition_slug":"loneliness","exhibition_route":"exhibitions/loneliness","statement_he":["הגוף בעבודותיי מופיע בשיא נוכחותו, אך תמיד לבדו בתוך חלל נקי, מואר ומעוצב.\nדווקא בתוך סביבה תוססת של אור, צבע ואדריכלות, מתעצמת תחושת הבדידות - בדידות שנולדת מעודף נוכחות שאינה נענית.","הרקדנית הצהובה-\nהבדידות שלה מגיעה משיא של תנועה בתוך חלל שלא מהדהד אותה. היא לבדה.\nמצד אחד בשיאה קופצת, מתעקלת, מתמתחת, מתמסרת לתנועה, אבל: היא לבד בפריים, אין מגע, אין הדהוד אין גוף נוסף מולה. העולם סביבה מואר בצהוב ומעוצב אבל ריק אנושית.","אלה עם כנפיים-\nהפסל מתעד רגע של בדידות נשגבת- אישה ערומה, ופגיעה, מרחפת באוויר ללא עיגון.\nהערום מייצג חשיפה רגשית מוחלטת, בעוד הריחוף מדגיש ניתוק וחוסר שייכות הכנפיים מעניקות חירות, אך זו חירות דו-משמעית: היכולת להתעלות מעלה, מעל הקרקע גם מבודדת אותה מהעולם שתחתיה. הדמות תלויה בין שמיים לארץ, ללא מקום לנוח - מטאפורה לבדידות כמצב קיומי\nשל יופי מלנכולי שבו ייחודיות והתעלות באות במחיר של ניתוק מהעולם."]},{"artist_slug":"adi-duak","exhibition_title_he":"בדידות בסביבה תוססת","exhibition_slug":"loneliness","exhibition_route":"exhibitions/loneliness","statement_he":["סוכריות הצלה\nביצירת הסוכריות הנוסטלגיות שלי Life Savers מתקיים מפגש מרתק בין מתיקות לבין שקט פנימי.\nדרך סוכריות מוגדלות, צבעוניות ומבריקות נחשף עולם שמח מבחוץ אך פגיע ובודד מבפנים.","היצירות מקבלות עוצמה מהמראה המוכר והיומיומי, אך בשינוי קנה מידה, חומר ומבט- הפער בין הצבע התוסס לבין התחושה שלהיות לבד בתוך ההמולה.","סוכריות ה- Life savers מדגימות היטב את הפער.\nהן מבטיחות חיים, הצלה ואחיזה- אך במרכזן קיים חור, ריק, בדידות.\nהחלל הזה אינו רק אלמנט צורני, הוא סמל למקום פנימי שיש בכל אחד מאיתנו, נקודת בדידות שמתקיימת גם בתוך סביבה מלאת צבע, רעש ותנועה."]},{"artist_slug":"maya-nachum-levy","exhibition_title_he":"בדידות בסביבה תוססת","exhibition_slug":"loneliness","exhibition_route":"exhibitions/loneliness","statement_he":["”שועל\" ו\"ממותה ואור ירח\" נבעו מתוך אוסף צילומי רחוב שצילמתי של חיות שנדרסו בעיר.\nבדומה לנהגים סקרנים שמאטים את רכבם למראה תאונת דרכים, כך גם אני לא יכלתי שלא לעצור ולבהות מהמראה האימתי והיפה בו זמנית.\nתהיתי, אם זה כזה מגעיל, מדוע אני מתקרבת.","צמד היצירות לקוחות מתוך סדרה של יריעות בד המטופלות בפיגמנט בטכניקה ייחודית ואנלוגית שפיתחתי, חפה מפגיעה בבעלי חיים, ומקיימת.\nהיריעות מציגות לראווה חומר מלאכותי, דו צדדי, המזכיר פרווה ועור- ייצוגם החזותי של שטיחי פרווה של חיה ניצודה. קנה המידה שלהן טומן בתוכו את הסתירה בין פריסת עור החיה כפי שהוא, לבין פורמט גליל בד תעשייתי במטר רץ."]},{"artist_slug":"la-raz-porta","exhibition_title_he":"בדידות בסביבה תוססת","exhibition_slug":"loneliness","exhibition_route":"exhibitions/loneliness","statement_he":["סדרה זו נולדה מתוך מפגש בין שתי יוצרות אנונימיות, שבחרו לוותר על חתימה פרטית ולתת למעגלי הסמל, הציור והטקסט לדבר בעצמם.","בתוך כל עבודה חבוי כתב־סתרים מקורי — מערכת קודים שנוצרה במיוחד עבור הסדרה, מעין לחישות חזותיות המשמשות כקמעות. כל קוד נכתב כטקס זימון,\nכהזמנה מדויקת לעבודה פנימית: הגנות, התמרה, בהירות, אומץ, התעוררות.","הדימויים נשענים על שפות עתיקות אך מסרבים להישאר קשורים לזמן מסוים.\nהציורים אינם ארכיאולוגיה של רוחניות, אלא פרשנות חיה ואקטואלית של תהליכים נפשיים — טקסי מעבר שעוברים דרך גוף, פחד, אור, צל והתחדשות.\nהם מבקשים מהצופה לא רק להתבונן, אלא להשתתף:\nלקרוא, לפענח, להרגיש, ולשאול על איזה שער פנימי הוא עומד ברגע זה.","יש בעבודות רגעים של המתנה — לא כעונש, אלא כהכנה מדויקת; שערים שנפתחים רק כשהתודעה בשלה לעבור דרכם. לצד זאת מתקיימת קריאה להתעורר ממה שכבר אינו משרת, להתקרב אל הלב לא כמשאב נוסטלגי אלא כמצפן חי, ולהאמין באור שמתחיל לנוע עוד לפני שהוא נראה.","הסדרה מחזיקה תזכורת ברורה: השינוי שאנו מבקשים מצריך מפגש עם מה שאנחנו נוטים להתחמק ממנו. הגבול היחיד הוא לעיתים אנחנו עצמנו. הזריחה הפנימית מתחילה באופן שבו אנחנו חושבים, נושמים, מעזים.","כך נרקמת מפה אישית ורב־שכבתית — מפת מסע של תודעה. לא כהבטחה לריפוי מהיר, אלא כהזמנה למפגש אמיתי עם מה שמניע אותנו, מגדיל אותנו, ולעיתים גם מערער אותנו.\nהקמיעות בסדרה אינם מגנים מבחוץ, אלא מזכירים את מה שכבר קיים בפנים:\nכוח, בחירה, כוונה, היכולת להשתנות, והידיעה שכל צעד — גם הכואב הוא חלק מההתמרה.","בין השקט של הסמלים לאינטנסיביות של הפרטים, העבודות מציעות רגע של עצירה, כמו נשימה עמוקה לפני דלת שנפתחת.\nכך הן הופכות לקמיעות: לא אובייקטי כוח, אלא מראות.\nכל אחת מהן מצביעה באלגנטיות חדה אל האזור המדויק\nשבו מתחיל הקסם — בדיוק במקום שבו אנחנו היינו\nמעדיפים לעצום עיניים."]},{"artist_slug":"zohar-shtrit","exhibition_title_he":"בדידות בסביבה תוססת","exhibition_slug":"loneliness","exhibition_route":"exhibitions/loneliness","statement_he":["העבודה מציגה תקריב מטושטש של פני ליצן- דימוי תרבותי המזוהה עם החצנה, תנועה ותגובה מיידית.","באמצעות טשטוש מכוון וחיתוך, הדימוי מנותק מהקשרו הטבעי, והחיוך חדל מלתפקד כתגובה ברורה. הוא מתקיים כמחווה תלויה, חסרת יעד.\nהטשטוש מבטל זהות, מגדר והבעה כוללת:\nאדום בוהק, מוגזם, כזה שנועד להיראות מרחוק.","האיפור, שבדרך כלל משמש להדגשה ולתקשורת ישירה עם קהל, פועל כאן באופן הפוך — הוא מדגיש דווקא את המרחק ואת חוסר היכולת לקרוא את הרגש באופן חד־משמעי. הדימוי, הפועל לרוב בתוך מרחב רווי אינטראקציה וגירויים, מתקיים כאן מול חלל שקט, ונשאר פעיל גם כאשר אין מי שישיב לו מבט.","הליצן הוא דמות של כוח פרפורמטיבי, בעלת רישיון חברתי לחרוג- עטיית האף האדום או האיפור מעניקה לו לגיטימציה לפעול מחוץ לכללים- לומר את הבלתי־נאמר, להגזים, להיחשף — מתוך ידיעה שהתגובה כלפיו תהיה לרוב סלחנית ואף אוהדת. זהו חוזה לא־כתוב בין הדמות לבין הקהל.\nבעבודה זו, החוזה מושהה. הליצן אינו מופיע בתוך הקשר של הופעה חיה או תגובה מיידית, אלא כלוא ברגע סטטי, חסר תגמול. המסכה קיימת, אך הפונקציה החברתית שלה מתערערת. האיפור נותר כפעולה חד־צדדית, והכוח שהוא מעניק לדמות הופך גם למנגנון של ניתוק.","העבודה עוסקת במצב שבו תפקוד, הופעה ויכולת למשוך תשומת לב מתקיימים במקביל לתחושת ריחוק.\nהיא בוחנת את המתח שבין ההגנה שהמסכה מספקת לבין המחיר שהיא גובה — טשטוש של הפנים, של הגבולות, ושל האפשרות להיראות ללא תיווך."]},{"artist_slug":"michael-konovalenko","exhibition_title_he":"הקולפן","exhibition_slug":"the-peeler","exhibition_route":"opencalls/the-peeler","statement_he":["היצירות המוצגות נולדות מתוך תפיסה של \"נוכחות בתוך הכאוס\" – לא כניסיון לארגן או לסדר את המציאות, אלא מתוך הסכמה מודעת להישאר בתוכה כשהיא גולמית, רוטטת וחיה. אירועי חיים ומטענים כמו לחץ, מלחמה, פרידה ואובדן אינם נתפסים כאירועים חולפים, אלא כאדמה שממנה צומחת פעולת ההתבוננות.","בעוד שבעבר היצירה שימשה עבורו כרפלקס ותגובה עיוורת לזיכרונות מעצבים, כיום האמן בוחר להתעכב בתוך התהליך ולא למהר ולברוח אל התוצאה; לשהות בתוך הכאוס והמים העכורים מבלי למהר לסנן אותם. הקולאז'ים אינם מבקשים להסביר את הכאוס או לנצח אותו, אלא להוות מרחב של שהייה, שמתוכו ומתוך הסדקים שבו – מבצבצים בהדרגה רגעים של שקט, רוגע ויופי."]},{"artist_slug":"maria-artamonova","exhibition_title_he":"הקולפן","exhibition_slug":"the-peeler","exhibition_route":"opencalls/the-peeler","statement_he":["העבודה \"Freedom\" מהווה התגלמות של מושג החופש, כפי שהוא משתקף בצבעוניות עשירה ובצורות מגוונות. היצירה נולדה מתוך תהליך שבו הזמן עוצר מלכת והאמנית שוקעת בעולם של השראה נטול מסגרות, המאפשר ביטוי טהור של רגשות ורעיונות.\nהעבודה מזמינה את הצופה להשהות את המציאות היומיומית, ומזכירה את החשיבות של מתן רשות עצמית לגלות, להשתחרר ולהתמזג באופן מלא עם רגע היצירה והגילוי."]},{"artist_slug":"alice-debellis","exhibition_title_he":"הקולפן","exhibition_slug":"the-peeler","exhibition_route":"opencalls/the-peeler","statement_he":["העבודה נולדה מתוך התבוננות בילדה הפנימית – נוכחות נצחית ומקום פנימי, בטוח ומוגן החופשי ממסכות, מתפקידים ומכל השכבות שהחיים מניחים על זהותנו. לאורך השנים, זיכרונות, פרשנויות ואמונות מצטברים זה על גבי זה והופכים לזהות המגנה עלינו, אך לעיתים גם מרחיקה אותנו מהמהות האותנטית שלנו.","היצירה מבקשת להתבונן בשכבות הללו מבלי להסירן, מתוך תפיסה שהחירות אינה טמונה בהגדרה עצמית חדשה, אלא בהכרה בכך שאנחנו רחבים בהרבה מהזהות שבנינו.\nבאמצעות סמלים מיסטיים וארכיטיפיים – עיניים, כוכבים, שמשות, ירחים, ציפורים וחוטים המחברים בין עולמות – האמנית עוסקת בתפקידן המגן של השכבות לצד הכמיהה המתמדת לשוב אל המקור הטהור והחופשי, שנותר בלתי נגוע בשכבות הזמן."]},{"artist_slug":"amnon-lipkin","exhibition_title_he":"הקולפן","exhibition_slug":"the-peeler","exhibition_route":"opencalls/the-peeler","statement_he":["היצירות המוצגות בתערוכה נולדו מתוך שבר אישי עמוק ומאבק פנימי מתמשך בעקבות קשר קצר שנגדע, אשר הותיר אחריו כמיהה עזה שלא כבתה במשך שנים. העבודות חוקרות את הפער הבלתי ניתן לגישור שבין ההיגיון והמחשבה המבקשים לשחרר ולהמשיך הלאה, לבין התחושה הפנימית העיקשת והאוחזת.","דרך המדיום החומרי, ליפקין מציף כמיהה חזקה אל אובייקט רחוק, בלתי מושג או פנטזיונרי. הדימויים נעים במעגלים שבין הרצון לשוב ולרדוף אחר המרחק, לבין לעיסה חוזרת ומיוסרת של מה שהיה ואיננו עוד, ועד לקבלה נוגה, מפוכחת וכואבת של המציאות המאכזבת והכניעה לה."]}]</script>

  /* Hebrew letters proper (alef-tav + finals); excludes punctuation like ״ ׳.

  var HEB_LETTERS=/[א-ת]/;
  function langClass(s){ return HEB_LETTERS.test(s||"") ? "is-he" : "is-en"; }
  var LATIN_RUN=/["'“«(]*[A-Za-zÀ-ÖØ-öø-ÿ]{2}[A-Za-zÀ-ÖØ-öø-ÿ0-9@&'’._?!:,;()/"\u00a0 -]*[A-Za-zÀ-ÖØ-öø-ÿ0-9?!).]|[A-Za-zÀ-ÖØ-öø-ÿ]{2,}/g;
  function restoreLatSpans(s){

    return escapeHtml(s).replace(
      /&lt;span class=&quot;lat&quot;&gt;([\s\S]*?)&lt;\/span&gt;/g,

    );

  function wrapLatinRuns(html){
    return String(html).split(/(<span class="lat">[\s\S]*?<\/span>)/g).map(function(part){
      if(/^<span class="lat">/.test(part)) return part;

        .replace(/\d+(?:[.,]\d+)?(?:\s*[xX×]\s*\d+(?:[.,]\d+)?)+/g,function(m){return '<span class="dim">'+m+'</span>';});

  /* JSON text can be Hebrew, English, or mixed. Preserve approved inline spans,

  /* Bio intro "name line": wrap a "(Latin name)" group — parentheses INCLUDED — as one

  function introHtml(s){

    /* Parenthetical handling in RTL:
       - purely-Latin "(Samy D)" -> isolate the whole group (parens included) LTR.
       - mixed "(המותג AKRA)" -> keep BOTH parens in the RTL flow and isolate ONLY the
         Latin word, so the parens hug correctly and the Hebrew stays Hebrew. (Wrapping
         "AKRA)" together would split the paren pair across bidi contexts -> "(המותג (akra".) */
    var pre=String(s).replace(/\(([^()]*[A-Za-zÀ-ÖØ-öø-ÿ][^()]*)\)/g,function(m,inner){
      if(/[\u0590-\u05FF]/.test(inner)){
        var w=inner.replace(/[A-Za-zÀ-ÖØ-öø-ÿ][A-Za-zÀ-ÖØ-öø-ÿ0-9'’.&-]*/g,function(lat){return '<span class="lat">'+lat+'</span>';});
        return '('+w+')';
      }
      return '<span class="lat">('+inner+')</span>';
    });
    return mixedHtml(pre);
  }
  /* English-only titles: Hebrew gershayim (\u05f4) break bidi next to apostrophes. */
  function normalizeLtrTitle(s){
    if(!s||/[א-ת]/.test(s))return s;
    return String(s)
      .replace(/^\s*[\u05F4\u201C\u201D"]+/,'"')
      .replace(/[\u05F4\u201C\u201D"]+\s*$/,'"')
      .replace(/\u05F3/g,"'");
  }
  function titleHtml(s){ return mixedHtml(normalizeLtrTitle(s)); }
  /* Figma landing::235:348 — title "EN — HE" → stacked EN lines, sep, stacked HE lines */
  function worksSharedTitleBlock(titleStr){
    if(!titleStr)return"";
    var parts=String(titleStr).split(/\s+[\u2014\u2013]\s+/);
    if(parts.length!==2){
      return '<div class="title '+langClass(titleStr)+'">'+titleHtml(titleStr)+'</div>';
    }
    var en=parts[0].trim();
    var he=parts[1].trim();
    if(!HEB_LETTERS.test(he)){
      return '<div class="title '+langClass(titleStr)+'">'+titleHtml(titleStr)+'</div>';
    }
    if(!/[A-Za-z]/.test(en)){
      return '<div class="title '+langClass(titleStr)+'">'+titleHtml(titleStr)+'</div>';
    }
    var enLines="";
    var enFor=en.match(/^([\s\S]*?)(\s+FOR\s+)([\s\S]+)$/i);
    if(enFor){
      enLines=
        '<div class="works-shared-en-line">'+titleHtml(enFor[1].trim()+" FOR")+'</div>'+
        '<div class="works-shared-en-line">'+titleHtml(enFor[3].trim())+'</div>';
    }else{
      enLines='<div class="works-shared-en-line">'+titleHtml(en)+'</div>';
    }
    var heLines="";
    var lx=he.indexOf(" לעולמות");
    if(lx>0){
      heLines=
        '<div class="works-shared-he-line">'+titleHtml(he.slice(0,lx).trim())+'</div>'+
        '<div class="works-shared-he-line">'+titleHtml(he.slice(lx).trim())+'</div>';
    }else{
      heLines='<div class="works-shared-he-line">'+titleHtml(he)+'</div>';
    }
    return (
      '<div class="works-shared-duo">'+
        '<div class="works-shared-en">'+enLines+'</div>'+
        '<div class="works-shared-sep" aria-hidden="true">-</div>'+
        '<div class="works-shared-he">'+heLines+'</div>'+
      '</div>'
    );
  }
  function bioParagraphs(text){
    if(!text)return "";
    var HEB=/[֐-׿יִ-ﭏ]/;
    function isAllEnglish(line){return line.trim().length>0&&!HEB.test(line);}
    return text.split(/\n\s*\n/).map(function(para){
      var lines=para.split(/\n/);
      var out="",buf=[];
      function flush(){if(buf.length){out+="<p>"+buf.join("<br>")+"</p>";buf=[];}}
      lines.forEach(function(line){
        if(isAllEnglish(line)){flush();out+='<div class="en-line">'+mixedHtml(line)+'</div>';}
        else{buf.push(mixedHtml(line));}
      });
      flush();
      return out;
    }).join("");
  }

  function renderArtist(a){
    var root=document.getElementById("artist-root");
    document.title=(a.name_en?a.name_en:a.slug)+" — Zielinski & Rozen";

    /* if artist has no figma page (no bio + no works), show placeholder */
    if(!a.bio_he && (!a.works||a.works.length===0)){
      var heroImg=a.work_image||a.portrait||"";
      root.innerHTML=
        '<section class="placeholder">'+
          '<h1>'+escapeHtml(a.name_en||a.slug)+'</h1>'+
          (a.name_he?'<p class="sub" dir="rtl">'+escapeHtml(a.name_he)+'</p>':"")+
          '<p class="sub" style="margin-top:12px" dir="rtl">דף האומן בהכנה</p>'+
          (heroImg?'<div class="work-image"><img src="../../'+escapeHtml(heroImg)+'" alt="'+escapeHtml(a.name_he||a.name_en)+'" decoding="async" fetchpriority="high"></div>':"")+
        '</section>';
      return;
    }

    /* Hero */
    var heroHTML="";
    function heroNameParts(nameEn){
      var s=String(nameEn||"").trim();
      var parts=s.split(/\s+/);
      if(parts.length>=2&&parts[parts.length-1].replace(/[^A-Za-z0-9]/g,'').length===1){
        return {first:s,last:""};
      }
      var first=parts.shift()||"";
      return {first:first,last:parts.join(" ")};
    }
    var heroNp=heroNameParts(a.name_en);
    var first=heroNp.first;
    var last=heroNp.last;

    /* split bio: first paragraph is "intro", rest is "body" — matches alon-desktop divider layout */
    var bioBlocks=(a.bio_he||"").split(/\n\s*\n/);
    var intro=bioBlocks.shift()||"";
    var body=bioBlocks.join("\n\n");
    var hasIntro=intro && body;

    /* Per-artist focal points — override with a.portrait_focus from JSON, or use lookup table.
       Values are CSS object-position (x y). Face is always the target. */
    var FOCAL_POINTS={
      'zohar-ron': '50% 42%',
      'eitan-goldson': '50% 18%',
      'tanya-shin': '50% 30%',
      'nir-giorgio-levin': '50% 32%',
      'elsa-ars-brush': '50% 38%',
      'gal-polk': '50% 20%',
      'zohar-shtrit': '50% 25%',
      'hila-loterstein': '50% 28%',
      'sami-david': '50% 25%',
      'risa-oz': '50% 35%',
      'zohar-ron-dan-ben-ari': '50% 35%',
      'adi-duak': 'center center',
      'alon': '58% 40%',
      'noemi-safir': '50% 18%',
      'yarden-amir': '50% 38%',
      'anat-wegier': '50% 32%',
      'liel-salman': '50% 32%',
      'tal-nehoray': '50% 32%',
      'holy-kadosh': '50% 30%',
      'costa-magarakis': '58% 35%',
      'maya-nachum-levy': '50% 25%',
      'la-raz-porta': '50% 50%'
    };
    var focus=a.portrait_focus||FOCAL_POINTS[a.slug]||'center 25%';
    var focusStyle=' style="object-position:'+focus+'"';

    var portraitHTML="";
    if(a.hero_images && a.hero_images.length>=2){
      var f0=(a.hero_image_focus&&a.hero_image_focus[0])||"";
      var f1=(a.hero_image_focus&&a.hero_image_focus[1])||"";
      var s0=f0?' style="object-position:'+f0+'"':"";
      var s1=f1?' style="object-position:'+f1+'"':"";
      var img0Attrs=' decoding="async" fetchpriority="high"';
      var img1Attrs=' decoding="async" loading="lazy"';
      portraitHTML=
        '<div class="hero-portrait dual">'+
          '<div class="pic"><img src="../../'+escapeHtml(a.hero_images[0])+'" alt="'+escapeHtml(a.name_he||a.name_en||'')+'"'+s0+img0Attrs+'></div>'+
          '<div class="pic"><img src="../../'+escapeHtml(a.hero_images[1])+'" alt="'+escapeHtml(a.name_he||a.name_en||'')+'"'+s1+img1Attrs+'></div>'+
        '</div>';
    } else if(a.portrait){
      portraitHTML=
        '<div class="hero-portrait">'+
          '<img src="../../'+escapeHtml(a.portrait)+'" alt="'+escapeHtml(a.name_en||a.slug)+'"'+focusStyle+' decoding="async" fetchpriority="high">'+
        '</div>';
    }

    function collabNameParts(art){
      var nl=art.name_en;
      if(Array.isArray(nl)){
        return {first:nl[0]||"",last:nl.slice(1).join(" ")};
      }
      var parts=String(nl||"").split(/\s+/);
      return {first:parts[0]||"",last:parts.slice(1).join(" ")};
    }
    function collabBlock(art){
      var np=collabNameParts(art);
      return ''+
        '<div class="hero-collab-block">'+
          '<div class="hero-name hero-name--collab">'+
            '<span class="first">'+escapeHtml(np.first)+'</span>'+
            (np.last?'<span class="last">'+escapeHtml(np.last)+'</span>':"")+
          '</div>'+
          (art.bio_he_short?'<div class="hero-collab-bio">'+mixedHtml(art.bio_he_short).replace(/\n/g,"<br>")+'</div>':"")+
          (art.instagram?heroHandleLink(art.instagram):"")+
        '</div>';
    }

    var bioHTML;
    var heroHTML;
    if(a.hero_collab && a.hero_collab.artists && a.hero_collab.artists.length>=2){
      var Ac=a.hero_collab.artists;
      var bioFlat='<div class="hero-bio hero-bio--flat"><div class="body">'+bioParagraphs(a.bio_he||"")+'</div></div>';
      heroHTML=
        '<section class="hero is-collab"><div class="hero-inner">'+
          '<div class="hero-text">'+
            '<div class="hero-collab-meta">'+
              collabBlock(Ac[0])+
              '<p class="hero-collab-x" aria-hidden="true">×</p>'+
              collabBlock(Ac[1])+
            '</div>'+
            bioFlat+
          '</div>'+
          portraitHTML+
        '</div></section>';
    } else {
    if(hasIntro){
      bioHTML=
        '<div class="hero-bio">'+
          '<div class="bio-intro-row">'+
            '<div class="bio-col">'+
              '<div class="intro">'+introHtml(intro).replace(/\n/g,"<br>")+'</div>'+
              '<div class="body">'+bioParagraphs(body)+'</div>'+
            '</div>'+
            '<div class="divider"></div>'+
          '</div>'+
        '</div>';
    } else if(intro){
      bioHTML=
        '<div class="hero-bio">'+
          '<div class="bio-intro-row">'+
            '<div class="bio-col">'+
              '<div class="intro">'+introHtml(intro).replace(/\n/g,"<br>")+'</div>'+
            '</div>'+
            '<div class="divider"></div>'+
          '</div>'+
        '</div>';
    } else {
      bioHTML=
        '<div class="hero-bio">'+
          '<div class="bio-intro-row">'+
            '<div class="bio-col">'+
              '<div class="body">'+bioParagraphs(a.bio_he||"")+'</div>'+
            '</div>'+
            '<div class="divider"></div>'+
          '</div>'+
        '</div>';
    }

    heroHTML=
      '<section class="hero"><div class="hero-inner">'+
        '<div class="hero-text">'+
          '<div class="hero-info">'+
            '<div class="hero-name">'+
              '<span class="first">'+escapeHtml(first)+'</span>'+
              (last?'<span class="last">'+escapeHtml(last)+'</span>':"")+
            '</div>'+
            (a.instagram_handle?heroHandleLink(a.instagram_handle):"")+
          '</div>'+
          bioHTML+
        '</div>'+
        portraitHTML+
      '</div></section>';
    }

    /* Works section — card grid matching /works/. Rich cards (artist · title · details ·
       sold · gallery) come from works.json art_works[] where this artist appears; otherwise
       the artist's own works[] (artist · title · medium). No fabricated gallery/sold data. */
    var worksHTML="";
    var WV2BASE="../../images/works/v2/";
    var rich=(window.__ART_WORKS_INLINE__||[]).filter(function(w){return w.artist_slug===a.slug || (w.artist_pages && w.artist_pages.indexOf(a.slug)>=0);});
    /* per-artist Figma order (artist-pages frames) — falls back to array order when null */
    rich.sort(function(x,y){return (x.artist_page_pos||1e9)-(y.artist_page_pos||1e9);});

    function artistNameSpan(he,en){
      var nm=he||en||"";
      return '<span class="artist '+(he?'is-he':'is-en')+'">'+escapeHtml(nm)+'</span>';
    }
    /* collaborative artwork: two-way linked credit (golden rule: every artist mention is a link) */
    function artistCreditHtml(w){
      if(w.collab && w.collab.length){
        var conn=w.collab_connector_he||"בשיתוף";
        var inner=w.collab.map(function(c){
          return '<a href="../../artists/'+escapeHtml(c.slug)+'/">'+escapeHtml(c.name_he||c.name_en||"")+'</a>';
        }).join(' '+escapeHtml(conn)+' ');
        return '<span class="artist is-he">'+inner+'</span>';
      }
      return artistNameSpan(w.artist_he,w.artist_en);
    }
    function biTitle(he,en){
      if(he&&en){
        return '<span class="title is-bi">'+
          '<span class="title-he">'+escapeHtml(he)+'</span>'+
          '<span class="title-sep" aria-hidden="true"></span>'+
          '<span class="title-en">'+escapeHtml(en)+'</span>'+
        '</span>';
      }
      if(he) return '<span class="title is-he">'+escapeHtml(he)+'</span>';
      if(en) return '<span class="title is-en">'+escapeHtml(en)+'</span>';
      return '';
    }
    function v2srcset(w){
      return (w.widths||[]).map(function(width,i){
        var last=i===w.widths.length-1;
        var file=last?(WV2BASE+w.img+".webp"):(WV2BASE+w.img+"-"+width+"w.webp");
        return file+" "+width+"w";
      }).join(", ");
    }

    function buildRichCard(w,globalIdx){
      var main=WV2BASE+w.img+".webp";
      var capTitle=(w.title_he&&w.title_en)?(w.title_he+" · "+w.title_en):(w.title_he||w.title_en||"");
      var alt=(w.artist_he||w.artist_en||"")+(capTitle?" — "+capTitle:"");
      var loadAttr=globalIdx?'loading="lazy"':'fetchpriority="high"';
      var img='<img src="'+main+'" srcset="'+v2srcset(w)+'" sizes="(max-width:768px) 46vw, 45vw" width="'+w.w+'" height="'+w.h+'" alt="'+escapeHtml(alt)+'" decoding="async" '+loadAttr+'>';
      var details=w.details_he?'<span class="details">'+mixedHtml(w.details_he).replace(/(\d)([xX])(?=\d)/g,'$1<span class="dim-x">$2</span>')+'</span>':'';
      var footInner=(w.sold?'<span class="sold">נמכר</span>':'')+
        (w.gallery_en?'<a class="gallery" href="../../#galleries">'+escapeHtml(w.gallery_en)+'</a>':'');
      var foot=footInner?('<div class="work-meta-foot">'+footInner+'</div>'):'';
      return '<article class="work">'+
          '<div class="img" data-artwork-src="'+main+'"'+(w.id?' data-artwork-page="../../works/'+escapeHtml(w.id)+'/"':'')+' data-artwork-title="'+escapeHtml(capTitle)+'" data-artwork-artist="'+escapeHtml(w.artist_en||"")+'">'+img+'</div>'+
          '<div class="work-meta">'+
            artistCreditHtml(w)+
            biTitle(w.title_he,w.title_en)+
            details+
            foot+
          '</div>'+
        '</article>';
    }
    function statementHtml(arr){
      return (arr||[]).map(function(par){
        return '<p>'+mixedHtml(String(par)).replace(/\n/g,"<br>")+'</p>';
      }).join("");
    }
    function exStatement(slug,title){
      var L=window.__EX_STATEMENTS_INLINE__||[];
      for(var i=0;i<L.length;i++){if(L[i].artist_slug===slug&&L[i].exhibition_title_he===title)return L[i].statement_he;}
      return null;
    }
    function buildExGroups(list){
      var groups=[], byKey={};
      list.forEach(function(w){
        var key=w.exhibition_title_he||"__ungrouped__";
        if(!byKey[key]){byKey[key]={title:w.exhibition_title_he,route:w.exhibition_route,statement:exStatement(a.slug,w.exhibition_title_he),items:[]};groups.push(byKey[key]);}
        byKey[key].items.push(w);
      });
      var gi=0;
      return groups.map(function(g){
        var head="";
        if(g.title){
          var hi=mixedHtml(g.title);
          var hh='<h3 class="ex-heading">'+(g.route?'<a href="../../'+escapeHtml(g.route)+'/">'+hi+'</a>':hi)+'</h3>';
          var st=g.statement?('<div class="ex-statement">'+statementHtml(g.statement)+'</div>'):'';
          head='<header class="ex-group-head">'+hh+st+'</header>';
        }
        var cards=g.items.map(function(w){if(w.statement_he&&w.statement_he.length){var _wt=(w.title_he||w.title_en||"");var _wh=_wt?'<div class="ws-head">'+mixedHtml(_wt)+'</div>':"";return '<div class="work-statement"><span class="ws-rule"></span>'+_wh+'<div class="ws-body">'+statementHtml(w.statement_he)+'</div></div>'+buildRichCard(w,gi++);}return buildRichCard(w,gi++);}).join("");
        var single=g.items.length===1?' single':'';
        return '<section class="ex-group">'+head+'<div class="works-grid'+single+'" data-artwork-gallery>'+cards+'</div></section>';
      }).join('<hr class="ex-divider">');
    }

    var cardsHTML="", isSingle=false, hasWorks=false, groupsHTML="";

    if(rich.length){
      hasWorks=true;
      if(rich.some(function(w){return w.exhibition_title_he;})){
        groupsHTML=buildExGroups(rich);
      } else {
        isSingle=rich.length===1;
        cardsHTML=rich.map(function(w,i){return buildRichCard(w,i);}).join("");
      }
    } else if(a.works && a.works.length>0){
      hasWorks=true; isSingle=a.works.length===1;
      cardsHTML=a.works.map(function(w){
        var tw=(w.title&&String(w.title).trim())?String(w.title).trim():"";
        var sub=[w.year,w.medium].filter(Boolean).join(" · ");
        var titleBlock=tw?('<div class="title '+langClass(tw)+'">'+titleHtml(tw)+'</div>'):'';
        var details=sub?'<span class="details">'+escapeHtml(sub)+'</span>':'';
        var label=tw||(a.name_he||a.name_en||"");
        return '<article class="work">'+
            '<div class="img" data-artwork-src="../../'+escapeHtml(w.image)+'" data-artwork-title="'+escapeHtml(label)+'" data-artwork-artist="'+escapeHtml(a.name_en||"")+'">'+
              '<img src="../../'+escapeHtml(w.image)+'" alt="'+escapeHtml(label)+'" loading="lazy" decoding="async">'+
            '</div>'+
            '<div class="work-meta">'+
              artistNameSpan(a.name_he,a.name_en)+
              titleBlock+
              details+
            '</div>'+
          '</article>';
      }).join("");
    }

    if(hasWorks){
      var worksBody=groupsHTML
        ? '<div class="ex-groups">'+groupsHTML+'</div>'
        : '<div class="works-grid'+(isSingle?' single':'')+'" data-artwork-gallery>'+cardsHTML+'</div>';
      worksHTML=
        '<section class="works"><div class="works-inner">'+
          '<div class="works-head"><h2>the artworks</h2></div>'+
          worksBody+
        '</div></section>';
    }

    root.innerHTML=heroHTML+worksHTML;

    /* lightbox: tell the shared component about freshly-injected nodes */
    if (window.ArtworkLightbox && window.ArtworkLightbox.refreshFocusable){
      window.ArtworkLightbox.refreshFocusable();
    }
    /* upgrade injected <img srcset> to AVIF where a sibling exists (rich works cards) */
    if (window.PictureUpgrade && window.PictureUpgrade.refresh){
      window.PictureUpgrade.refresh(root);
    }
    document.body.classList.remove('is-loading-data');
  }

  function renderError(msg){
    document.getElementById("artist-root").innerHTML=
      '<section class="placeholder">'+
        '<h1>artist not found</h1>'+
        '<p class="sub" dir="rtl">'+escapeHtml(msg||"")+'</p>'+
        '<p class="sub" style="margin-top:24px"><a href="../../works/" style="text-decoration:underline">←&nbsp;the art works</a></p>'+
      '</section>';
    document.body.classList.remove('is-loading-data');
  }

  var slug=getSlug();
  if(!slug){renderError("חסר slug בכתובת");return;}

  function findAndRender(list){
    var a=(list||[]).find(function(x){return x.slug===slug||x.id===slug;});
    if(!a){renderError("האומן ׳"+slug+"׳ לא נמצא");return;}
    renderArtist(a);
  }

  /* INLINE FIRST — works on file:// without a server. */
  if(window.__ARTISTS_INLINE__ && window.__ARTISTS_INLINE__.length){
    findAndRender(window.__ARTISTS_INLINE__);
    return;
  }

  /* fallback: fetch (HTTP-served only) */
  fetch("../../data/artists.json")
    .then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
    .then(function(data){findAndRender(data.artists);})
    .catch(function(err){
      renderError("שגיאה בטעינת הנתונים: "+err.message+" — נסה להפעיל שרת מקומי או טען מחדש.");
    });
})();
</script>
