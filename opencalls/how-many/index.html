:root{
  --white:#FFFFFF;
  --bg-grey:#EEF0EF;
  --bg-trigger:#FAFAFA;       /* opencall-only: emotional-triggers bg on mobile */
  --ink:#1B1B1B;
  --grey-mid:#808080;
  --copy-grey:#6B7280;
  --status-grey:#989898;       /* opencall-only: 'submission closed' badge */
  --divider:#D6D6D6;
  --divider-mobile:#EFEFEF;
  --max:1440px;
  --cop:"Copperplate","Noto Sans Arabic","Times New Roman",serif;
  --heb:"FbEzmel","Noto Sans Arabic","Arial Hebrew","David Libre",serif;
  --pad-x:96px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--white);color:var(--ink);font-family:var(--cop);-webkit-font-smoothing:antialiased;overflow-x:clip}
img{display:block;max-width:100%;height:auto}
a{color:inherit;text-decoration:none}
button{font:inherit;cursor:pointer;background:none;border:0;color:inherit}

/* GLOBAL CASING — English UPPERCASE; Hebrew exempt. */
body{text-transform:uppercase}
.heb,.heb *,[dir="rtl"],[dir="rtl"] *{text-transform:none;font-family:var(--heb)}
.lat,.lat *{font-family:var(--cop);text-transform:uppercase;direction:ltr;unicode-bidi:isolate}
.mono{font-family:var(--cop);font-weight:300}

.only-mobile{display:none}
.only-desktop{display:block}

/* Mobile stacked gallery sizing defaults (kept outside media query so
   dimensions stay correct in responsive emulators too). */
.oc-mobile-gallery .stacked-gallery{
  --sg-stage-h: 620px;
  --sg-main-w: 300px;  --sg-main-h: 533px;
  --sg-main-x: calc((100% - 300px) / 2);   --sg-main-y: 44px;
  --sg-peek-w: 150px;  --sg-peek-h: 267px;
  --sg-peek-x: -58px;  --sg-peek-y: 177px;
  --sg-peek-opacity: .6;
}
.oc-mobile-gallery .sg-item .deco{position:absolute;left:50%;top:50%;width:56px;height:56px;border-radius:50%;background:rgba(217,217,217,.4);display:flex;align-items:center;justify-content:center;transform:translate(-50%,-50%);pointer-events:none}
.oc-mobile-gallery .sg-item .deco::before{content:"";display:block;width:0;height:0;border-style:solid;border-width:10px 0 10px 18px;border-color:transparent transparent transparent rgba(27,27,27,.8);margin-left:3px}
.oc-mobile-gallery .sg-item.is-peek .deco{width:36px;height:36px}
.oc-mobile-gallery .sg-item.is-peek .deco::before{border-width:7px 0 7px 12px;margin-left:2px}
/* Mobile gallery: play video inline in the same card (no lightbox). */
.oc-mobile-gallery .sg-media{position:relative;width:100%;height:100%;overflow:hidden}
.oc-mobile-gallery .sg-item:not(.is-inline-playing) .sg-inline-video{display:none !important}

/* ============================================================
   OPENCALL HERO — desktop (gray bg + side image)
   ============================================================ */
.oc-hero{background:var(--bg-grey);padding:48px var(--pad-x) 32px;display:flex;justify-content:center}
.oc-hero .row{display:flex;gap:48px;align-items:stretch;width:100%;max-width:var(--max)}
.oc-hero .text-col{flex:1;display:flex;flex-direction:column;gap:16px;padding:0 16px;direction:rtl}
.oc-hero .status-row{display:flex;justify-content:flex-start;align-items:center;gap:16px;flex-wrap:wrap}
.oc-hero .badge{display:inline-flex;align-items:center;gap:10px;padding:4px 8px;border:1px solid var(--ink);min-height:30px;font-family:var(--heb);font-weight:300;font-size:18px}
.oc-hero .badge.status{border-color:var(--status-grey);color:var(--status-grey);font-family:var(--cop);letter-spacing:.04em}
.oc-hero .heb .badge.status{font-family:var(--heb)}
.oc-hero .title{font-family:var(--cop);font-weight:400;font-size:24px;text-align:right;direction:rtl;color:var(--ink);line-height:1.3}
.oc-hero .title .heb{font-family:var(--heb);font-weight:400}
.oc-hero .descblock{display:flex;flex-direction:column;align-items:flex-start;gap:8px}
.oc-hero .desc{width:100%;max-width:560px;font-family:var(--heb);font-weight:400;font-size:18px;line-height:1.38;text-align:right;direction:rtl;color:var(--ink)}
.oc-hero .desc p{margin:0 0 14px;font-weight:300}
.oc-hero .desc p.regular{font-weight:400}
.oc-hero .desc p:last-child{margin-bottom:0}
.oc-hero .divider{width:72px;height:1px;background:var(--divider);margin:0;align-self:flex-start}

.oc-hero .block{display:flex;flex-direction:column;align-items:flex-start;gap:16px;width:100%;max-width:560px}
.oc-hero .block .text{font-family:var(--heb);font-weight:300;font-size:18px;line-height:1.38;text-align:right;direction:rtl;color:var(--ink);width:100%}
.oc-hero .block .text strong{font-weight:400}
.oc-hero .block .text p.regular{font-weight:400;margin-bottom:12px}
.oc-hero .block .text ul{list-style:none;padding:0;margin:8px 0}
.oc-hero .block .text ul li{padding-right:12px;position:relative}
.oc-hero .block .text ul li::before{content:"·";position:absolute;right:0;color:var(--ink)}
.oc-hero .block .text .triggers{display:block;column-count:1;font-size:18px;line-height:1.45}
.oc-hero .block .text .triggers .trigger-line{margin:0;font-weight:inherit}
.oc-hero .block .text .triggers .sep{color:var(--grey-mid);padding:0 4px}
.oc-hero .block .text .email{font-family:var(--cop);font-weight:400;text-transform:uppercase;letter-spacing:.02em}
.oc-hero .block .text .deadline-val{font-family:var(--cop);font-weight:300;text-transform:none;letter-spacing:.02em;direction:ltr;display:inline-block}
.oc-hero .block .text .note{display:block;margin-top:8px;font-weight:300;color:var(--grey-mid);font-size:16px}

.oc-hero .img-col{flex:0 0 492px;display:flex;justify-content:flex-end}
.oc-hero .img-frame{position:relative;width:492px;height:744px;overflow:hidden}
.oc-hero .img-frame img{width:100%;height:100%;object-fit:cover;transition:transform .8s ease}
.oc-hero .img-frame::after{content:"";position:absolute;inset:0;background:linear-gradient(0deg,rgba(0,0,0,0.35) 0%,rgba(0,0,0,0) 60%);pointer-events:none}

/* ============================================================
   GALLERY IMAGES (the-peeler only)
   ============================================================ */
.oc-gallery{background:var(--white);padding:64px var(--pad-x);display:flex;justify-content:flex-end;gap:48px}
.oc-gallery .frame{width:492px;height:744px;overflow:hidden;position:relative;cursor:zoom-in}
.oc-gallery .frame img{width:100%;height:100%;object-fit:cover;transition:transform .8s ease}
.oc-gallery .frame:hover img{transform:scale(1.04)}
.oc-gallery .frame .oc-inline-video{width:100%;height:100%;object-fit:cover;display:block;pointer-events:auto}
.oc-gallery .frame:not(.is-inline-playing) .oc-inline-video{display:none !important}
.oc-gallery .frame.is-inline-playing > picture,
.oc-gallery .frame.is-inline-playing > img,
.oc-gallery .frame.is-inline-playing .deco{display:none !important}
/* Play button overlay — matches Figma 119:2495 (Image Decorative Element):
   72px translucent-grey circle (#D9D9D9 @ 40%) with centered ▶ triangle in ink @ 80%.
   margin-left:4px optically centers the right-pointing triangle in the circle. */
.oc-gallery .frame .deco{position:absolute;left:50%;top:50%;width:72px;height:72px;border-radius:50%;background:rgba(217,217,217,.4);display:flex;align-items:center;justify-content:center;transform:translate(-50%,-50%);pointer-events:none;transition:background .25s,transform .25s}
.oc-gallery .frame:hover .deco{background:rgba(217,217,217,.6);transform:translate(-50%,-50%) scale(1.06)}
.oc-gallery .frame .deco::before{content:"";display:block;width:0;height:0;border-style:solid;border-width:13px 0 13px 22px;border-color:transparent transparent transparent rgba(27,27,27,.8);margin-left:4px}


/* ============================================================
   TABLET (≤1100px)
   ============================================================ */
@media (max-width:1100px){
  :root{--pad-x:48px}
  .oc-hero .img-col{flex-basis:380px}
  .oc-hero .img-frame{width:380px;height:560px}
  .oc-gallery .frame{width:340px;height:520px}
}

/* ============================================================
   MOBILE (≤768px) — different section order + full-width banner
   ============================================================ */
@media (max-width:768px){
  :root{--pad-x:16px}
  .only-desktop{display:none !important}
  .only-mobile{display:block}

  /* HERO: banner on top → info section → blocks stacked */
  .oc-hero{padding:0;background:var(--white);display:block}
  .oc-hero .row{flex-direction:column;gap:0;width:100%}
  .oc-hero .img-col{flex:0 0 auto;width:100%;justify-content:center;order:-1}
  .oc-hero .img-frame{width:100%;max-width:100%;height:auto;aspect-ratio:492/744}
  .oc-hero .img-frame::before{display:none}
  .oc-hero .img-frame::after{display:none}

  .oc-hero .text-col{padding:24px 16px 16px;gap:16px;align-items:flex-start;width:100%}
  .oc-hero .badge{font-size:16px}
  .oc-hero .title{font-size:clamp(18px,4.8vw,24px);text-align:right;width:100%;white-space:nowrap}
  .oc-hero .desc{font-size:16px;max-width:100%;line-height:1.25}
  .oc-hero .desc p{margin-bottom:8px}
  .oc-hero .block{max-width:none;width:100%;padding:16px;background:var(--white)}
  .oc-hero .block.triggers-block{background:var(--bg-trigger);width:calc(100% + 32px);margin:0 -16px;padding:16px}
  .oc-hero .block .text{font-size:16px;line-height:1.25}
  .oc-hero .block .text .triggers{font-size:14px;line-height:1.4}
  .oc-hero .divider{display:none}
  .oc-hero .text-col > .divider-mobile{height:1px;background:var(--divider-mobile);width:calc(100% + 32px);margin:0 -16px}

  /* GALLERY on mobile uses the shared stacked-gallery component.
     Set its CSS vars to the opencall-specific dimensions per Figma. */
  .oc-mobile-gallery{
    padding:24px 16px;
    background:var(--white);
  }

}

.loading{padding:120px 24px;text-align:center;font-family:var(--cop);font-weight:300;color:var(--grey-mid);letter-spacing:.08em}

a.artist-figure-link img{transition:filter .25s}

    }catch(_){/* file:// */}
    const el = document.getElementById(embeddedId);
    if(el && el.textContent.trim()) return JSON.parse(el.textContent);
    throw new Error('cannot load ' + path);
  }

  let site, data;
  try{
    [site, data] = await Promise.all([
      loadJson('../../data/site.json', 'fallback-site'),
      loadJson('../../data/opencalls.json', 'fallback-opencalls')
    ]);
  }catch(e){
    document.getElementById('page').innerHTML = '<div class="loading">failed to load — serve via HTTP (e.g. <code>python3 -m http.server</code>).</div>';
    document.body.classList.remove('is-loading-data');
    return;
  }

  const oc = data.opencalls.find(x => x.slug === slug || x.id === slug);
  if(!oc){
    document.getElementById('page').innerHTML = '<div class="loading">opencall not found: ' + slug + '</div>';
    document.body.classList.remove('is-loading-data');
    return;
  }
  document.title = (oc.title_en || 'Open Call') + ' — Zielinski & Rozen';

  function paraHtml(paras){
    if(!Array.isArray(paras)) return '';
    return paras.map(p => {
      const cls = p.weight || 'light';
      const lines = (p.lines || []).map(escapeHtml);
      return `<p class="${cls}">${lines.join('<br>')}</p>`;
    }).join('');
  }
  function escapeHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;'); }

  function instructionsHtml(o){
    if(!o) return '';
    let html = '';
    if(o.intro_html) html += `<p class="regular">${o.intro_html}</p>`;
    if(Array.isArray(o.items) && o.items.length){
      html += `<ul>${o.items.map(it => `<li>${escapeHtml(it)}</li>`).join('')}</ul>`;
    }
    if(o.outro_he) html += `<p>${escapeHtml(o.outro_he)}</p>`;
    return html;
  }

  function triggerLineHtml(line){
    const s = String(line || '').trim();
    if(!s) return '';
    if(s.indexOf(' | ') === -1) return escapeHtml(s);
    return s.split(' | ').map(function(part){ return escapeHtml(part.trim()); }).join(' <span class="sep">|</span> ');
  }
  function triggersHtml(t){
    if(!t) return '';
    const title = `<p class="regular">${escapeHtml(t.title_he || '')}</p>`;
    let body;
    if(Array.isArray(t.lines) && t.lines.length){
      body = `<div class="triggers">${t.lines.map(function(line){
        return '<p class="trigger-line">' + triggerLineHtml(line) + '</p>';
      }).join('')}</div>`;
    }else{
      const items = (t.items || []).map(escapeHtml);
      body = `<div class="triggers">${items.join(' <span class="sep">|</span> ')}</div>`;
    }
    return title + '\n      ' + body;
  }

  function contactHtml(c, deadlineHe){
    if(!c) return '';
    const email = escapeHtml(c.email || '');
    return `
      <p>${escapeHtml(c.label_he || '')}<br>
      <a class="email" href="mailto:${email}">${email}</a></p>
      <p>${escapeHtml(c.deadline_label_he || '')} <span class="deadline-val">${escapeHtml(deadlineHe || '')}</span></p>
      ${c.note_he ? `<p class="note">${escapeHtml(c.note_he)}</p>` : ''}`;
  }

  const ctx = {
    title_html: oc.title_html || oc.title_en || '',
    title_en: oc.title_en || oc.id || '',
    gallery_label_he: oc.gallery_label_he || '',
    submission_status_he: oc.submission_status_he || '',
    hero_image: '../../' + oc.hero_image,
    desc_html: paraHtml(oc.description_he),
    triggers_html: triggersHtml(oc.emotional_triggers),
    instructions_html: instructionsHtml(oc.submission_instructions_he),
    contact_html: contactHtml(oc.contact, oc.deadline_he),
    has_triggers: !!oc.emotional_triggers,
    has_gallery: Array.isArray(oc.gallery_images) && oc.gallery_images.length > 0,
    gallery_images: oc.gallery_images || []
  };

  // Build HTML
  const heroBlocks = [];
  heroBlocks.push(`<div class="divider"></div><div class="divider-mobile"></div>`);
  if(ctx.has_triggers){
    heroBlocks.push(`<div class="block triggers-block"><div class="text">${ctx.triggers_html}</div></div>`);
    heroBlocks.push(`<div class="divider"></div><div class="divider-mobile"></div>`);
  }
  heroBlocks.push(`<div class="block"><div class="text">${ctx.instructions_html}</div></div>`);
  heroBlocks.push(`<div class="divider"></div><div class="divider-mobile"></div>`);
  heroBlocks.push(`<div class="block"><div class="text">${ctx.contact_html}</div></div>`);

  // Gallery rendering:
  //   Desktop = side-by-side flex; video frames play inline in-card, images open lightbox.
  //   Mobile  = stacked-gallery component — 3D peek+main.
  //   Video items: play inline in-card via stacked-gallery.js; images still use lightbox.
  const galleryItems = (ctx.gallery_images || []).map(g => {
    const image = g && g.image ? '../../' + g.image : '';
    const video = g && g.video ? '../../' + g.video : '';
    const poster = g && g.poster ? '../../' + g.poster : '';
    const thumb = image || poster || '';
    // Keep only renderable entries (at least one visual source exists).
    if (!thumb && !video) return null;
    return {
      thumb: thumb || poster,
      video,
      poster: poster || thumb,
      isVideo: !!video
    };
  }).filter(Boolean);
  const hasRenderableGallery = galleryItems.length > 0;
  const itemAttrs = (it, i) => {
    const label = it.isVideo ? 'play video' : 'open image';
    const title = `${ctx.title_en} — ${String(i+1).padStart(2,'0')}`;
    return `data-artwork-src="${escapeHtml(it.thumb)}"`
      + (it.isVideo ? ` data-artwork-video="${escapeHtml(it.video)}" data-artwork-poster="${escapeHtml(it.poster)}"` : '')
      + ` data-artwork-title="${escapeHtml(title)}" aria-label="${label} ${i+1}"`;
  };
  const galleryDesktopHtml = hasRenderableGallery ? `
    <section class="oc-gallery only-desktop" data-artwork-gallery="opencall-${escapeHtml(slug)}">
      ${galleryItems.map((it, i) => `
        <div class="frame" ${itemAttrs(it, i)}${it.isVideo ? ' data-artwork-skip=""' : ''} tabindex="0" role="button">
          <img src="${escapeHtml(it.thumb)}" alt="" decoding="async" loading="lazy">
          ${it.isVideo ? `<video class="oc-inline-video" playsinline controls preload="none" poster="${escapeHtml(it.poster)}"></video>` : ''}
          <span class="deco"></span>
        </div>
      `).join('')}
    </section>` : '';
  const galleryMobileHtml = hasRenderableGallery ? `
    <section class="oc-mobile-gallery only-mobile">
      <div class="stacked-gallery sg-mode-lightbox" data-artwork-gallery="opencall-${escapeHtml(slug)}-mobile">
        <div class="sg-stack">
          ${galleryItems.map((it, i) => `
            <div class="sg-item ${i === 0 ? 'is-main' : 'is-peek'}"
                 ${itemAttrs(it, i)}${it.isVideo ? ' data-artwork-skip=""' : ''}>
              <div class="sg-media">
                <img src="${escapeHtml(it.thumb)}" alt="" decoding="async" loading="lazy">
                ${it.isVideo ? `<video class="sg-inline-video" playsinline controls preload="none" poster="${escapeHtml(it.poster)}"></video>` : ''}
              </div>
              <span class="deco"></span>
            </div>
          `).join('')}
        </div>
      </div>
    </section>` : '';
  const galleryHtml = galleryDesktopHtml + galleryMobileHtml;

  const footerLinks = site.footer.links_he || [];
  const metaLinks = footerLinks.slice(0,2);
  const galleryLinks = footerLinks.slice(2);
  function rowHtml(links){
    return `<div class="footer-row">${links.map(l => `<a href="${escapeHtml(l.href||'#')}">${escapeHtml(l.label||'')}</a>`).join('')}</div>`;
  }

  document.getElementById('page').innerHTML = `
    <section class="oc-hero">
      <div class="row">
        <div class="text-col heb">
          <div class="status-row">
            <span class="badge status">${escapeHtml(ctx.submission_status_he)}</span>
            <span class="badge gallery">${escapeHtml(ctx.gallery_label_he)}</span>
          </div>
          <h1 class="title">${ctx.title_html}</h1>
          <div class="descblock">
            <div class="desc">${ctx.desc_html}</div>
          </div>
          ${heroBlocks.join('')}
        </div>
        <div class="img-col">
          <div class="img-frame"><img src="${ctx.hero_image}" alt="" decoding="async" fetchpriority="high"></div>
        </div>
      </div>
    </section>
    ${galleryHtml}
    <site-footer></site-footer>`;

  // Wire up shared components against the freshly-rendered DOM.
  // - artwork-lightbox.js delegates clicks via document, so just re-scan focusables.
  // - stacked-gallery.js needs an explicit refresh since DOMContentLoaded already fired.
  if (window.ArtworkLightbox && window.ArtworkLightbox.refreshFocusable) window.ArtworkLightbox.refreshFocusable();
  if (window.StackedGallery && window.StackedGallery.refresh) window.StackedGallery.refresh();

  // Desktop open-call gallery: video frames play inline, not in the lightbox.
  (function wireOcDesktopInlineVideo(root){
    if (!root || root.dataset.ocDesktopInlineVideoWired) return;
    root.dataset.ocDesktopInlineVideoWired = '1';

    function pauseOthers(activeVideo){
      document.querySelectorAll('video').forEach(function(vid){
        if (vid === activeVideo) return;
        try { vid.pause(); } catch(_){}
      });
      document.querySelectorAll('.is-inline-playing').forEach(function(el){
        if (!activeVideo || !el.contains(activeVideo)) el.classList.remove('is-inline-playing');
      });
    }

    function playFrame(frame){
      var video = frame.querySelector('video.oc-inline-video');
      if (!video) return;
      var src = frame.getAttribute('data-artwork-video');
      if (src && video.getAttribute('src') !== src){
        video.src = src;
        video.load();
      }
      pauseOthers(video);
      frame.classList.add('is-inline-playing');
      try {
        var p = video.play();
        if (p && typeof p.catch === 'function') p.catch(function(){});
      } catch(_){}
    }

    root.addEventListener('click', function(e){
      var frame = e.target.closest('.oc-gallery .frame[data-artwork-video]');
      if (!frame) return;
      var video = frame.querySelector('video.oc-inline-video');
      if (frame.classList.contains('is-inline-playing') && video && (e.target === video || video.contains(e.target))) return;
      e.preventDefault();
      e.stopImmediatePropagation();
      playFrame(frame);
    }, true);

    root.addEventListener('keydown', function(e){
      if (e.key !== 'Enter' && e.key !== ' ') return;
      var frame = e.target.closest('.oc-gallery .frame[data-artwork-video]');
      if (!frame) return;
      e.preventDefault();
      playFrame(frame);
    });

    root.querySelectorAll('.oc-gallery video.oc-inline-video').forEach(function(video){
      video.addEventListener('play', function(){
        pauseOthers(video);
        var frame = video.closest('.oc-gallery .frame');
        if (frame) frame.classList.add('is-inline-playing');
      });
      video.addEventListener('pause', function(){
        var frame = video.closest('.oc-gallery .frame');
        if (frame) frame.classList.remove('is-inline-playing');
      });
      video.addEventListener('ended', function(){
        var frame = video.closest('.oc-gallery .frame');
        if (frame) frame.classList.remove('is-inline-playing');
      });
    });
  })(document.getElementById('page'));

  document.body.classList.remove('is-loading-data');
})();
</script>

<script src="../../components/site-chrome.js?v=3" defer></script>
<script src="../../components/artwork-lightbox.js?v=4" defer></script>
<script src="../../components/stacked-gallery.js" defer></script>

<script src="../../components/analytics.js" defer></script>
<script src="../../components/picture-upgrade.js" defer></script>
<script src="../../components/embed-iframe.js" defer></script>
