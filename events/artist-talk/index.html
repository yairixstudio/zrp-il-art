:root{
  --white:#FFFFFF;--bg-grey:#EEF0EF;--ink:#1B1B1B;--copy-grey:#6B7280;
  --artist:#828282;--icon-grey:#707070;
  --slide-active:#515151;--divider:#D8D8D8;
  --slide-bg:#F9F9F9;
  --max:1440px;
  --cop:"Copperplate","Noto Sans Arabic","Times New Roman",serif;
  --heb:"FbEzmel","Noto Sans Arabic","Arial Hebrew","David Libre",serif;
  --pad-x:96px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;overflow-x:clip}
body{background:var(--white);color:var(--ink);font-family:var(--cop);-webkit-font-smoothing:antialiased;overflow-x:clip;max-width:100vw}
img{display:block;max-width:100%;height:auto}
a{color:inherit;text-decoration:none}
button{font:inherit;cursor:pointer;background:none;border:0;color:inherit}

body{text-transform:uppercase}
.heb,.heb *,[dir="rtl"],[dir="rtl"] *{text-transform:none;font-family:var(--heb)}
.heb .lat{font-family:var(--cop);font-weight:300;text-transform:uppercase}

/* ===== EVENT PAGE — ARTIST TALK (gal pollak & elsa ers brosh) ===== */
.event{display:flex;flex-direction:column;background:var(--white)}

/* === HERO BAND (grey) — two-column on desktop, mirrors Figma 818:185 === */
.event-hero{background:var(--bg-grey);padding:48px var(--pad-x) 32px;display:flex;justify-content:center}
.event-hero .row{display:flex;gap:48px;align-items:stretch;width:100%;max-width:var(--max)}
.event-hero .text-col{flex:1;display:flex;flex-direction:column;justify-content:center;gap:32px;padding:0 16px}

/* Title + meta block — title↔meta gap 4 desktop (Figma 818:189) */
.event-hero .h-title-block{display:flex;flex-direction:column;gap:4px;align-items:center}

/* Title: English Copperplate, centered — uppercase by global rule (Figma 818:191; 48px for long multi-line copy) */
.event-hero .h-title{font-family:var(--cop);font-weight:400;font-size:48px;line-height:1.15;text-align:center;width:100%;color:var(--ink);padding:0 16px}
.event-hero .h-title .artist-link{color:inherit;text-decoration:none}

/* Meta: gallery row + date·time row, centered (Figma 818:193) */
.event-hero .h-meta{display:flex;flex-direction:column;gap:8px;align-items:center;padding:0 10px 8px}
.event-hero .h-meta .row-1,.event-hero .h-meta .row-2{display:flex;align-items:center;gap:8px;justify-content:center}
.event-hero .h-meta .gallery{font-family:var(--heb);font-weight:400;font-size:28px;color:var(--ink);direction:rtl}
.event-hero .h-meta .date,.event-hero .h-meta .time{font-family:var(--heb);font-weight:300;font-size:28px;color:var(--ink);direction:rtl}
/* Figma draws the separator as 1×1 — rendered 4px so it reads as a dot */
.event-hero .h-meta .dot{width:4px;height:4px;background:var(--icon-grey);border-radius:50%;display:inline-block}

/* Body — fills the column, Copperplate Light 18/20 CENTER (Figma 818:210). */
.event-hero .h-body{font-family:var(--cop);font-weight:300;font-size:18px;line-height:20px;text-align:center;color:var(--ink);padding:16px 0;letter-spacing:.02em}
.event-hero .h-body p+p{margin-top:6px}
.event-hero .h-body .strong{font-weight:400}

/* === Hero card (right column) — 492x744, flat scrim + centered title overlay (Figma 818:212) === */
.event-hero .img-col{flex:0 0 492px;display:flex;justify-content:flex-end}
.event-hero .card{position:relative;width:492px;height:744px;overflow:hidden;background:#000}
.event-hero .card>img,.event-hero .card>picture,.event-hero .card>picture>img{width:100%;height:100%;object-fit:cover;display:block}
/* Flat dark scrim (Figma gradient/fill on the image) */
.event-hero .card::after{content:"";position:absolute;inset:0;background:rgba(27,27,27,.32);pointer-events:none}
/* Title overlay — Figma 818:216: y=342/744 (46%), width 301, gap 16 */
.event-hero .card .center-text{position:absolute;left:50%;top:46%;transform:translateX(-50%);width:301px;display:flex;flex-direction:column;align-items:center;gap:16px;color:#fff;z-index:2}
.event-hero .card .center-text .en{font-family:var(--cop);font-weight:700;font-size:36px;line-height:1.1;text-align:center}
.event-hero .card .center-text .sub{font-family:var(--cop);font-weight:400;font-size:24px;line-height:1.15;text-align:center;width:266px}

/* === THE ARTWORKS — triptych band (Figma 818:237) === */
.event-artworks{padding:64px var(--pad-x);background:var(--white);display:flex;justify-content:center}
.event-artworks .inner{display:flex;flex-direction:column;gap:16px;width:100%;max-width:1248px}
.section-label{font-family:var(--cop);font-weight:300;font-size:28px;line-height:1.15;letter-spacing:.04em;color:var(--ink);text-align:left}
.event-artworks .tri{--tri-max-w:1248px;--tri-bg:transparent;width:100%}
.event-artworks .tri-frame > a{display:contents}
.event-artworks .tri-frame{height:841px;aspect-ratio:auto;max-width:1248px}
/* Center slide shows the full image (contain, light bg); peeks crop (cover) — Figma 818:239-240 */
.event-artworks .tri-slide.is-center{width:481px;height:841px;object-fit:contain;background:var(--slide-bg)}
.event-artworks .tri-slide.is-prev,.event-artworks .tri-slide.is-next{width:302px;height:528px;opacity:.6;object-fit:cover}
.event-artworks .tri-slide.is-prev{left:calc(50% - 473px)}
.event-artworks .tri-slide.is-next{left:calc(50% + 472.5px)}
.event-artworks .tri-slide.is-hidden{width:481px;height:841px}

/* === ARTISTS strip (Figma 820:439) === */
.event-artists{padding:32px var(--pad-x);display:flex;justify-content:center}
.event-artists .inner{display:flex;flex-direction:column;gap:16px;width:100%;max-width:1248px}
.event-artists .head{display:flex;justify-content:space-between;align-items:center}
.event-artists .head .label{font-family:var(--cop);font-weight:300;font-size:28px;color:var(--ink);text-align:left;letter-spacing:.02em}
.event-artists .head .more{display:flex;align-items:flex-start;padding-top:4px;color:#1A1C1C;transition:opacity .2s}
.event-artists .head .more:hover{opacity:.6}
.event-artists .head .more svg{width:10.33px;height:10.33px;display:block}
.event-artists .strip{display:flex;flex-direction:row;gap:6px}
.event-artists .strip>a.artist-card{flex:0 0 178px;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;color:inherit;text-decoration:none}
.event-artists .strip .img{width:178px;height:148px;overflow:hidden;background:#f3f1ee}
.event-artists .strip .img img{width:100%;height:100%;object-fit:cover;object-position:50% 30%;transition:filter .25s}
.event-artists .strip .name{font-family:var(--cop);font-weight:300;font-size:18px;line-height:1.0;color:var(--artist);text-align:center;letter-spacing:.04em}
a.artist-card:hover .img img{filter:brightness(.92)}
a.artist-card:hover .name{color:var(--ink)}

/* artist-link injected: every artist mention in copy links to its page (docs/artist-linking.md) */
a.artist-link{color:inherit;text-decoration:underline;text-decoration-color:rgba(27,27,27,.25);text-underline-offset:3px;transition:text-decoration-color .2s,opacity .2s}
a.artist-link:hover{text-decoration-color:currentColor;opacity:.75}

/* === RESPONSIVE === */
@media (max-width:1100px){
  :root{--pad-x:48px}
  .event-hero .img-col{flex-basis:380px}
  .event-hero .card{width:380px;height:580px}

  .event-hero .h-meta .gallery,.event-hero .h-meta .date,.event-hero .h-meta .time{font-size:22px}
  .event-artworks .tri-frame{height:560px}
  .event-artworks .tri-slide.is-center{width:360px;height:560px}
  .event-artworks .tri-slide.is-prev,.event-artworks .tri-slide.is-next{width:220px;height:380px}
  .event-artworks .tri-slide.is-prev{left:calc(50% - 326px)}
  .event-artworks .tri-slide.is-next{left:calc(50% + 326px)}
  .event-artworks .tri-slide.is-hidden{width:360px;height:560px}
}

@media (max-width:768px){
  :root{--pad-x:16px}

  /* Mobile re-order (Figma 818:17): hero image → title+meta → body → artworks → artists. */
  .event-hero,.event-hero .row,.event-hero .text-col{display:contents}
  .event-hero .img-col{order:1}
  .event-hero .h-title-block{order:2}
  .event-hero .h-body{order:3}
  .event-artworks{order:4}
  .event-artists{order:5}

  /* Hero card — full-width 520h, same flat scrim (Figma 818:38) */
  .event-hero .img-col{flex:none;width:100%;justify-content:center}
  .event-hero .card{width:100%;height:520px}
  /* Overlay block: Figma y=208/520 (40%), width 301 */
  .event-hero .card .center-text{top:40%;width:301px;gap:16px}
  .event-hero .card .center-text .en{font-size:36px}
  .event-hero .card .center-text .sub{font-size:24px;width:266px}

  /* Title + meta band below the image (Figma 818:84) */
  .event-hero .h-title-block{padding:32px 0 0;gap:16px;background:var(--white);align-items:center}
  .event-hero .h-title{font-size:24px;line-height:1.15;padding:0 16px;text-align:center;width:100%}
  .event-hero .h-meta{gap:8px;padding:0 10px 8px}
  .event-hero .h-meta .gallery,.event-hero .h-meta .date,.event-hero .h-meta .time{font-size:14px}

  /* Body — after the meta (Figma 818:105) */
  .event-hero .h-body{padding:16px;font-size:16px;line-height:20px;background:var(--white)}

  /* Artworks gallery: stage 443h, center 216x378 contain, peeks bleed off-screen (Figma 818:107) */
  .event-artworks{padding:8px 16px}
  .event-artworks .inner{gap:16px}
  .event-artworks .section-label{font-size:20px;text-align:center}
  .event-artworks .tri{--tri-max-w:none;width:100%}
  .event-artworks .tri-frame{height:443px;max-width:none;width:100%}
  .event-artworks .tri-slide.is-center{width:216px;height:378px;background:#F8F8F8}
  .event-artworks .tri-slide.is-prev,.event-artworks .tri-slide.is-next{width:117px;height:204.75px;opacity:.6}
  .event-artworks .tri-slide.is-prev{left:calc(50% - 194.5px)}
  .event-artworks .tri-slide.is-next{left:calc(50% + 194.5px)}
  .event-artworks .tri-slide.is-hidden{width:216px;height:378px}

  /* Artists strip (Figma 820:543) */
  .event-artists{padding:32px 16px}
  .event-artists .head .label{font-size:20px}
  .event-artists .strip>a.artist-card{flex-basis:96px}
  .event-artists .strip .img{width:96px;height:80px}
  .event-artists .strip .name{font-size:16px;line-height:18px}
}

@media (max-width:400px){
  .event-hero .card .center-text .en{font-size:32px}
  .event-hero .card .center-text .sub{font-size:22px}
}
