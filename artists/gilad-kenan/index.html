/* ===== LOCAL FONTS ===== */
@font-face{font-family:"Copperplate";src:url("../../פונטים/Copperplate-Light.woff2") format("woff2"),url("../../פונטים/Copperplate-Light.ttf") format("truetype");font-weight:300;font-style:normal;font-display:swap}
@font-face{font-family:"Copperplate";src:url("../../פונטים/Copperplate.woff2") format("woff2"),url("../../פונטים/Copperplate.otf") format("opentype");font-weight:400;font-style:normal;font-display:swap}
@font-face{font-family:"Copperplate";src:url("../../פונטים/CopperplateCC-Bold.woff2") format("woff2"),url("../../פונטים/CopperplateCC-Bold.otf") format("opentype");font-weight:700;font-style:normal;font-display:swap}
@font-face{font-family:"Copperplate";src:url("../../פונטים/CopperplateCC-Heavy.woff2") format("woff2"),url("../../פונטים/CopperplateCC-Heavy.otf") format("opentype");font-weight:900;font-style:normal;font-display:swap}
@font-face{font-family:"FbEzmel";src:url("../../פונטים/FbEzmel-Light.woff2") format("woff2"),url("../../פונטים/FbEzmel-Light.otf") format("opentype");font-weight:300;font-style:normal;font-display:swap}
@font-face{font-family:"FbEzmel";src:url("../../פונטים/FbEzmel-Regular.woff2") format("woff2"),url("../../פונטים/FbEzmel-Regular.otf") format("opentype");font-weight:400;font-style:normal;font-display:swap}

:root{
  --white:#FFFFFF;
  --bg-grey:#EEF0EF;
  --ink:#1B1B1B;
  --grey-mid:#808080;
  --copy-grey:#6B7280;
  --sep:#EFEFEF;
  --artist:#828282;
  --divider:#D8D8D8;
  --max:1440px;
  --cop:"Copperplate","Times New Roman",serif;
  --heb:"FbEzmel","Arial Hebrew","David Libre",serif;
  --pad-x:96px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;overflow-x:hidden}
body{background:var(--white);color:var(--ink);font-family:var(--cop);-webkit-font-smoothing:antialiased;overflow-x:visible}
img{display:block;max-width:100%;height:auto}
a{color:inherit;text-decoration:none}
button{font:inherit;cursor:pointer;background:none;border:0;color:inherit}

/* ===== NAV/FOOTER moved to ../../components/site-chrome.css ===== */

/* ===== HERO (artist) ===== */
.hero{background:var(--bg-grey,#EEF0EF);padding:48px var(--pad-x) 32px;display:flex;justify-content:center}
.hero-inner{width:100%;max-width:var(--max);display:flex;align-items:stretch;gap:48px;flex-direction:row}
.hero-text{flex:1;display:flex;flex-direction:column;align-items:flex-end;gap:32px;padding:0 16px;min-width:0}
.hero-info{display:flex;flex-direction:column;justify-content:center;align-items:flex-end;gap:8px;text-align:right}
.hero-name{display:flex;flex-direction:column;justify-content:flex-start;align-items:flex-end;gap:4px;align-self:stretch;text-align:right}
.hero-name .first{font-family:var(--cop);font-weight:700;font-size:80px;line-height:1;color:var(--ink);letter-spacing:.02em;text-transform:uppercase;text-align:right;align-self:stretch;width:100%;box-sizing:border-box}
.hero-name .last{font-family:var(--cop);font-weight:300;font-size:80px;line-height:1;color:var(--ink);letter-spacing:.02em;text-transform:uppercase;text-align:right;align-self:stretch;width:100%;box-sizing:border-box}
.hero-handle{font-family:var(--cop);font-weight:300;font-size:28px;color:var(--ink);text-align:right;align-self:flex-end;padding:0 8px;direction:ltr;cursor:pointer}
.hero-handle:hover,.hero-handle:focus-visible{text-decoration:underline;text-underline-offset:3px}
.hero-bio{display:flex;flex-direction:column;gap:16px;align-self:stretch}
.hero-bio .bio-intro-row{display:flex;flex-direction:row;align-items:stretch;gap:16px}
.hero-bio .bio-col{flex:1;display:flex;flex-direction:column;gap:16px;min-width:0}
.hero-bio .intro{font-family:var(--heb);font-weight:300;font-size:18px;line-height:1.25;color:var(--ink);direction:rtl;text-align:right}
.hero-bio .divider{width:1px;background:var(--divider);flex-shrink:0}
.hero-bio .body{font-family:var(--heb);font-weight:300;font-size:18px;line-height:1.25;color:var(--ink);direction:rtl;text-align:right;display:flex;flex-direction:column;gap:12px}
.hero-bio .body p{margin:0}
.hero-bio .body .en-line{font-family:var(--cop);font-weight:300;text-transform:uppercase;direction:ltr;unicode-bidi:isolate;text-align:right}
.hero-bio .lat{font-family:var(--cop);text-transform:uppercase;direction:ltr;unicode-bidi:isolate;letter-spacing:.04em}
.hero-portrait{width:492px;height:492px;flex-shrink:0;background:#222;overflow:hidden;position:relative;align-self:flex-start}
.hero-portrait img{width:100%;height:100%;object-fit:cover;object-position:center 25%}
.hero-portrait::after{content:"";position:absolute;inset:0;background:linear-gradient(0deg,rgba(0,0,0,0) 0%,rgba(0,0,0,.0) 60%,rgba(0,0,0,.0) 100%);pointer-events:none}

/* dual hero image variant (collab artists) */
.hero-portrait.dual{display:flex;gap:8px;background:transparent;width:492px;height:492px}
.hero-portrait.dual .pic{flex:1;height:100%;overflow:hidden;background:#222}
.hero-portrait.dual .pic img{width:100%;height:100%;object-fit:cover}

/* Collaboration hero (Figma landing mobile 119:3917) — two names + ×, no vertical divider */
.hero.is-collab .hero-text{gap:16px}
.hero-collab-meta{display:flex;flex-direction:column;align-items:center;gap:16px;width:100%;padding:0 0 8px}
.hero-collab-block{display:flex;flex-direction:column;align-items:center;gap:8px;width:100%}
.hero-name.hero-name--collab .first,.hero-name.hero-name--collab .last{font-size:36px;line-height:1;text-align:center}
.hero-collab-bio{font-family:var(--heb);font-weight:300;font-size:16px;line-height:normal;color:var(--ink);direction:rtl;text-align:center;padding:0 32px;text-transform:none}
.hero-collab-x{font-family:var(--cop);font-weight:300;font-size:36px;line-height:1;color:var(--ink);text-align:center;margin:0;width:100%}

/* ===== ARTWORKS SECTION ===== */
.works{padding:48px var(--pad-x);background:var(--white);display:flex;justify-content:center}
.works-inner{width:100%;max-width:var(--max);display:flex;flex-direction:column;gap:24px}
.works-head{display:flex;align-items:flex-start;justify-content:flex-start;gap:8px;text-align:left}
.works-head h2{font-family:var(--cop);font-weight:300;font-size:28px;color:var(--ink);letter-spacing:.02em;text-align:right}
.works-grid{display:grid;grid-template-columns:repeat(2,1fr);column-gap:16px;row-gap:64px;direction:rtl}
.works-grid .work{direction:ltr}.work-statement{grid-column:1/-1;direction:rtl;text-align:right;font-family:var(--heb);color:var(--ink);margin-bottom:-40px}.ws-rule{display:block;width:72px;height:1px;background:#EFEFEF;margin:0 0 16px auto}.ws-head{font-size:16px;letter-spacing:.02em;margin:0 0 8px;line-height:1.3}.ws-head .lat{font-family:var(--cop)}.ws-body{font-size:16px;line-height:1.7}.ws-body p{margin:0 0 .7em}.ws-body p:last-child{margin-bottom:0}
.work{display:flex;flex-direction:column;align-items:stretch;min-width:0;gap:16px;height:100%}
/* Artwork frame: full image visible (no crop), width fills cell; fixed 690/1044 frame, contain + #FAFAFA letterboxing for wide/short images */
.work .img{
  position:relative;width:100%;aspect-ratio:690/1044;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;background:#FAFAFA;cursor:zoom-in;
}
.work .img picture{display:flex;width:100%;height:100%;align-items:center;justify-content:center;line-height:0}
.work .img img{width:100%;height:100%;object-fit:contain;object-position:center}
.work .img::after{content:"";position:absolute;inset:0;background:rgba(27,27,27,0);transition:background .3s;pointer-events:none}
.work:hover .img::after{background:rgba(27,27,27,.06)}
/* per-image caption (below each artwork) */
/* per-image meta (below each artwork) — matches /works/ card: artist · title · details · sold · gallery */
.work-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;text-align:right;width:100%;flex:1}
.work-meta .artist{font-family:var(--heb);font-weight:400;font-size:20px;color:var(--ink);line-height:1.25;direction:rtl}
.work-meta .artist.is-en{font-family:var(--cop);font-weight:700;text-transform:uppercase;letter-spacing:.03em;direction:ltr}
.work-meta .artist a{color:inherit;text-decoration:underline;text-decoration-thickness:1px;text-underline-offset:2px}
.work-meta .artist + .title{margin-top:-2px}
.work-meta .title{font-size:16px;color:var(--ink);line-height:1.3;font-weight:400}
.work-meta .title.is-he{font-family:var(--heb);direction:rtl;text-transform:none}
.work-meta .title.is-en{font-family:var(--cop);font-weight:300;text-transform:uppercase;letter-spacing:.03em;direction:ltr}
.work-meta .title.is-bi{display:inline-flex;flex-direction:row;direction:rtl;align-items:baseline;justify-content:flex-end;gap:.35em;flex-wrap:wrap;max-width:100%}
.work-meta .title.is-bi .title-he{font-family:var(--heb);direction:rtl;text-transform:none}
.work-meta .title.is-bi .title-sep{display:inline-block;width:1.4px;height:.85em;background:var(--ink);opacity:.55;align-self:center;flex-shrink:0;direction:ltr;unicode-bidi:isolate}
.work-meta .title.is-bi .title-en{font-family:var(--cop);font-weight:300;text-transform:uppercase;letter-spacing:.03em;direction:ltr;unicode-bidi:isolate}
.work-meta .details{font-family:var(--heb);font-weight:300;font-size:15px;color:var(--grey-mid);line-height:1.2;direction:rtl;max-width:100%;white-space:pre-line}
.work-meta .lat{font-family:var(--cop);text-transform:uppercase;direction:ltr;unicode-bidi:isolate;letter-spacing:.04em}
.work-meta .details .lat{font-weight:300;font-size:0.88em;letter-spacing:normal}
.dim{direction:ltr;unicode-bidi:isolate}
.work-meta-foot{display:flex;flex-direction:column;align-items:flex-end;gap:6px;margin-top:auto;padding-top:12px;width:100%}
.work-meta .sold{font-family:var(--heb);font-weight:300;font-size:14px;color:var(--ink);border:1.4px solid var(--ink);padding:2px 10px;line-height:1.25;align-self:flex-end}
.work-meta .gallery{font-family:var(--cop);font-weight:700;font-size:10px;color:var(--ink);text-transform:uppercase;letter-spacing:.02em;direction:ltr;align-self:flex-end;transition:opacity .2s}
.work-meta a.gallery:hover{opacity:.6}

/* single work → right cell (RTL), left cell empty (Figma 490:1092) */
.works-grid.single{grid-template-columns:repeat(2,1fr)}
.works-grid.single .work{max-width:none}

/* ===== ARTWORKS GROUPED BY EXHIBITION ===== */
.ex-groups{display:flex;flex-direction:column;gap:0}
.ex-group{display:flex;flex-direction:column;gap:28px;padding:8px 0 48px}
.ex-group:first-child{padding-top:0}
.ex-group-head{display:flex;flex-direction:column;align-items:flex-end;gap:18px;text-align:right}
.ex-heading{font-family:var(--heb);font-weight:400;font-size:32px;line-height:1.2;color:var(--ink);direction:rtl;text-align:right;align-self:stretch;padding-top:.15em}
.ex-heading a{transition:opacity .2s}
.ex-heading a:hover,.ex-heading a:focus-visible{opacity:.6;text-decoration:underline;text-underline-offset:4px}
.ex-heading .lat{font-family:var(--cop);font-weight:400;font-size:0.84em;text-transform:uppercase;letter-spacing:.03em;direction:ltr;unicode-bidi:isolate}
.ex-statement{font-family:var(--heb);font-weight:300;font-size:18px;line-height:1.35;color:var(--ink);direction:rtl;text-align:right;display:flex;flex-direction:column;gap:8px;align-self:flex-end;max-width:1040px}
.ex-statement p{margin:0}
.ex-statement .lat{font-family:var(--cop);font-weight:400;font-size:0.88em;text-transform:uppercase;letter-spacing:.03em;direction:ltr;unicode-bidi:isolate}
.ex-divider{border:0;border-top:1px solid var(--sep);margin:0;width:100%}

/* ===== "PAGE COMING SOON" — for artists with no figma data ===== */
.placeholder{padding:96px var(--pad-x);text-align:center;background:var(--bg-grey)}
.placeholder h1{font-family:var(--cop);font-weight:700;font-size:48px;letter-spacing:.04em;margin-bottom:16px}
.placeholder .sub{font-family:var(--heb);font-weight:300;font-size:18px;color:var(--grey-mid);direction:rtl}
.placeholder .work-image{max-width:600px;margin:32px auto 0}
.placeholder .work-image img{width:100%;height:auto;display:block}

/* lightbox styles imported from components/artwork-lightbox.css (see <link> in head) */


/* ============================================================
   RESPONSIVE — TABLET (≤1100px)
   ============================================================ */
@media (max-width:1100px){
  :root{--pad-x:48px}
  /* HERO — stack at tablet (row + long Copperplate surnames clipped off-screen before) */
  .hero{padding:32px 0 0;background:var(--bg-grey)}
  .hero-inner{flex-direction:column;align-items:stretch;gap:20px;padding:0 var(--pad-x)}
  .hero-text{order:2;align-items:center;padding:0;gap:20px;min-width:0;width:100%}
  .hero-portrait,.hero-portrait.dual{
    order:1;
    width:min(340px,82vw);
    height:min(340px,82vw);
    max-width:100%;
    align-self:center;
    flex-shrink:0;
  }
  .hero-info{width:100%;max-width:560px;margin:0 auto;align-items:center;padding:8px 12px;box-sizing:border-box}
  .hero-name{align-items:center;text-align:center;align-self:center;width:100%;max-width:100%}
  .hero-name .first,.hero-name .last{
    display:block;
    width:100%;
    max-width:100%;
    text-align:center;
    box-sizing:border-box;
    overflow-wrap:break-word;
    word-wrap:break-word;
    font-size:clamp(32px,5.5vw,44px);
    line-height:1.05;
  }
  .hero-handle{font-size:clamp(16px,3vw,22px);text-align:center;align-self:center}
  .hero-bio{
    flex-direction:column;
    gap:16px;
    align-items:stretch;
    background:var(--white);
    margin:0 calc(-1 * var(--pad-x));
    padding:20px var(--pad-x) 0;
  }
  .hero-bio .bio-intro-row{background:transparent;padding:0;align-items:flex-start}
  .hero-bio .body{background:transparent}
  .hero-bio .bio-intro-row .divider{display:block;width:1px;min-height:0;height:auto;align-self:stretch;background:var(--divider)}
  .hero-bio .intro,.hero-bio .body{font-size:17px}
  .hero.is-collab .hero-portrait.dual{width:100%;max-width:420px;height:240px}
  .hero.is-collab .hero-name.hero-name--collab .first,.hero.is-collab .hero-name.hero-name--collab .last{font-size:36px;line-height:1}
  .hero.is-collab .hero-handle{font-size:16px}
  .works-grid{row-gap:48px}
  .ex-heading{font-size:28px}
  .ex-group{padding-bottom:40px}
}

/* ============================================================
   RESPONSIVE — MOBILE (≤768px)
   ============================================================ */
@media (max-width:768px){
  :root{--pad-x:16px}

  /* HERO — tighter than ≤1100px stack */
  .hero{padding:24px 0 0}
  .hero-inner{gap:16px;padding:0 16px}
  .hero-text{gap:16px}
  .hero-portrait,.hero-portrait.dual{width:262px;height:262px}
  .hero-info{max-width:none;padding:8px 12px}
  .hero-name .first,.hero-name .last{font-size:36px}
  .hero-handle{font-size:16px}
  .hero-bio{margin:0 -16px;padding:16px 16px 0}
  .hero-bio .intro,.hero-bio .body{font-size:16px}
  .hero.is-collab .hero-portrait.dual{max-width:358px;height:211px;gap:16px}

  /* WORKS — stay 2-col on mobile (matches /works/) */
  .works{padding:48px 16px}
  .works-grid{column-gap:16px;row-gap:40px}
  .ex-group{gap:20px;padding-bottom:32px}
  .ex-group-head{gap:14px}
  .ex-heading{font-size:24px}
  .ex-statement{font-size:16px;line-height:1.45;gap:8px}
  .work{gap:12px}
  .work-meta .artist{font-size:18px}
  .work-meta .title{font-size:15px}
  .work-meta .details{font-size:15px}
  .works-head h2{font-size:20px}

  /* LIGHTBOX */

  /* placeholder */
  .placeholder{padding:48px 16px}
  .placeholder h1{font-size:32px}
}

/* ============================================================
   SMALL MOBILE (≤400px)
   ============================================================ */
@media (max-width:400px){
  .works-grid{column-gap:12px}
  .hero-name .first,.hero-name .last{font-size:32px}
  .hero-portrait,.hero-portrait.dual{width:240px;height:240px}
  .hero.is-collab .hero-portrait.dual{width:100%;max-width:358px;height:200px}
}

/* Artist page: white nav from tablet up; wide collab hero only true desktop (>1100) */
@media (min-width:769px){
  body .nav{background:var(--white)}
}
@media (min-width:1101px){
  .hero.is-collab .hero-portrait.dual{width:492px;height:492px;max-width:none;gap:8px}
  .hero.is-collab .hero-name.hero-name--collab .first,.hero.is-collab .hero-name.hero-name--collab .last{font-size:60px;line-height:1}
  .hero.is-collab .hero-collab-x{font-size:48px}
  .hero.is-collab .hero-collab-bio{font-size:18px;line-height:1.35;padding:0 32px}
  .hero.is-collab .hero-handle{font-size:20px}
}
</style>

בויות מן העבר מול תרבות ההווה מול פנטזיות על עתיד פוסט אפוקליפטי בו נוצר מיזוג בין מודרניות לפרימיטיביות וטריבאליזם, מפגש בין מיתוס מן העולם למיתוס האישי שלי, עיר מול כבר, חברה מול הלבד. אני מנסה לגשת ליצירות מתוך נקודת מבט של מין אדם קדמון מהעתיד, למזג בין חומרים ישנים לחדשים, ליצור קוקטייל המשלב יותר ממדיום אחד.\n\nמגיל צעיר מתעסק בציור ופיסול בחומרים מגוונים , כיום משלב המון צילום סטילז וגם וידאו וסאונד. ביצירות שלי אני מרגיש מוכרח שתהיה רמה מסוימת של עבודת כפיים וסיזיפיות, חושניות ופראות, לצד איפוק ותוכן קונספטואלי הטמון בתוך היצירה.\nסממנים חוזרים בעבודות שלי הם איברי גוף, ופיגורות היברידיות - ערבוב של חיות ויצורים מיתיים יחד עם בני אדם, צמחים וסמלים שחלקם מקורם בעולם האמיתי וחלקם המצאה מעולמי הפנימי.","bio_en":null,"works":[{"id":"eitan-souls-1","title":"״תשע נשמות | SOULS NINE״","image":"images/artists/eitan-goldson/work-01.webp","medium":"mix media — photo print on a canvas and painting with oil, acrylic and coffee"},{"id":"eitan-souls-2","title":"״תשע נשמות | SOULS NINE״","image":"images/artists/eitan-goldson/work-02.webp"},{"id":"eitan-souls-3","title":"״תשע נשמות | SOULS NINE״","image":"images/artists/eitan-goldson/work-03.webp"}],"figma_artist_page_mobile":"235:73","figma_artist_page_desktop":null,"homepage_featured":true,"works_grid_order":1},{"id":"tanya-shin","slug":"tanya-shin","name_en":"tanya shin","name_he":"טניה שין","portrait":"images/artists/tanya-shin/portrait-v2.webp","work_image":"images/works/grid/tanya-shin.webp","instagram_handle":"@TANYASHIN","bio_he":"טניה שין היא אמנית וצלמת,\nילידת סיביר, חיה בישראל מאז 1999.\n\nהיצירה שלה נובעת מחיפוש אחר חופש פנימי ומהרצון לחשוף רבדים עמוקים של זהות, גוף ותודעה. דרך עבודה מינימליסטית המשלבת צילום ועיבוד דיגיטלי, טניה חוקרת את מה שנמצא מתחת לפני השטח רגש, מתח ואנרגיה אנושית.","bio_en":null,"works":[{"id":"tanya-triangle","title":"\"triangle\"","image":"images/artists/tanya-shin/work-01.webp"},{"id":"tanya-crop1","title":"\"crop 1\"","image":"images/artists/tanya-shin/work-02.webp"}],"figma_artist_page_mobile":"1213:3673","figma_artist_page_desktop":null,"homepage_featured":true,"works_grid_order":4},{"id":"nir-giorgio-levin","slug":"nir-giorgio-levin","name_en":"nir giorgio levin","name_he":"ניר ג׳ורג׳יו לוין","portrait":"images/artists/nir-giorgio-levin/portrait-v2.webp","work_image":"images/works/grid/nir-giorgio-levin.webp","instagram_handle":"@NIRGIOLEV","bio_he":"ניר ג'ורג'יו לוין, 32, אמן ומעצב רב-תחומי, יליד ברזיל, מתגורר ויוצר בתל אביב.\n\nהיצירה שלו ברובה אוטוביוגרפית, ונעה סביב שאלת זהות שנולדה מתוך חיים עם ריבוי שכבות של מי שגדל בין דתות, מדינות וזהויות. לוין נולד בברזיל, אומץ וגויר למשפחה ישראלית, וגדל בתל אביב כשהוא נושא בתוכו זהות ברזילאית וישראלית ושאלות על מה מתקיים בין נצרות ליהדות. הוא מגדיר את עצמו כאמן ללא מדינה או דת אחת קבועה, נווד של זהות שמתקיים בעולם שבו הוא שייך לשני העולמות ובו בזמן גם לאף אחד מהם. עבודתו אינה מנסה ליישב את המתחים הללו, אלא לחיות בתוכם ולתת להם צורה.\n\nעבור לוין, טקסטיל הוא השפה דרכה הוא בודק את המתח הזה ומנסה לכתוב לעצמו נרטיב חדש. עבורו כל עבודה היא מרחב לחקירה של זהותו האישית. הוא שואב השראה מאיקונוגרפיה דתית ומפיסול ואמנות קלאסיים, ובוחן אותם מבעד לעדשה קווירית עכשווית. באמצעות שילוב של מוטיבים דתיים, סמלים תרבותיים וחוויות אישיות, הוא משרטט מרחב שבו הוא אינו כבול לדוגמה דתית או לציפיות חברתיות, אלא נשען על חיבור רוחני לכוח עליון חוצה גבולות.\n\nיצירותיו נוגעות בחיבור ובקרבה אנושית, ובוחנות את הפער שבין החוויה הפרטית לבין המבט החברתי שמבקש להגדיר אותה. מתוך בניית שפה חזותית שמפגישה בין המקודש לאינטימי, בין טוהר לאיסור, הוא קורא תיגר על מסגרות קיימות ומזמין את הצופה למפגש קרוב עם שכבות הסיפור שהעבודה נושאת.","bio_en":null,"works":[{"id":"nir-flesh-marble","title":"\"untitled\" (flesh and marble)","image":"images/artists/nir-giorgio-levin/work-01.webp"},{"id":"nir-eyes-closed","title":"\"untitled\" (with eyes closed, we saw)","image":"images/artists/nir-giorgio-levin/work-02.webp"}],"figma_artist_page_mobile":"XhGH289YTRcW811wrufRJz::571:6354","figma_artist_page_desktop":null,"homepage_featured":true,"works_grid_order":7},{"id":"elsa-ars-brush","slug":"elsa-ars-brush","name_en":"elsa ers brosh","name_he":"אלסה ארס ברוש","portrait":"images/artists/elsa-ars-brush/portrait.webp","work_image":"images/works/grid/elsa-ars-brush.webp","instagram_handle":"@ELSAJINX","bio_he":"אלסה ארס ברוש, ילידת איסטנבול, היא אמנית עכשווית שיצירתה נעה בין ציור לקולאז',\nושואבת מעברה בעולמות האופנה והעיצוב הגרפי.\n\nלאחר לימודים ב-PARSONS SCHOOL OF DESIGN בפריז ובסורבון IV, היא פיתחה שפה חזותית המושפעת ממסורות טקסטיל ומהקשר ההיסטורי שלהן לעבודת נשים ולביטוי נשי. עבודתה בוחנת זהות מגדרית, התגלמות גופנית ואת החוויה של להיות אישה המעוצבת על ידי נרטיבים תרבותיים מהמזרח התיכון.\n\nכיום, כשהיא פועלת מתל אביב, היא שואבת השראה מהרב-תרבותיות הרב-שכבתית ומהנפיצות של העיר, ויוצרת עבודות המתנדנדות בין היפר-ריאליזם לעיוות מעודן.","bio_en":null,"works":[{"id":"elsa-within-flesh","title":"\"within the flesh\"","image":"images/artists/elsa-ars-brush/work-01.webp","medium":"acrylics on canvas, 120 x 80 cm"},{"id":"elsa-gossip","title":"\"gossip\"","image":"images/artists/elsa-ars-brush/work-02.webp","medium":"acrylics on canvas, 45 x 30 cm"},{"id":"elsa-intimate","title":"\"an intimate portrait\"","image":"images/artists/elsa-ars-brush/work-03.webp","medium":"acrylics on canvas, 40 x 30 cm"}],"figma_artist_page_mobile":"XhGH289YTRcW811wrufRJz::560:5350","figma_artist_page_desktop":null,"homepage_featured":false,"works_grid_order":2},{"id":"gal-polk","slug":"gal-polk","name_en":"gal pollak","name_he":"גל פולק","portrait":"images/artists/gal-polk/portrait-v2.webp","work_image":"images/works/grid/gal-polk.webp","instagram_handle":"@GALPOLLAK","bio_he":"גל פולק, 36, מתל אביב, יוצרת אמנות נאו-פופ-ארט בעזרת שיבוץ קריסטלים.\n\nגל בוחרת להתמודד עם המחשבות הטורדניות שלה, בעזרת המנטרה \"צעד צעד, אבן אבן\" במלאכת שיבוץ הקריסטלים באופן מדוייק בעבודותיה, היא הופכת חפצים אגביים לבעלי משמעות חדשה ומנצנצת.","bio_en":null,"works":[{"id":"gal-exs-and-ohs","title":"\"exs and oh's\"","image":"images/artists/gal-polk/work-01.webp"},{"id" zohar-ron-dan-ben-ari/hero-left.webp","images/artists/zohar-ron-dan-ben-ari/hero-right.webp"],"hero_image_focus":["center 28%","center 22%"],"hero_collab":{"artists":[{"name_en":["zohar","ron"],"bio_he_short":"אומן חזותי, במאי וצלם המבטא חיבור ויזואלי ורעיוני בין פולחן טקסי לאסתטיקה וחושניות של גוף ותנועה, כחלק מהשפה הויזואלית ביצירותיו.","instagram":"@ZOHARRON"},{"name_en":["dan","ben-ary"],"bio_he_short":"אסטרטג, מעצב, פילוסוף רחוב ואמן רב־תחומי בחיפוש אחר מניפולציות תת־מודעות חברתיות שמשפיעות על המציאות שבה אנו חיים.","instagram":"@DANDAN_NUSHA"}]},"work_image":"images/works/grid/zohar-ron-dan-ben-ari.webp","instagram_handle":"@ZOHARRON × @dandan_nusha","bio_he":"פרויקט אמנות חברתי אשר בא לשאול שאלה פשוטה <span class=\"lat\">SEX?</span>\nבפרויקט זה התחלנו את השאלה שלנו עם עשרה זוגות ומזרן.\nרגשות ותקשורת, תת-מודע ותנועה.\nללא מילים, כל זוג סיפור שונה.\n\n\"כמה פרטנרים היו לך?\"\nבמקום לספור, אני מתבונן אל החוויה עצמה. דרך רגעים אינטימיים, היצירה מציעה להתבונן על סקס כמרחב של נוכחות, תקשורת, פגיעוּת ואנושיות. השאלה על מספר הפרטנרים הופכת כאן לפחות רלוונטית; מה שנשאר הוא איכות המפגש, המבט, המגע גוף בגוף והקשר שנוצר ביניהם.\n\nהפרויקט מזמין את הצופה לעבור ממדידה של כמות להקשבה לעומק, מספירה לחוויה של הזדהות או סלידה.","bio_en":null,"works":[{"id":"zr-sex-1","title":"\"sex?\"","image":"images/artists/zohar-ron-dan-ben-ari/work-01.webp"},{"id":"zr-sex-2","title":"\"sex?\"","image":"images/artists/zohar-ron-dan-ben-ari/work-02.webp"}],"figma_artist_page_mobile":"119:3917","figma_artist_page_desktop":null,"homepage_featured":false,"works_grid_order":11,"works_caption_each_image":true,"_note":"collaboration card — links 2 artists; uses dual hero images instead of single portrait; How Many (not loneliness) — keep per-image captions even when titles match"},{"id":"adi-duak","slug":"adi-duak","name_en":"adi duak","name_he":"עדי דואק","portrait":"images/artists/adi-duak/portrait.webp","work_image":"images/works/grid/adi-duak.webp","instagram_handle":"@shakuf_art","bio_he":"אמנית מודרנית המתמקדת ביצירה באמצעות אפוקסי מתוך אהבה לצבע, אור ומרקם.\nעבודתי שואבת השראה מהזיכרונות הקטנים ומהרגעים ילדותיים שמלווים אותנו לאורך החיים — רגעים שבהם הצבע והאור היו חלק בלתי נפרד מהחוויה. אני מתרגמת את זיכרונות הילדות והנוסטלגיה ליצירות עכשוויות\nשמחברות בין דיוק מקצועי לבין רגש ועדינות.","bio_en":null,"works":[{"id":"adi-life-1","title":"״סוכריות הצלה״","image":"images/artists/adi-duak/work-01.webp"},{"id":"adi-life-2","title":"״סוכריות הצלה״","image":"images/artists/adi-duak/work-02.webp"},{"id":"adi-life-3","title":"״סוכריות הצלה״","image":"images/artists/adi-duak/work-03.webp"},{"id":"adi-life-4","title":"״סוכריות הצלה״","image":"images/artists/adi-duak/work-04.webp"}],"figma_artist_page_mobile":"235:632","figma_artist_page_desktop":null,"homepage_featured":false,"works_grid_order":12},{"id":"alon","slug":"alon","name_en":"alon manjoch","name_he":"אלון מנג׳וך","portrait":"images/artists/alon/portrait.webp","work_image":null,"instagram_handle":"@a_manjoch","bio_he":"חי בתוך ניסיון להבין את עולמנו הריגשי והכוחות הפועלים בו. דרך צילום, כתיבה ואומנות חזותית לצד עיון במחקרים מדעיים אני מנסה להתבונן, לחקור ולהביע את החוויה האנושית.\n\nביצירה \"מחשבות טורדניות\" אני מחפש לחבר אותנו אל הדפוסים הקומפלסיביים שנוצרים בראשנו, מעגל השאלות האין סופיות שמענות את נפשנו ללא מנוח, בעולם בו לעולם לא נדע לאן הבחירות שלנו יובילו אותנו. נאמר שהדבר שהכי קשה למוח האנושי להתמודד איתו הוא אי וודאות,\nאך באותו זמן, אין אנו יכולים להמנע ממנה.\n\nהאדם ינסה להילחם באי הוודאות שבחיו בעזרת הכלים שיש ברשותו, נסיונות בלתי פוסקים לתת תשובות לשאלות בעזרת חשיבה אובססיבית או לחלופין, שימוש בכלים רציונאלים כד להשליט סדר בכאוס, אנחנו יוצרים מערכת חוקים, שמות וכללים על מנת לכבוש את המתחולל בנפשנו.\n\n״מודלים סטטיסטיים של זוגיות״ הוא אוסף נוסחאות בלתי מדויקות המציע דרכים אמפיריות לענות על שאלות מעולם הזוגיות מתוך ניסיון נואש לתשובות ובהירות בתוך עולם רגשי לא מנוהל וחסר וודאות, נסיון כושל למדוד אינטימיות דרך מערכת מספרית של נתונים.","bio_en":null,"works":[{"id":"alon-machshavot","title":"״מחשבות טורדניות״","image":"images/artists/alon/work-01.webp","year":2026},{"id":"alon-modelim","title":"״מודלים סטטיסטיים של זוגיות״","image":"images/artists/alon/work-02.webp","year":2026}],"figma_artist_page_mobile":"1213:3815","figma_artist_page_desktop":"1213:3","homepage_featured":false,"_note":"the only artist with a Figma desktop frame (1213:3); mobile is artist2 (1213:3815). Older alon mobile frame 1213:89 is superseded."},{"id":"noemi-safir","slug":"noemi-safir","name_en":"noemi safir","name_he":"נעמי ספיר","portrait":"images/artists/noemi-safir/portrait-v2.webp","portrait_focus":"center center","work_image":null,"instagram_handle":"@noemi.safir.artist","bio_he":"ציירת פיגורטיבית עכשווית ואמנית רב תחומית, 55 חיה ויוצרת בתל אביב.\n\nהעבודות שלי נולדות מתוך חקירה מתמשכת של הגוף הנשי כמרחב שבו נרשמים זיכרונות, יחסים, מתחים, הסתגלויות ושברים רגשיים. אני בוחנת רגעים שבהם חוויה נפשית הופכת למחווה גופנית, גוף שמתכווץ, מחכה, מחזיק את עצמו, נדרך, מתארך או כמעט נמוג בתוך סיטואציה אנושית. בקול הקורא אני פונה אל זיכרון אישי כנקודת מוצא. אל אותם רגעים קטנים, יומיומיים, שבהם רגש מסוים נצרב בגוף ונשאר בו. רגעים של חוסר נראות, של קבלה שלא התממשה, של מרחק בתוך קרבה, של מאמץ להשתייך ושל ניסיון להחזיק קשר גם כשהלב כבר נסוג. אלה רגעים שבהם מה שמתרחש כלפי חוץ נדמה כמעט שגרתי, אך מבפנים מותיר חותם עמוק.\n\nהציור מאפשר לי לחזור אל הרגעים האלה ולתת להם צורה חדשה. דרך ההגזמה, העיוות, הקו, המבט, המרחק בין דמויות והאופן שבו הגוף תופס או מאבד מקום, הזיכרון הופך מנקודה חבויה בנפש לדימוי שאי אפשר להתעלם ממנו. אני מחפשת את המקום שבו מפגש מחודש עם הזיכרון הופך אותו לנראה ובעל נוכחות ומאפשר לשהות בכאב.\n\nבעבודות המוצגות אני עוסקת ברגעים של סף. בין כניסה ליציאה, בין שייכות לזרות, בין מגע לריחוק ובין הכמיהה להיראות לבין תחושת השקיפות גם בתוך קרבה. הדמויות נושאות בתוכן זיכרון רגשי קונקרטי. לעיתים הן לבדן, לעיתים מול דמות קרובה, לעיתים בתוך קשר טעון ולעיתים בתוך חלל שבו ניכרים רק השרידים של מה שהתרחש בו.","bio_en":null,"works":[{"id":"noemi-ahava","title":"״אהבה ללא תנאי״","image":"images/art ון ליצור אובייקטים שאינם רק יפים, אלא בעלי נוכחות. אובייקטים שמחזיקים בתוכם מתח בין כוח ועדינות, בין תעשייה לאמנות, בין מבנה לתחושה. זהו גם סוד הקסם של עבודתו: היכולת לקחת חומר קשה, קר ומדויק, ולגרום לו להרגיש אישי, כמעט חי.\n\nהעיסוק של קינן במתכת אינו נובע רק ממשיכה לחומר חזק ועמיד, אלא גם מהאפשרות להפוך אותו למשהו עדין, כמעט פיוטי. בעבודותיו, מתכת יכולה להתכופף כמו מחשבה, להחזיר אור כמו מים, ולהחזיק גוף שלם שמרגיש בו-זמנית תעשייתי ואנושי. מתוך המקום הזה הוא יוצר עבודות שמבקשות לא רק לתפוס מקום בחלל, אלא לשנות את האופן שבו הצופה מרגיש את החלל סביבו.","bio_en":null,"works":[],"figma_artist_page_mobile":"XhGH289YTRcW811wrufRJz::560:5857","figma_artist_page_desktop":null,"homepage_featured":false},{"id":"jessica-tabarovsky","slug":"jessica-tabarovsky","name_en":"jessica tabarovsky","name_he":"ג׳סיקה טברובסקי","portrait":"images/artists/jessica-tabarovsky/portrait.webp","work_image":null,"instagram_handle":"@jessica_tabarovsky.art","bio_he":"נוודית שמכה שורשים בנוודות שבי. אומנית תמידית בכל תחומי העיסוק בהם עסקתי ועוסקת, תיאטרון, אקדמיה, הנחיית קבוצות וציור פיגורטיבי. בת חמישים ושבע, פועלת מהעיר באר שבע.\n\nהעבודה שלי בתחום האומנות הפלסטית בוחנת את המגן מפני האוטומט של החיים, את המחשבה והרגש שמאחוריו. חוקרת את המתח שבין \"הנחשב והחשוב\" לבין \"הקטן והחולף\", את החיכוך שבין ההגדרות המקובלות והמצופות לבין האקט ששובר אותן.\n\nאני ציירת של האובייקטים והסיטואציות הפשוטים והבנאליים שנעלמים לתוך המקומיות הקטנה שלהם. הבעת פנים רגעית, תנוחת רגליים חולפת, חפצים יום יומיים, דברים כמעט בלתי נראים. רגעים מינימאליים שאני מוצאת בהם נחמה גדולה, כי עבורי הם מגן מפני האוטומט. הם עוגנים של אנושיות עמוקה ברצף הפעולות שנחשבות למכאניות, לרגעי ביניים ולא לדבר האמיתי.\n\nאני תובעת את החשיבות הראויה להם, את היופי שמכילים. מוקירה את המקומי, הקטן, הרגיל. אוהבת לגעת בטרגי דרך הבנאלי, להבחין באובייקט שלא תפוס את מרכז הבמה ולמצוא בו יופי.","bio_en":null,"works":[],"figma_artist_page_mobile":"XhGH289YTRcW811wrufRJz::560:4910","figma_artist_page_desktop":null,"homepage_featured":false},{"id":"baruch את הסיפורים שהלב עדיין אינו יודע לומר.","bio_en":null,"works":[],"figma_artist_page_mobile":"XhGH289YTRcW811wrufRJz::560:5552","figma_artist_page_desktop":null,"homepage_featured":false},{"id":"lahav-barak","slug":"lahav-barak","name_en":"lahav barak","name_he":"להב ברק","portrait":"images/artists/lahav-barak/portrait.webp","work_image":null,"instagram_handle":"@lahav_barak","bio_he":"להב ברק | בת ,29 מתל אביב\n\nאני להב, אדם של חופש, של חלומות גדולים ושל סקרנות. הדרך שלי לאמנות לא הייתה מתוכננת, הגעתי אליה מרקע של טכנולוגיה ומנהל עסקים, ודווקא מתוך הצורך שלי לפרוץ גבולות ולחשוב אחרת, מצאתי את עצמי נמשכת לפיסול בספרים.\n\nכיום אני האמנית שמאחורי המותג Books Lilou. חומר הגלם שלי הוא ספרים ישנים שננטשו או נזרקו. בעבודה ידנית וסיזיפית אני בוחרת לקפל את הדפים, לעצב אותם מחדש ולהציג בהם מסר. עבורי, פעולת הקיפול המדויקת והרגועה היא המקום שבו הרצון שלי לרדוף ולהשיג פוגש את הצורך בשלווה והתמסרות.\n\nמאיפה נובעת היצירה אצלי: עבורי, אמנות היא הדרך שבה אני נושמת ומעבדת את העולם. היצירה שלי צומחת מתוך המקומות הכי אישיים וחשופים בנפש, מתוך הצורך האנושי העמוק למצוא סדר, היגיון ונחמה בתוך חוויות מורכבות שלא תמיד ניתן להלביש בהן מילים. חומר הגלם שבחרתי בו, הספר, נושא בתוכו סיפורים של אחרים, אך פעולת הקיפול הקפדנית, העדינה והמדויקת מאפשרת לי לכתוב בתוכו את הסיפור שלי. בכל דף שאני מקפלת, בכל זווית ובכל שכבת עומק, ישנו רצון להחזיר לעצמי את השליטה, ליצור עוגן של שקט מול רעשי הרקע, ולבנות מקום מוגן ובטוח שכולו שלי.","bio_en":null,"works":[],"figma_artist_page_mobile":"XhGH289YTRcW811wrufRJz::560:5967","figma_artist_page_desktop":null,"homepage_featured":false},{"id":"livay-levi","slug":"livay-levi","name_en":"livay levi","name_he":"ליוואי לוי","portrait":"images/artists/livay-levi/portrait.webp","work_image":null,"instagram_handle":"@livaylevi_","bio_he":"במקור מאזור עוטף עזה וכיום מתגורר בתל אביב, ליוואי לוי יוצר מאז שהוא זוכר את עצמו.\nעבורו, היצירה אינה תחביב או מקצוע בלבד, אלא דרך התבוננות בעולם ודרך להבין את עצמו. הוא עובד בעיקר עם חומרי בניין וחומרי גלם מן הטבע, ומוצא בהם יופי דוו "bio_he":"רז רונן (נולד בשנות ה־80, חולון, ישראל) הוא צייר שיצירתו נעה על התפר שבין כאוס לשליטה, בין זוהר לחספוס.\n\nגדילתו בחולון עיצבה את קולו האמנותי לא פחות ממה שהיה סביבו מאשר ממה שהיה חסר—והציתה משיכה מתמשכת אל הגולמי, המרדני, ואל יופי שמסרב להיות מהוקצע.\n\nאת דרכו החל בציור על חולצות שמכר בעצמו—גישה שממשיכה לעצב את עבודתו עד היום: ישירה, גופנית ומיידית.\n\nציוריו של רונן נוצרים במהירות ובאופן אינסטינקטיבי, מתוך אמונה שהאמנות הטובה ביותר נובעת מהבטן ולא מהתלבטות יתר. תנועות המכחול שלו פרועות אך מכוונות, חצופות אך מהפנטות; ותמיד נושאות עמן עוקץ—סאטירי, מפתה, ומעט \"לא במקום\".\n\nהסגנון שלו מסרב לקטגוריות נקיות: תרבות פופ ומיתולוגיה אישית, אלגנטיות והאבסורד. בין אם הוא בוחן תשוקה, התפכחות או את המופע של החיים המודרניים, רונן נשאר נאמן לרעיון אחד: אמנות צריך להרגיש לפני שמבינים.\nכיום רז חי ויוצר בתל אביב.","bio_en":null,"works":[],"figma_artist_page_mobile":"XhGH289YTRcW811wrufRJz::605:7995","figma_artist_page_desktop":null,"homepage_featured":false},{"id":"aharon-bas","slug":"aharon-bas","name_en":"aharon bas","name_he":"אהרן בס","portrait":"images/artists/aharon-bas/portrait.webp","work_image":null,"instagram_handle":"@aharon.bs","bio_he":"אהרן בס הוא משורר, יוצר ומלווה תהליכים דרך כתיבה.\n\nיצירתו נוגעת במתח העדין שבין חשיפה להסתרה, בין פגיעוּת לחוסן, בין בדידות לחיבור, ובין הכאב הפרטי לבין התקווה המשותפת לכל אדם.\n\nבשירתו מבקש בס לתת מילים לאזורים הפנימיים ביותר של הנפש — המקומות שבהם האדם מסתתר מעצמו, אך גם משתוקק להיראות ולהיות מובן. דרך כתיבה חשופה, ישירה ורוחנית, הוא מתבונן בשברים, בפחדים ובסתירות שבתוכנו, לא ככישלון אנושי אלא כחלק בלתי נפרד מן הדרך אל שלמות.","bio_en":null,"works":[],"figma_artist_page_mobile":"XhGH289YTRcW811wrufRJz::781:9","figma_artist_page_desktop":null,"homepage_featured":false},{"id":"bar-cohen","slug":"bar-cohen","name_en":"bar cohen","name_he":"בר כהן","portrait":"images/artists/bar-cohen/portrait.webp","work_image":null,"instagram_handle":"@akra_e_","bio_he":"יוצרת ומעצבת אופנה (המותג AKRA). במשך שנים ביטאה את עצמה דרך מוזיקה, עד שהמעבר מחולצות תנועת הנוער אל מדי הצבא חידד עבורה את האופן שבו לבוש נושא זהות ושייכות. בעקבות התנסות מקרית בסריגה, לצד מגורים בנגב והשפעת המרחבים והשקט המדברי, החלה לפתח שפה עיצובית המבוססת על אינטואיציה, אקראיות ואמון בתהליך. היא יוצרת אופנה שבה המעשה היצירתי אינו מסתיים עם מסירת הבגד, אלא ממשיך לפעום מתוך מפגש בין האינטואיציה שלה לזו של הלובש.","bio_en":null,"works":[],"figma_artist_page_mobile":"XhGH289YTRcW811wrufRJz::798:307","figma_artist_page_desktop":null,"homepage_featured":false},{"id":"michael-konovalenko","slug":"michael-konovalenko","name_en":"michael konovalenko","name_he":"מיכאל קונובלנקו","portrait":"images/artists/michael-konovalenko/portrait.webp","work_image":null,"instagram_handle":"@mishakonovalenko","bio_he":"אמן רב-תחומי יליד רוסיה שגדל בסיביר ועלה לישראל בגיל 14. עבודתו מושפעת עמוקות מהנופים, התרבויות והחוויות המגוונות שעיצבו את זהותו, והיא נעה במדיומים של צילום, קולאז', ציור ואנימציה.\n\nמתוך אמונה בכוחה הטרנספורמטיבי של האמנות לחצות גבולות ולטפח הבנה, הוא יוצר בצמתים של תרבויות וסכסוכים, ומבקש לחקור את נקודות המפגש שבין עבר להווה ובין זיכרון לדמיון.\n\nבאמצעות פירוק הצורות של התרבות המקומית, שואף האמן ליצור מרחב חדש, אינטואיטיבי ומרפא. עבודותיו מייצרות עולמות חווייתיים המטשטשים את הגבול בין מציאות לבדיה, ומזמינים את הצופה למסע של גילוי והתבוננות פנימית.\n\nיצירתו מהווה עדות לחוסן הרוח האנושית, ומציעה הבזקים של אור וגאולה בתוך חשיכת חוסר הוודאות, תוך הדגשת כוחו של הדמיון וההדהוד המתמשך של הזיכרון.","bio_en":null,"works":[],"figma_artist_page_mobile":"XhGH289YTRcW811wrufRJz::798:374","figma_artist_page_desktop":null,"homepage_featured":false},{"id":"maria-artamonova","slug":"maria-artamonova","name_en":"maria artamonova","name_he":"מריה ארטמונובה","portrait":"images/artists/maria-artamonova/portrait.webp","work_image":null,"instagram_handle":"@art_maria_design","bio_he":"מריה ארטמונובה (ילידת 1987) היא אמנית ומעצבת מקרמה, שעלתה מרוסיה בשנת 2003 ומנהלת כיום סטודיו ליצירה במתחם נחלת בנימין בתל אביב. הזיקה שלה למדיום נולדה בחוג מקרמה בילדותה, שם גילתה את מרחב החופש הטמון בעבודת הידיים. למרות תהפוכות החיים, מעברי מדינות, שפות ומקצועות, החוטים נותרו עבורה עוגן קבוע – חזרה תמידית אל תחושת החופש המקורית שבה אין הגדרות או תכתיבים, אלא רק ידיים, חוטים וצורות המופיעות מתוך הכלום.","bio_en":null,"works":[],"figma_artist_page_mobile":"XhGH289YTRcW811wrufRJz::798:240","figma_artist_page_desktop":null,"homepage_featured":false},{"id":"alice-debellis","slug":"alice-debellis","name_en":"alice debellis","name_he":"אליצ׳ה דבליס","portrait":"images/artists/alice-debellis/portrait.webp","work_image":null,"instagram_handle":"@alice_db_allis","bio_he":"אליצ׳ה דבליס (מילאנו, 1983) חיה ויוצרת בישראל משנת 2012. היא מגיעה מעולם האופנה והטקסטיל, ובמהלך השנים פיתחה שפה אמנותית ייחודית המחברת בין איור, סמליות וסיפור חזותי. באמצעות פרקטיקות של רישום ודימויים חזותיים מורכבים, דה בליס יוצרת עולמות פיוטיים המאוכלסים באלמנטים מן הטבע ובדמויות הנעות על התפר שבין זיכרון, חלום ודמיון.","bio_en":null,"works":[],"figma_artist_page_mobile":"XhGH289YTRcW811wrufRJz::849:963","figma_artist_page_desktop":null,"homepage_featured":false},{"id":"amnon-lipkin","slug":"amnon-lipkin","name_en":"amnon lipkin","name_he":"אמנון ליפקין","portrait":"images/artists/amnon-lipkin/portrait.webp","work_image":null,"instagram_handle":"@pashut.o","bio_he":"אמן ואיש קראפט הפועל בתל אביב. לאחר תואר במתמטיקה ושנים בעולם ההייטק, פנה אל עבודת הידיים והלואו-טק, והתמקד עם השנים ברקמה, חוטים, בד וציור בתפר מכונת תפירה.\nעבודותיו מתעדות את חיי היומיום שסביבו – העיר, החוף, אנשים ובתי קפה – ומציפות את הקסם הטמון ברגעים הפשוטים.\n\nמתוך עבודה בחומרים נגישים ומוכרים, ליפקין מגבש שפה עדינה, חשופה ולא-מושלמת המדגישה אנושיות וכמיהה לפשטות.\n\nיצירותיו מבקשות לתפוס את המנעד שבין היפה לעלוב שבעולם, בדייקנות שיש בה פגמים מכוונים, הומור וכאב, תוך שילוב בין מסורת איטית וקראפט מסורתי לבין רעיונות עכשוויים.","bio_en":null,"works":[],"figma_artist_page_mobile":"XhGH289YTRcW811wrufRJz::798:173","figma_artist_page_desktop":null,"homepage_featured":false}]</script>
