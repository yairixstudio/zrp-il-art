<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>QR Code Generator — Zielinski &amp; Rozen</title>
<style>
  :root{
    --ink:#1B1B1B; --white:#FFFFFF; --line:#E2E2E2; --muted:#6B7280;
    --field:#F6F6F5; --accent:#1B1B1B; --radius:10px;
    --ui:ui-sans-serif,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--ui);color:var(--ink);background:var(--white);line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:inherit}
  .wrap{max-width:1100px;margin:0 auto;padding:32px 24px 80px}
  header.top{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px;border-bottom:1px solid var(--line);padding-bottom:20px;margin-bottom:32px}
  .brand{font-size:14px;letter-spacing:.22em;text-transform:uppercase;font-weight:600}
  .brand small{display:block;letter-spacing:.16em;font-weight:400;color:var(--muted);font-size:11px;margin-top:4px}
  h1{font-size:24px;font-weight:600;letter-spacing:-.01em}
  .top nav{font-size:13px}
  .top nav a{color:var(--muted);text-decoration:none;border-bottom:1px solid transparent}
  .top nav a:hover{color:var(--ink);border-color:var(--ink)}
  .grid{display:grid;grid-template-columns:1fr 380px;gap:48px;align-items:start}
  @media (max-width:820px){.grid{grid-template-columns:1fr;gap:36px}}
  .field{margin-bottom:20px}
  .field label{display:block;font-size:12px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
  .field input,.field select{width:100%;font-family:var(--ui);font-size:15px;color:var(--ink);background:var(--field);border:1px solid var(--line);border-radius:8px;padding:11px 13px;outline:none;transition:border-color .15s}
  .field input:focus,.field select:focus{border-color:var(--ink)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media (max-width:520px){.row2{grid-template-columns:1fr}}
  fieldset{border:1px solid var(--line);border-radius:var(--radius);padding:18px 18px 4px;margin-bottom:24px}
  legend{font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);padding:0 8px}
  .params-row{display:grid;grid-template-columns:1fr 1fr 40px;gap:10px;margin-bottom:12px;align-items:center}
  .params-row input{margin:0}
  .icon-btn{height:38px;border:1px solid var(--line);border-radius:8px;background:var(--white);cursor:pointer;font-size:18px;color:var(--muted);line-height:1}
  .icon-btn:hover{border-color:var(--ink);color:var(--ink)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--ui);font-size:14px;font-weight:600;letter-spacing:.02em;border:1px solid var(--ink);border-radius:8px;padding:11px 18px;cursor:pointer;background:var(--white);color:var(--ink);transition:background .15s,color .15s}
  .btn:hover{background:var(--ink);color:var(--white)}
  .btn.ghost{border-color:var(--line);color:var(--muted);font-weight:500}
  .btn.ghost:hover{border-color:var(--ink);color:var(--ink);background:var(--white)}
  .add-btn{font-size:13px;font-weight:600;color:var(--ink);background:none;border:0;cursor:pointer;padding:4px 0;margin-bottom:14px}
  .add-btn:hover{text-decoration:underline}
  /* output panel */
  .panel{position:sticky;top:24px;border:1px solid var(--line);border-radius:var(--radius);padding:24px;background:var(--white)}
  .qr-box{background:var(--white);border:1px solid var(--line);border-radius:8px;padding:16px;display:flex;align-items:center;justify-content:center;aspect-ratio:1/1;margin-bottom:18px}
  .qr-box canvas{width:100%;height:100%;image-rendering:pixelated;display:block}
  .qr-box.error{color:var(--muted);font-size:13px;text-align:center;padding:24px}
  .url-out{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;background:var(--field);border:1px solid var(--line);border-radius:8px;padding:11px 13px;word-break:break-all;max-height:120px;overflow:auto;margin-bottom:12px}
  .out-actions{display:flex;flex-wrap:wrap;gap:8px}
  .out-actions .btn{flex:1 1 auto}
  .ecl{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--muted);margin-bottom:16px}
  .ecl select{width:auto;font-size:13px;padding:6px 8px;background:var(--field);border:1px solid var(--line);border-radius:6px;color:var(--ink)}
  .hint{font-size:12px;color:var(--muted);margin-top:6px}
  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--white);font-size:13px;padding:10px 18px;border-radius:8px;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:50}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div>
      <div class="brand">Zielinski &amp; Rozen<small>Campaign tools</small></div>
    </div>
    <h1>QR Code Generator</h1>
    <nav><a href="../guide/">Guide &amp; embed codes →</a></nav>
  </header>

  <div class="grid">
    <form id="genForm" autocomplete="off" novalidate>
      <div class="row2">
        <div class="field">
          <label for="store">Store ID</label>
          <input type="text" id="store" name="store_id" placeholder="e.g. 0042" inputmode="text">
        </div>
        <div class="field">
          <label for="city">City</label>
          <input type="text" id="city" name="city" placeholder="e.g. Paris">
        </div>
      </div>

      <div class="row2">
        <div class="field">
          <label for="country">Country</label>
          <select id="country" name="country">
            <option value="" selected>Select country…</option>
          </select>
        </div>
        <div class="field">
          <label for="lang">Form language</label>
          <select id="lang" name="lang"></select>
        </div>
      </div>

      <div class="field">
        <label for="campaign">Campaign / Ad reference <span style="text-transform:none;font-weight:400">(optional)</span></label>
        <input type="text" id="campaign" name="campaign" placeholder="e.g. spring-window-display">
      </div>

      <fieldset>
        <legend>Additional parameters</legend>
        <div id="paramsList"></div>
        <button type="button" class="add-btn" id="addParam">+ Add parameter</button>
      </fieldset>

      <div class="field">
        <label for="base">Destination URL</label>
        <input type="text" id="base" name="base" spellcheck="false">
        <p class="hint">The form page the QR opens. Parameters are appended automatically.</p>
      </div>
    </form>

    <aside class="panel">
      <div class="qr-box" id="qrBox"><canvas id="qrCanvas"></canvas></div>
      <div class="ecl">
        <label for="ecl" style="margin:0">Correction</label>
        <select id="ecl">
          <option value="L">L · 7%</option>
          <option value="M" selected>M · 15%</option>
          <option value="Q">Q · 25%</option>
          <option value="H">H · 30%</option>
        </select>
        <span>higher = denser, more scan-resilient</span>
      </div>
      <div class="url-out" id="urlOut"></div>
      <div class="out-actions">
        <button type="button" class="btn" id="dlPng">Download PNG</button>
        <button type="button" class="btn ghost" id="dlSvg">SVG</button>
        <button type="button" class="btn ghost" id="copyUrl">Copy link</button>
        <button type="button" class="btn ghost" id="openForm">Preview</button>
      </div>
    </aside>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="../components/countries.js"></script>
<script src="../components/qrcode.min.js"></script>
<script>
(function(){
  "use strict";
  var LANGS = [
    { code:"ar", name:"Arabic" },
    { code:"zh", name:"Chinese" },
    { code:"en", name:"English" },
    { code:"fr", name:"French" },
    { code:"de", name:"German" },
    { code:"he", name:"Hebrew" },
    { code:"it", name:"Italian" },
    { code:"ja", name:"Japanese" },
    { code:"ru", name:"Russian" },
    { code:"es", name:"Spanish" }
  ];

  var $ = function(id){ return document.getElementById(id); };
  var countrySel = $("country"), langSel = $("lang"), baseField = $("base");

  (window.COUNTRIES || []).forEach(function(c){
    var o = document.createElement("option");
    o.value = c.code; o.textContent = c.name;
    countrySel.appendChild(o);
  });
  LANGS.forEach(function(l){
    var o = document.createElement("option");
    o.value = l.code; o.textContent = l.name;
    if (l.code === "en") o.selected = true;
    langSel.appendChild(o);
  });

  // Default destination = the form page next to this tool, on whatever host it is served from.
  baseField.value = new URL("../form/", window.location.href).href;

  // ---- custom parameter rows ----
  var paramsList = $("paramsList");
  function addParamRow(k, v){
    var row = document.createElement("div");
    row.className = "params-row";
    var ik = document.createElement("input"); ik.type="text"; ik.placeholder="key"; ik.value=k||"";
    var iv = document.createElement("input"); iv.type="text"; iv.placeholder="value"; iv.value=v||"";
    var rm = document.createElement("button"); rm.type="button"; rm.className="icon-btn"; rm.textContent="×"; rm.setAttribute("aria-label","remove parameter");
    rm.addEventListener("click", function(){ row.remove(); render(); });
    ik.addEventListener("input", render); iv.addEventListener("input", render);
    row.appendChild(ik); row.appendChild(iv); row.appendChild(rm);
    paramsList.appendChild(row);
  }
  $("addParam").addEventListener("click", function(){ addParamRow(); });

  // ---- URL building ----
  function buildURL(){
    var base = baseField.value.trim() || new URL("../form/", window.location.href).href;
    var params = [];
    function push(key, val){
      val = (val == null ? "" : String(val)).trim();
      key = (key || "").trim();
      if (!key || !val) return;
      params.push(encodeURIComponent(key) + "=" + encodeURIComponent(val));
    }
    push("store_id", $("store").value);
    push("city", $("city").value);
    push("country", countrySel.value);
    push("lang", langSel.value);
    push("campaign", $("campaign").value);
    push("utm_source", "qr");
    push("utm_medium", "offline");
    if ($("campaign").value.trim()) push("utm_campaign", $("campaign").value);
    Array.prototype.forEach.call(paramsList.querySelectorAll(".params-row"), function(row){
      var ins = row.querySelectorAll("input");
      push(ins[0].value, ins[1].value);
    });
    var sep = base.indexOf("?") === -1 ? "?" : "&";
    return params.length ? base + sep + params.join("&") : base;
  }

  // ---- QR rendering ----
  var canvas = $("qrCanvas"), ctx = canvas.getContext("2d"), qrBox = $("qrBox");
  var currentSvg = "", currentUrl = "";

  function render(){
    var url = buildURL();
    currentUrl = url;
    $("urlOut").textContent = url;
    var ecl = $("ecl").value;
    var qr;
    try {
      qr = qrcode(0, ecl);
      qr.addData(url);
      qr.make();
    } catch (e) {
      qrBox.classList.add("error");
      qrBox.innerHTML = "Link is too long for a single QR code. Shorten the values or remove parameters.";
      currentSvg = "";
      return;
    }
    if (qrBox.classList.contains("error")) {
      qrBox.classList.remove("error");
      qrBox.innerHTML = "";
      qrBox.appendChild(canvas);
    }
    var n = qr.getModuleCount();
    var margin = 4;
    var target = 1024;
    var cell = Math.max(1, Math.floor(target / (n + margin * 2)));
    var dim = cell * (n + margin * 2);
    canvas.width = dim; canvas.height = dim;
    ctx.fillStyle = "#FFFFFF"; ctx.fillRect(0, 0, dim, dim);
    ctx.fillStyle = "#000000";
    for (var r = 0; r < n; r++) {
      for (var c = 0; c < n; c++) {
        if (qr.isDark(r, c)) {
          ctx.fillRect((c + margin) * cell, (r + margin) * cell, cell, cell);
        }
      }
    }
    currentSvg = qr.createSvgTag({ cellSize: 10, margin: margin, scalable: true });
  }

  // ---- downloads ----
  function safeName(){
    var parts = [$("store").value, countrySel.value, $("city").value]
      .map(function(s){ return String(s || "").trim().replace(/[^A-Za-z0-9_-]+/g, "-").replace(/^-+|-+$/g, ""); })
      .filter(Boolean);
    return (parts.join("_") || "qr-code").toLowerCase();
  }
  function downloadBlob(href, filename){
    var a = document.createElement("a");
    a.href = href; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
  }
  $("dlPng").addEventListener("click", function(){
    if (qrBox.classList.contains("error")) return;
    downloadBlob(canvas.toDataURL("image/png"), safeName() + ".png");
  });
  $("dlSvg").addEventListener("click", function(){
    if (!currentSvg) return;
    var blob = new Blob([currentSvg], { type: "image/svg+xml" });
    var u = URL.createObjectURL(blob);
    downloadBlob(u, safeName() + ".svg");
    setTimeout(function(){ URL.revokeObjectURL(u); }, 1000);
  });

  // ---- toast + utility actions ----
  var toast = $("toast"), toastT;
  function showToast(msg){
    toast.textContent = msg; toast.classList.add("show");
    clearTimeout(toastT); toastT = setTimeout(function(){ toast.classList.remove("show"); }, 1800);
  }
  $("copyUrl").addEventListener("click", function(){
    if (navigator.clipboard) {
      navigator.clipboard.writeText(currentUrl).then(function(){ showToast("Link copied"); });
    }
  });
  $("openForm").addEventListener("click", function(){ window.open(currentUrl, "_blank", "noopener"); });

  // ---- wiring ----
  document.getElementById("genForm").addEventListener("input", render);
  $("ecl").addEventListener("change", render);
  render();
})();
</script>
</body>
</html>
