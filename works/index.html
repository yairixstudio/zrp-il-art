:root{
  --white:#FFFFFF;
  --bg-grey:#EEF0EF;
  --ink:#1B1B1B;
  --grey-mid:#7D7D7D;
  --copy-grey:#6B7280;
  --max:1440px;
  --cop:"Copperplate","Noto Sans Arabic","Times New Roman",serif;
  --heb:"FbEzmel","Noto Sans Arabic","Arial Hebrew","David Libre",serif;
  --pad-x:96px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;overflow-x:clip}
body{background:var(--white);color:var(--ink);font-family:var(--cop);-webkit-font-smoothing:antialiased;overflow-x:clip;max-width:100vw}
img{display:block;max-width:100%;height:auto}
a{color:inherit;text-decoration:none}
button{font:inherit;cursor:pointer;background:none;border:0;color:inherit}

/* GLOBAL CASING RULE — all English text renders UPPERCASE (project-wide).
   Hebrew is exempt. See CLAUDE.md §9 / conventions.md §5. */
body{text-transform:uppercase}
.heb,.heb *,[dir="rtl"],[dir="rtl"] *{text-transform:none;font-family:var(--heb)}

/* ===== HERO (THE ART works) ===== */
.hero{background:var(--bg-grey);padding:48px var(--pad-x) 40px}
.hero-inner{width:100%;max-width:var(--max);margin:0 auto;text-align:right}
.hero h1,.hero h2{font-family:var(--cop);font-size:80px;line-height:.96;color:var(--ink);letter-spacing:.02em}
.hero h1{font-weight:700}
.hero h2{font-weight:300}

/* ===== ARTWORK GRID — 3 columns desktop (Figma 542:499), 2 columns mobile (489:4) ===== */
.grid{
  max-width:var(--max);margin:0 auto;
  display:grid;grid-template-columns:repeat(3,1fr);
  column-gap:16px;row-gap:64px;
  padding:48px var(--pad-x);background:var(--white);
}
.card{display:flex;flex-direction:column;gap:16px;min-width:0;height:100%}
.card .img{
  position:relative;width:100%;aspect-ratio:33/40;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;background:#FAFAFA;cursor:pointer;
}
.card .img picture{display:flex;width:100%;height:100%;min-width:0;min-height:0;align-items:center;justify-content:center;line-height:0}
.card .img img{display:block;max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;object-position:center}
.card .img::after{content:"";position:absolute;inset:0;background:rgba(27,27,27,0);transition:background .3s;pointer-events:none}
.card .img:hover::after{background:rgba(27,27,27,.06)}

/* card meta — right-aligned (RTL), per Figma Frame 376/379 */
.meta{display:flex;flex-direction:column;align-items:flex-end;gap:7px;text-align:right;flex:1}
.meta .artist{font-family:var(--heb);font-weight:400;font-size:20px;color:var(--ink);line-height:1.25;direction:rtl}
.meta .artist.is-en{font-family:var(--cop);font-weight:400;font-size:16px;text-transform:uppercase;letter-spacing:.03em;direction:ltr}
.meta .artist a{color:inherit;text-decoration:underline;text-decoration-thickness:1px;text-underline-offset:2px}
.meta .artist + .title{margin-top:-5px}
.meta .artist + .details{margin-top:-5px}
.meta a.artist{transition:opacity .2s}
.meta a.artist:hover{opacity:.6}
.meta .title{font-size:16px;color:var(--ink);line-height:1.3}
.meta .title.is-he{font-family:var(--heb);direction:rtl;text-transform:none}
.meta .title.is-en{font-family:var(--cop);font-weight:400;font-size:12px;line-height:1.2;text-transform:uppercase;letter-spacing:.03em;direction:ltr}
.meta .title.is-bi{display:inline-flex;flex-direction:row;direction:rtl;align-items:baseline;justify-content:flex-end;gap:0.35em;flex-wrap:wrap;max-width:100%}
.meta .title.is-bi .title-he{font-family:var(--heb);direction:rtl;text-transform:none}
.meta .title.is-bi .title-sep{display:inline-block;width:1.4px;height:0.85em;background:var(--ink);opacity:.55;align-self:center;flex-shrink:0;direction:ltr;unicode-bidi:isolate}
.meta .title.is-bi .title-en{font-family:var(--cop);font-weight:400;font-size:14px;line-height:1.2;text-transform:uppercase;letter-spacing:.03em;direction:ltr;unicode-bidi:isolate}
.meta .details{font-family:var(--heb);font-weight:300;font-size:15px;color:var(--grey-mid);line-height:1.2;direction:rtl;max-width:100%;white-space:pre-line;text-transform:none}
.dim{direction:ltr;unicode-bidi:isolate}
.meta .details .det-en{font-family:var(--cop);font-weight:300;font-size:.85em;text-transform:uppercase;letter-spacing:.02em;direction:ltr;unicode-bidi:isolate}
.meta-foot{display:flex;flex-direction:column;align-items:flex-end;gap:6px;margin-top:auto;padding-top:12px}
.sold{font-family:var(--heb);font-weight:300;font-size:14px;color:var(--ink);border:1.4px solid var(--ink);padding:2px 10px;line-height:1.25}
.gallery{font-family:var(--cop);font-weight:600;font-size:8px;color:var(--ink);text-transform:uppercase;letter-spacing:.02em;direction:ltr;white-space:pre-line;text-align:right;transition:opacity .2s}
.gallery:hover{opacity:.6}

/* lightbox styles imported from components/artwork-lightbox.css (see <link> in head) */

/* ============================================================
   RESPONSIVE — TABLET (≤1100px)
   ============================================================ */
@media (max-width:1100px){
  :root{--pad-x:48px}
  .hero h1,.hero h2{font-size:60px}
  .grid{row-gap:48px}
}

/* ============================================================
   RESPONSIVE — MOBILE (≤768px) — stays 2-up per Figma 489:4
   ============================================================ */
@media (max-width:768px){
  :root{--pad-x:16px}
  .hero{padding:32px 16px 8px}
  .hero-inner{text-align:center}
  .hero h1{font-size:clamp(40px,15vw,58px)}
  .hero h2{font-size:clamp(64px,24vw,91px);margin-top:-.12em}
  .grid{grid-template-columns:repeat(2,1fr);padding:32px 16px;column-gap:16px;row-gap:40px}
  .card{gap:12px}
  .meta .artist{font-size:18px}
  .meta .title{font-size:15px}
  .meta .title.is-en{font-weight:400;font-size:12px;line-height:1.2;letter-spacing:0.45px}
  .meta .title.is-bi .title-en{font-size:14px;font-weight:400}
  .meta .details{font-size:15px;line-height:1.2}
}

/* ============================================================
   RESPONSIVE — SMALL MOBILE (≤390px)
   ============================================================ */
@media (max-width:390px){
  .grid{column-gap:12px}
  .meta .artist{font-size:17px}
}

<script>
(function(){
  var items = JSON.parse(document.getElementById('works-data').textContent);
  var base  = '../images/works/v2/';
  var HEB   = /[א-ת]/;

  function esc(s){
    if(s==null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  function galleryLabel(s){
    if(!s) return '';
    var parts=String(s).trim().split(/\s+/);
    if(parts.length<2) return esc(s);
    return esc(parts[0])+'\n'+esc(parts.slice(1).join(' '));
  }
  function wrapDimRuns(t){return t.replace(/\d+(?:[.,]\d+)?(?:\s*[xX×]\s*\d+(?:[.,]\d+)?)+/g,function(m){return '<span class="dim">'+m+'</span>';});}
  /* Wrap Latin WORDS (2+ letters) in <span class="det-en"> for Copperplate font.
     Numbers and single letters (like X in 40X40) stay in Hebrew font. */
  function detailsHtml(s){
    if(!s) return '';
    var result = [];
    var lastIndex = 0;
    // Match: Latin words (2+ letters), with optional spaces between words
    var re = /[A-Za-z]{2,}(?:\s+[A-Za-z]{2,})*/g;
    var match;
    while((match = re.exec(s)) !== null){
      // Add part before this match (escaped)
      if(match.index > lastIndex){
        result.push(wrapDimRuns(esc(s.slice(lastIndex, match.index))));
      }
      // Add wrapped English part (escaped inside span)
      result.push('<span class="det-en">'+esc(match[0])+'</span>');
      lastIndex = re.lastIndex;
    }
    // Add remaining part after last match
    if(lastIndex < s.length){
      result.push(wrapDimRuns(esc(s.slice(lastIndex))));
    }
    return result.join('');
  }
  function srcset(w){
    return w.widths.map(function(width,i){
      var last = i === w.widths.length-1;
      var file = last ? (base+w.img+'.webp') : (base+w.img+'-'+width+'w.webp');
      return file+' '+width+'w';
    }).join(', ');
  }
  function artistName(w){ return w.artist_he || w.artist_en || ''; }
  function captionTitle(w){
    if(w.title_he && w.title_en) return w.title_he + ' · ' + w.title_en;
    return w.title_he || w.title_en || '';
  }

  function titleHtml(w){
    if(w.title_he && w.title_en){
      return '<span class="title is-bi">'+
        '<span class="title-he">'+esc(w.title_he)+'</span>'+
        '<span class="title-sep" aria-hidden="true"></span>'+
        '<span class="title-en">'+esc(w.title_en)+'</span>'+
      '</span>';
    }
    if(w.title_he) return '<span class="title is-he">'+esc(w.title_he)+'</span>';
    if(w.title_en) return '<span class="title is-en">'+esc(w.title_en)+'</span>';
    return '';
  }
  function artistHtml(w){
    /* collaborative artwork: each participant name linked separately (golden rule) */
    if(w.collab && w.collab.length){
      var conn=w.collab_connector_he||'בשיתוף';
      var inner=w.collab.map(function(c){
        return '<a href="../artists/'+esc(c.slug)+'/">'+esc(c.name_he||c.name_en||'')+'</a>';
      }).join(' '+esc(conn)+' ');
      return '<span class="artist is-he">'+inner+'</span>';
    }
    var href = '../artists/'+w.artist_slug+'/';
    var cls  = w.artist_he ? 'is-he' : 'is-en';
    var name = w.artist_he || w.artist_en;
    return '<a class="artist '+cls+'" href="'+href+'">'+esc(name)+'</a>';
  }

  var grid = document.getElementById('works-grid');

  function cardHtml(w,i){
    var main   = base+w.img+'.webp';
    var href   = '../artists/'+w.artist_slug+'/';
    var alt    = artistName(w) + (captionTitle(w) ? ' — '+captionTitle(w) : '');
    var loadAttr = i ? 'loading="lazy"' : 'fetchpriority="high"';
    var imgTag = '<img src="'+main+'" srcset="'+srcset(w)+'" sizes="(max-width:768px) 46vw, (max-width:1100px) 30vw, 420px" '+
                 'width="'+w.w+'" height="'+w.h+'" alt="'+esc(alt)+'" decoding="async" '+loadAttr+'>';
    var details = w.details_he ? '<span class="details">'+detailsHtml(w.details_he).replace(/(\d)([xX])(?=\d)/g,'$1<span class="dim-x">$2</span>')+'</span>' : '';
    var foot = (w.sold ? '<span class="sold">נמכר</span>' : '') +
               '<a class="gallery" href="../#galleries">'+galleryLabel(w.gallery_en)+'</a>';
    /* Artworks with a dedicated page navigate to it on click (real link).
       The rest open the shared lightbox via data-artwork-* attributes. */
    var imgBlock = w.page
      ? '<a class="img" href="'+esc(w.id)+'/">'+imgTag+'</a>'
      : '<div class="img" data-artwork-src="'+main+'" data-artwork-title="'+esc(captionTitle(w))+'" '+
             'data-artwork-artist="'+esc(artistName(w))+'" data-artwork-link="'+href+'">'+imgTag+'</div>';
    return '<article class="card" data-artwork-gallery>'+
        imgBlock+
        '<div class="meta">'+
          artistHtml(w)+
          titleHtml(w)+
          details+
          '<div class="meta-foot">'+foot+'</div>'+
        '</div>'+
      '</article>';
  }

  /* Staggered render: first screenful immediately, the rest appended in
     chunks as the user scrolls near them, so 102 cards never hit the DOM
     in one shot (images stay loading="lazy" regardless). */
  var FIRST_CHUNK = 12, CHUNK = 18;
  var rendered = 0;

  function appendChunk(n){
    if(rendered >= items.length) return;
    var end = Math.min(rendered + n, items.length);
    var html = '';
    for(var i = rendered; i < end; i++) html += cardHtml(items[i], i);
    rendered = end;
    grid.insertAdjacentHTML('beforeend', html);
    if(window.ArtworkLightbox) ArtworkLightbox.refreshFocusable();
    if(window.PictureUpgrade)  PictureUpgrade.refresh(grid);
  }

  appendChunk(FIRST_CHUNK);

  if(rendered < items.length && 'IntersectionObserver' in window){
    var sentinel = document.createElement('div');
    sentinel.setAttribute('aria-hidden','true');
    sentinel.style.cssText = 'height:1px;width:100%';
    grid.parentNode.insertBefore(sentinel, grid.nextSibling);
    var io = new IntersectionObserver(function(entries){
      if(!entries.some(function(e){ return e.isIntersecting; })) return;
      appendChunk(CHUNK);
      if(rendered >= items.length){ io.disconnect(); sentinel.remove(); return; }
      // re-arm: layout moved the sentinel; force a fresh intersection check
      io.unobserve(sentinel); io.observe(sentinel);
    }, {rootMargin:'1800px 0px'});
    io.observe(sentinel);
  } else {
    appendChunk(items.length);
  }
})();
</script>
